<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sega Cloud Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #00f0ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #game { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #loader { z-index: 2; text-align: center; pointer-events: none; }
        .spinner { border: 4px solid rgba(0, 240, 255, 0.1); border-left-color: #00f0ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-msg { color: #ff4444; display: none; font-size: 12px; margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="status">ЗАГРУЗКА ЯДРА SEGA...</div>
        <div id="error-msg"></div>
    </div>

    <div id="game"></div>

    <script>
        // Таймер паники: если через 20 секунд ничего не произошло
        const panicTimer = setTimeout(() => {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').innerText = "Слишком долгая загрузка. Попробуйте обновить страницу или проверьте интернет-соединение.";
            document.querySelector('.spinner').style.borderColor = "#ff4444";
        }, 20000);

        window.EmuJS = {
            // Используем официальный проверенный путь
            dataUrl: "https://emulatorjs.github.io/EmulatorJS/data/",
            gameUrl: window.location.origin + "/roms/sonic.bin",
            core: "genesis",
            autoStart: true,
            container: "#game",
            onStart: function() {
                clearTimeout(panicTimer);
                document.getElementById('loader').style.display = 'none';
            },
            onProgress: function(percent) {
                document.getElementById('status').innerText = "ЗАГРУЗКА: " + Math.round(percent) + "%";
            }
        };
    </script>
    
    <!-- Используем надежный загрузчик -->
    <script src="https://emulatorjs.github.io/EmulatorJS/data/loader.js"></script>

</body>
</html>
