<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { 
            background: linear-gradient(45deg, #0041ff, #00f0ff); 
            color: white; border: none; padding: 20px; 
            font-family: inherit; font-size: 14px; 
            cursor: pointer; box-shadow: 0 0 20px rgba(0,240,255,0.5); 
            border-radius: 10px;
        }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
        #status-bar { position: fixed; bottom: 10px; font-size: 8px; color: #444; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="lobby" class="screen">
        <h1 style="color:#00f0ff; font-size:16px;">ARENA CLOUD</h1>
        <p style="font-size:8px; margin-bottom:30px;">СВЯЗЬ С ИГРОВЫМ УЗЛОМ...</p>
        <button class="btn" onclick="connectToStream()">ПОДКЛЮЧИТЬСЯ</button>
        <div id="status-bar">STATUS: STANDBY (RENDER_NODE_01)</div>
    </div>

    <!-- Это наше окно трансляции -->
    <iframe id="cloud-stream" allow="autoplay; fullscreen; gamepad"></iframe>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function connectToStream() {
            document.getElementById('lobby').style.display = 'none';
            const stream = document.getElementById('cloud-stream');
            
            stream.style.display = 'block';
            // Подключаемся к нашему выделенному движку
            stream.src = window.location.origin + "/engine";
            
            tg.HapticFeedback.impactOccurred('medium');
        }
    </script>
</body>
</html>
