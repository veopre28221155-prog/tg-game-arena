<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Используем относительный путь для socket.io, так надежнее на Render -->
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --tg-text: #ffffff; --accent-neon: #00f0ff; --accent-pink: #ff0055; --accent-gold: #ffd700; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #050505; color: white; font-family: var(--font-retro); height: 100vh; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn-pixel { background: #1a1a1a; color: var(--accent-neon); border: 4px solid #000; padding: 15px; width: 100%; max-width: 320px; margin-bottom: 10px; cursor: pointer; font-family: inherit; font-size: 10px; text-transform: uppercase; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; }
        #ejs-container { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <div id="emu-ui" style="position:absolute; top:10px; left:10px; z-index:101; color:gold; font-size:10px;">SCORE: <span id="emu-score">0</span></div>
    <button onclick="stopEmulator()" style="position:absolute; top:10px; right:10px; z-index:101; background:red; color:white; font-family:inherit; font-size:8px; border:none; padding:5px;">ВЫХОД</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <div id="s-main" class="screen active">
        <h1 style="color:var(--accent-neon); font-size: 14px;">RETRO ARENA</h1>
        <button class="btn-pixel" onclick="navScreen('s-single')">🎮 ОДИНОЧНАЯ ИГРА</button>
        <button class="btn-pixel" onclick="tg.showAlert('Скоро!')">🤝 ИГРА С ДРУГОМ</button>
        <button class="btn-pixel" style="color:gold" onclick="tg.showAlert('Нужны Звезды!')">⚔️ ТУРНИРЫ</button>
        <p id="debug-status" style="font-size:8px; color:#555;">Загрузка данных...</p>
    </div>

    <div id="s-single" class="screen">
        <h2 style="font-size:10px;">ВЫБЕРИ ИГРУ</h2>
        <button class="btn-pixel" onclick="launchEmulator('sonic.bin', 'segaMD', 'sonic')">SONIC 1</button>
        <button class="btn-pixel" onclick="launchEmulator('umk3.md', 'segaMD', 'mk')">MK 3</button>
        <button class="btn-pixel" onclick="navScreen('s-main')">НАЗАД</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // Инициализация сокета с обработкой ошибки
    let socket;
    try {
        socket = io();
    } catch(e) {
        console.error("Socket.io не загружен");
    }

    let user = null;
    let score = 0;

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function init() {
        try {
            const r = await fetch('/api/user-data', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({initData: tg.initData})
            });
            if (r.ok) {
                user = await r.json();
                document.getElementById('debug-status').innerText = "Данные загружены!";
            } else {
                document.getElementById('debug-status').innerText = "Ошибка сервера (Offline)";
            }
        } catch(e) {
            document.getElementById('debug-status').innerText = "Сервер недоступен";
        }
    }
    init();

    function launchEmulator(fileName, core, gameKey) {
        document.getElementById('emulator-layer').style.display = 'block';
        window.EJS_player = '#ejs-container';
        window.EJS_core = core;
        window.EJS_gameUrl = '/' + fileName;
        window.EJS_pathtodata = 'data/'; 
        window.EJS_startOnLoaded = true;
        window.EJS_virtualGamepad = true;

        window.EJS_onGameStart = () => {
            setInterval(() => {
                if (typeof EJS_emulator !== 'undefined') {
                    const ram = EJS_emulator.gameManager.getWRam();
                    if (gameKey === 'sonic') score = ram[0xFE20] || 0;
                    document.getElementById('emu-score').innerText = score;
                }
            }, 1000);
        };

        const script = document.createElement('script');
        script.src = 'data/loader.js';
        document.body.appendChild(script);
    }

    function stopEmulator() {
        location.reload();
    }
</script>
</body>
</html>
