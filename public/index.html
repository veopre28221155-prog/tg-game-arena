<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f0ff; --gold: #ffd700; --font: 'Press Start 2P', cursive; }
        body { margin: 0; background: #050505; color: #fff; font-family: var(--font); overflow: hidden; font-size: 10px; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; justify-content: center; }
        .screen.active { display: flex; }
        .btn-pixel { background: #1a1a1a; color: var(--accent); border: 4px solid #000; padding: 15px; width: 280px; font-family: inherit; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; box-shadow: inset 4px 4px 0 rgba(0, 240, 255, 0.2); }
        .btn-gold { color: var(--gold); }
        .card { background: #111; border: 2px dashed #444; padding: 15px; width: 280px; margin-bottom: 15px; text-align: center; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
        #loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; color:var(--accent); }
    </style>
</head>
<body>

<div id="loading-overlay">ЗАГРУЗКА ЯДРА...</div>

<div id="emulator-layer">
    <div style="position:absolute; top:15px; left:15px; z-index:101; color:gold;">SCORE: <span id="emu-score">0</span></div>
    <button onclick="location.reload()" style="position:absolute; top:15px; right:15px; z-index:101; background:red; color:#fff; border:none; padding:10px; font-family:inherit; font-size:8px; cursor:pointer;">ВЫХОД</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="s-main" class="screen active">
        <h1 style="color:var(--accent); font-size: 14px; margin-bottom:30px;">RETRO ARENA</h1>
        <div class="card">БАЛАНС: <span id="p-bal" style="color:gold">0</span> 🪙</div>
        <button class="btn-pixel" onclick="navScreen('s-lobby-create')">🤝 СОЗДАТЬ ЛОББИ</button>
        <button class="btn-pixel btn-gold" onclick="openLobbyList()">📋 НАЙТИ ИГРУ</button>
        <button class="btn-pixel" style="color:#ff0055;" onclick="tg.showAlert('ID: ' + user.telegramId)">👤 МОЙ ПРОФИЛЬ</button>
    </div>

    <!-- СОЗДАНИЕ ЛОББИ -->
    <div id="s-lobby-create" class="screen">
        <h2>НОВАЯ ИГРА</h2>
        <select id="game-id" class="btn-pixel" style="background:#000; color:#fff;">
            <option value="umk3.md">Mortal Kombat 3</option>
            <option value="tanks.nes">Battle City (Dendy)</option>
            <option value="sonic2.md">Sonic 2</option>
        </select>
        <input type="number" id="bet-val" class="btn-pixel" placeholder="СТАВКА (0=FREE)" style="background:#000; color:#fff;">
        <label style="font-size:7px; margin-bottom:10px;"><input type="checkbox" id="is-private"> СКРЫТОЕ (ПО ССЫЛКЕ)</label>
        <button class="btn-pixel btn-gold" onclick="createLobby()">СОЗДАТЬ</button>
        <button class="btn-pixel" onclick="navScreen('s-main')">НАЗАД</button>
    </div>

    <!-- ОЖИДАНИЕ -->
    <div id="s-waiting" class="screen">
        <h2>ОЖИДАНИЕ...</h2>
        <div class="card" id="invite-box" style="display:none;">
            <p style="font-size:7px;">Отправь другу:</p>
            <button class="btn-pixel btn-gold" onclick="shareInvite()">📤 ПРИГЛАСИТЬ</button>
        </div>
        <p style="font-size:7px; color:#888;">Игра начнется автоматически</p>
        <button class="btn-pixel" onclick="location.reload()">ОТМЕНА</button>
    </div>

    <!-- СПИСОК -->
    <div id="s-list" class="screen">
        <h2>ОТКРЫТЫЕ ИГРЫ</h2>
        <div id="list-render" style="width:100%; max-height:300px; overflow-y:auto;"></div>
        <button class="btn-pixel" style="margin-top:10px;" onclick="navScreen('s-main')">НАЗАД</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const socket = io();
    let user = null, lobby = null, score = 0;
    const BOT_USERNAME = "RetroBattleArena_bot";

    async function init() {
        tg.expand();
        try {
            const r = await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) });
            user = await r.json();
            document.getElementById('p-bal').innerText = user.balance;

            const sp = tg.initDataUnsafe.start_param;
            if(sp && sp.startsWith('lobby_')) {
                joinLobby(sp.replace('lobby_',''));
            }
        } catch(e) { console.error(e); }
    }
    init();

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function createLobby() {
        const game = document.getElementById('game-id').value;
        const bet = parseInt(document.getElementById('bet-val').value) || 0;
        const priv = document.getElementById('is-private').checked;

        const r = await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, gameType: game, betAmount: bet, isPrivate: priv}) });
        const res = await r.json();
        if(res.success) {
            lobby = res.lobby;
            navScreen('s-waiting');
            socket.emit('join-room', lobby.lobbyId);
            if(priv || bet === 0) document.getElementById('invite-box').style.display = 'block';
        } else tg.showAlert(res.error || "Ошибка");
    }

    function shareInvite() {
        const url = `https://t.me/${BOT_USERNAME}/app?startapp=lobby_${lobby.lobbyId}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Заходи, поиграем в ${lobby.gameType}!`);
    }

    async function openLobbyList() {
        navScreen('s-list');
        const r = await fetch('/api/lobby/list');
        const list = await r.json();
        const container = document.getElementById('list-render');
        container.innerHTML = list.length === 0 ? '<p style="text-align:center;">НЕТ ИГР</p>' : list.map(l => `
            <div class="card" style="font-size:7px;">
                ${l.gameType} | СТАВКА: ${l.betAmount}🪙
                <button class="btn-pixel btn-gold" style="padding:5px; width:100px; margin-top:5px;" onclick="joinLobby('${l.lobbyId}')">ИГРАТЬ</button>
            </div>
        `).join('');
    }

    async function joinLobby(id) {
        const r = await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, lobbyId: id}) });
        const res = await r.json();
        if(res.success) {
            lobby = res.lobby;
            socket.emit('join-room', id);
        } else tg.showAlert("Не удалось зайти");
    }

    socket.on('start-match', (data) => {
        document.getElementById('loading-overlay').style.display = 'flex';
        startEmu(data.game, data.game.endsWith('.nes') ? 'nes' : 'segaMD', data.lobbyId);
    });

    function startEmu(file, core, lid) {
        document.getElementById('app').style.display = 'none';
        document.getElementById('emulator-layer').style.display = 'block';

        window.EJS_player = '#ejs-container';
        window.EJS_core = core;
        window.EJS_gameUrl = '/' + file;
        window.EJS_pathtodata = 'data/'; 
        window.EJS_startOnLoaded = true;
        window.EJS_virtualGamepad = true;

        window.EJS_onGameStart = () => {
            document.getElementById('loading-overlay').style.display = 'none';
            setInterval(() => {
                if (typeof EJS_emulator !== 'undefined') {
                    const ram = EJS_emulator.gameManager.getWRam();
                    if (file.includes('sonic')) score = ram[0xFE20] || 0;
                    else if (file.includes('umk3')) score = ram[0xB110] || 0;
                    document.getElementById('emu-score').innerText = score;
                }
            }, 1000);
        };

        window.addEventListener("keydown", (e) => {
            socket.emit('emu-input', { roomId: lid, key: e.keyCode, type: 'keydown', pNum: user.telegramId === lobby?.creatorId ? 0 : 1 });
        });
        window.addEventListener("keyup", (e) => {
            socket.emit('emu-input', { roomId: lid, key: e.keyCode, type: 'keyup', pNum: user.telegramId === lobby?.creatorId ? 0 : 1 });
        });

        socket.on('partner-input', (data) => {
            if (typeof EJS_emulator !== 'undefined') {
                EJS_emulator.gameManager.simulateInput(data.key, data.type, data.pNum === 0 ? 1 : 0);
            }
        });

        const s = document.createElement('script');
        s.src = 'data/loader.js';
        document.body.appendChild(s);
    }

    socket.on('results', (data) => {
        tg.showPopup({ title: 'КОНЕЦ МАТЧА', message: data.winnerId === user.telegramId ? 'ВЫ ПОБЕДИЛИ!' : 'ВЫ ПРОИГРАЛИ' }, () => location.reload());
    });
</script>
</body>
</html>
