<!-- ДОБАВЬ ЭТОТ ЭКРАН В ТЕЛО HTML -->
<div id="s-admin" class="screen">
    <h2 style="color:red;">ADMIN PANEL</h2>
    <div id="admin-withdraw-list" style="width:100%; font-size:8px;"></div>
    <button class="btn-pixel" onclick="navScreen('s-main')">◀ НАЗАД</button>
</div>

<!-- ОБНОВИ СКРИПТ -->
<script>
    // ... (инициализация такая же) ...

    function updateUI() {
        document.getElementById('p-bal').innerText = user.balance;
        // ПОКАЗЫВАЕМ КНОПКУ АДМИНА, ЕСЛИ ID СОВПАДАЕТ
        if (user.telegramId === 1463465416) {
            const adminBtn = document.createElement('button');
            adminBtn.className = "btn-pixel";
            adminBtn.style.borderColor = "red";
            adminBtn.innerText = "🛑 АДМИН-ПАНЕЛЬ";
            adminBtn.onclick = () => openAdminPanel();
            document.getElementById('s-main').appendChild(adminBtn);
        }
    }

    async function openAdminPanel() {
        navScreen('s-admin');
        const r = await fetch('/api/admin/get-withdrawals', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId })
        });
        const list = await r.json();
        const container = document.getElementById('admin-withdraw-list');
        container.innerHTML = list.length === 0 ? "НЕТ ЗАЯВОК" : list.map(w => `
            <div class="card" style="border-color:red;">
                <p>ЮЗЕР: ${w.userId}</p>
                <p>СУММА: ${w.coinAmount} 🪙 (${w.usdtAmount} USDT)</p>
                <button class="btn-pixel" style="background:green; color:white; width:45%; display:inline;" onclick="adminAction('${w._id}', 'complete')">OK</button>
                <button class="btn-pixel" style="background:red; color:white; width:45%; display:inline;" onclick="adminAction('${w._id}', 'reject')">X</button>
            </div>
        `).join('');
    }

    async function adminAction(id, action) {
        if (!confirm("Уверены?")) return;
        const r = await fetch('/api/admin/action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId, id, action })
        });
        if (r.ok) openAdminPanel();
    }
</script>
