<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat Arena</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Подключаем твой CSS эмулятора -->
    <link rel="stylesheet" href="emulator.css">
    
    <!-- Firebase 8 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #000; color: white; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }
        .arcade-btn { background-color: #00f0ff; color: #000; font-weight: bold; text-transform: uppercase; border-radius: 4px; border: none; }
        .arcade-btn:active { transform: scale(0.95); }
        .pixel-border { border: 2px solid rgba(0, 240, 255, 0.2); }
        
        .tab-btn { font-size: 10px; font-weight: bold; color: #71717a; text-transform: uppercase; padding: 12px 0; border-bottom: 2px solid transparent; width: 100%; background: transparent; border-top:none; border-left:none; border-right:none; }
        .tab-btn.active { color: #00f0ff; border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); }
        
        /* Контейнер игры */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; }
        #game-area { flex: 1; width: 100%; position: relative; }
        #game-container { width: 100%; height: 100%; }

        .dpad-btn { width: 55px; height: 55px; background: #27272a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.5); color: white; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- HEADER -->
    <div class="p-4 border-b border-white/5 bg-zinc-900 flex justify-between items-center z-10">
        <div>
            <h1 class="text-[#00f0ff] font-bold text-lg tracking-tighter italic uppercase">Pixel Kombat</h1>
        </div>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded border border-white/10 text-[#00f0ff]">
            <i data-lucide="star" class="w-3 h-3"></i>
            <span id="ui-balance" class="text-xs font-bold">1000</span>
        </div>
    </div>

    <!-- ТАБЫ -->
    <div class="flex bg-zinc-900 border-b border-white/5 z-10">
        <button id="tab-arcade" class="tab-btn active">Arcade</button>
        <button id="tab-profile" class="tab-btn">Profile</button>
    </div>

    <!-- ARCADE -->
    <div id="screen-arcade" class="flex-1 overflow-y-auto p-4 space-y-4 bg-zinc-950">
        <div class="bg-zinc-900 rounded-lg overflow-hidden pixel-border">
            <div class="h-32 bg-gradient-to-r from-blue-900 to-black flex items-center justify-center">
                <span class="text-5xl">🦔</span>
            </div>
            <div class="p-4 space-y-4">
                <h3 class="font-bold text-white uppercase italic tracking-widest text-sm">Sonic The Hedgehog</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-solo" class="arcade-btn py-3 text-[10px]">SOLO PLAY</button>
                    <button id="btn-host" class="arcade-btn py-3 text-[10px] bg-pink-600 text-white">HOST LOBBY</button>
                </div>
                <button id="btn-join" class="w-full border border-white/10 text-gray-500 py-3 text-[9px] rounded font-bold uppercase">Join Player 2</button>
            </div>
        </div>
    </div>

    <!-- PROFILE -->
    <div id="screen-profile" class="hidden flex-1 p-6 space-y-6 bg-zinc-950">
        <div class="bg-zinc-900 p-8 rounded-lg pixel-border text-center">
            <div class="w-16 h-16 rounded-full bg-cyan-500/10 mx-auto mb-4 border border-cyan-500/30 flex items-center justify-center">
                <i data-lucide="user" class="text-cyan-400 w-8 h-8"></i>
            </div>
            <h2 id="prof-name" class="text-lg font-bold uppercase italic">---</h2>
            <p id="prof-id" class="text-[8px] text-gray-600 mt-2 uppercase">Warrior ID: ...</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-zinc-900 p-4 rounded border border-white/5 text-center">
                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Coins</p>
                <p id="prof-balance" class="text-lg font-bold text-cyan-400">1000</p>
            </div>
            <div class="bg-zinc-900 p-4 rounded border border-white/5 text-center">
                <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Rank</p>
                <p class="text-lg font-bold text-white uppercase italic">Elite</p>
            </div>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-overlay">
        <div class="h-[50px] bg-zinc-900 border-b border-white/10 flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <span id="mode-badge" class="text-[8px] font-bold bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded uppercase tracking-tighter">Solo</span>
                <span id="lobby-display" class="hidden text-[10px] text-white font-bold bg-white/10 px-2 rounded tracking-widest uppercase"></span>
            </div>
            <button onclick="location.reload()" class="text-white/40"><i data-lucide="x-circle"></i></button>
        </div>
        <div id="game-area">
            <div id="game-container"></div>
        </div>
    </div>

    <!-- P2 CONTROLLER -->
    <div id="screen-controller" class="hidden fixed inset-0 bg-black z-[200] flex flex-col p-6">
        <div class="flex justify-between items-center w-full max-w-md mx-auto h-full">
            <div class="grid grid-cols-3 gap-2">
                <div></div><button id="p-up" class="dpad-btn">▲</button><div></div>
                <button id="p-left" class="dpad-btn">◀</button>
                <div class="w-[55px] h-[55px] bg-zinc-900 rounded-full border-4 border-black"></div>
                <button id="p-right" class="dpad-btn">▶</button>
                <div></div><button id="p-down" class="dpad-btn">▼</button><div></div>
            </div>
            <div class="flex flex-col gap-6">
                <button id="p-b" class="action-btn bg-yellow-500">B</button>
                <div class="flex gap-4">
                    <button id="p-a" class="action-btn bg-red-600">A</button>
                    <button id="p-c" class="action-btn bg-blue-600">C</button>
                </div>
            </div>
        </div>
        <div class="text-center pb-12"><button id="p-start" class="px-10 py-3 bg-zinc-800 text-zinc-400 rounded-full text-[10px] font-bold uppercase tracking-widest border border-zinc-700">Start</button></div>
    </div>

    <script>
        (function() {
            var db, currentLobby = null, isHost = false;
            var p2map = { UP: "KeyI", DOWN: "KeyK", LEFT: "KeyJ", RIGHT: "KeyL", A: "KeyF", B: "KeyG", C: "KeyH", START: "KeyV" };

            // ✅ ИНТЕГРИРОВАННЫЕ КЛЮЧИ FIREBASE ✅
            var firebaseConfig = {
                projectId: "studio-8235565247-f8a50",
                appId: "1:924081428998:web:8c62d7a8df8676cb7e8187",
                apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo",
                authDomain: "studio-8235565247-f8a50.firebaseapp.com",
                messagingSenderId: "924081428998"
            };

            document.addEventListener('DOMContentLoaded', function() {
                lucide.createIcons();

                // Навигация
                var arcTab = document.getElementById('tab-arcade'), profTab = document.getElementById('tab-profile');
                var arcScr = document.getElementById('screen-arcade'), profScr = document.getElementById('screen-profile');
                
                arcTab.onclick = function() {
                    arcTab.classList.add('active'); profTab.classList.remove('active');
                    arcScr.classList.remove('hidden'); profScr.classList.add('hidden');
                };
                profTab.onclick = function() {
                    profTab.classList.add('active'); arcTab.classList.remove('active');
                    profScr.classList.remove('hidden'); arcScr.classList.add('hidden');
                };

                // Firebase Init
                try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } catch(e) { console.log("DB Error"); }

                // MongoDB Баланс
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand();
                    fetch('/api/user-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            document.getElementById('ui-balance').innerText = data.user.balance;
                            document.getElementById('prof-balance').innerText = data.user.balance;
                            document.getElementById('prof-name').innerText = data.user.username;
                            document.getElementById('prof-id').innerText = "TG-ID: " + data.user.telegramId;
                        }
                    });
                }

                // EmulatorJS Start
                function startSega(romName) {
                    document.getElementById('game-overlay').style.display = 'flex';
                    
                    window.EJS_player = '#game-container';
                    window.EJS_core = 'sega';
                    window.EJS_gameUrl = romName; // sonic.bin
                    window.EJS_pathtodata = 'data/'; // ПУТЬ К ТВОЕЙ ПАПКЕ DATA
                    
                    var script = document.createElement('script');
                    script.src = 'loader.js';
                    document.body.appendChild(script);
                }

                document.getElementById('btn-solo').onclick = function() {
                    startSega('sonic.bin');
                };

                document.getElementById('btn-host').onclick = function() {
                    if(!db) return alert("Firebase error");
                    isHost = true;
                    currentLobby = Math.random().toString(36).substring(2, 8).toUpperCase();
                    
                    document.getElementById('mode-badge').innerText = "HOSTING LOBBY";
                    document.getElementById('lobby-display').classList.remove('hidden');
                    document.getElementById('lobby-display').innerText = currentLobby;

                    db.collection("lobbies").doc(currentLobby).set({ status: "open", controller2: null });
                    db.collection("lobbies").doc(currentLobby).onSnapshot(function(doc) {
                        var d = doc.data();
                        if(d && d.controller2) {
                            var code = p2map[d.controller2.btn];
                            if(code) {
                                window.dispatchEvent(new KeyboardEvent(d.controller2.state ? 'keydown' : 'keyup', { code: code }));
                            }
                        }
                    });
                    startSega('sonic.bin');
                };

                document.getElementById('btn-join').onclick = function() {
                    var code = prompt("ENTER LOBBY ID:");
                    if(code) {
                        currentLobby = code.toUpperCase();
                        isHost = false;
                        document.getElementById('screen-controller').classList.remove('hidden');
                        document.getElementById('screen-controller').style.display = 'flex';
                    }
                };

                // P2 Input
                function bind(id, btn) {
                    var el = document.getElementById(id);
                    function send(s) {
                        if(currentLobby && db && !isHost) {
                            db.collection("lobbies").doc(currentLobby).update({
                                controller2: { btn: btn, state: s, ts: Date.now() }
                            });
                        }
                    }
                    el.onpointerdown = function(e) { e.preventDefault(); send(true); };
                    el.onpointerup = el.onpointerleave = function(e) { e.preventDefault(); send(false); };
                }
                bind('p-up', 'UP'); bind('p-down', 'DOWN'); bind('p-left', 'LEFT'); bind('p-right', 'RIGHT');
                bind('p-a', 'A'); bind('p-b', 'B'); bind('p-c', 'C'); bind('p-start', 'START');
            });
        })();
    </script>
</body>
</html>
