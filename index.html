<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural SEGA Emulator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: monospace; }
        
        /* Экран загрузки ИИ */
        #ai-boot { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0f0; z-index: 9999; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .log { margin-bottom: 5px; font-size: 12px; }
        
        /* Контейнер эмулятора */
        #game-container { width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

<!-- AI BOOT SEQUENCE -->
<div id="ai-boot">
    <div class="log">> INITIALIZING MOTOROLA 68000 VIRTUAL CPU...</div>
    <div class="log" id="log2" style="display:none;">> COMPILING WEBASSEMBLY CORE...</div>
    <div class="log" id="log3" style="display:none;">> LOADING ROM: /public/sonic.bin</div>
    <div class="log" id="log4" style="display:none;">> VIRTUAL SEGA GENESIS READY.</div>
</div>

<!-- ЗДЕСЬ БУДЕТ РАБОТАТЬ НАСТОЯЩАЯ СЕГА -->
<div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Имитация загрузки нейро-эмулятора
    setTimeout(() => document.getElementById('log2').style.display = 'block', 800);
    setTimeout(() => document.getElementById('log3').style.display = 'block', 1600);
    setTimeout(() => {
        document.getElementById('log4').style.display = 'block';
        setTimeout(startEmulator, 1000);
    }, 2500);

    // ЗАПУСК АППАРАТНОГО ЭМУЛЯТОРА
    function startEmulator() {
        document.getElementById('ai-boot').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';

        // Настройки виртуальной машины
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega'; // Указываем ядро: SEGA Genesis / Megadrive
        window.EJS_gameUrl = '/sonic.bin'; // Путь к твоему НАСТОЯЩЕМУ ROM файлу
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; // Облачные ядра
        
        // Включаем виртуальный джойстик для телефона
        window.EJS_virtualGamepad = true; 

        // Загружаем движок (он сам создаст экран и кнопки)
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    }
</script>

</body>
</html>
