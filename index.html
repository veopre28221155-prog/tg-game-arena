<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --tg-text: #ffffff; --accent-neon: #00f0ff; --accent-pink: #ff0055; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font-retro); height: 100vh; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .screen.active { display: flex; }
        
        .btn-pixel { background: #222; color: #fff; border: 4px solid #000; padding: 15px; width: 100%; max-width: 300px; font-family: var(--font-retro); margin-bottom: 15px; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .btn-pixel:active { transform: translateY(2px); background: #333; }
        
        /* КОНСОЛЬ (оставим на всякий случай, но сделаем поменьше) */
        #debug-log {
            width: 100%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            color: #aaa;
            font-family: monospace;
            font-size: 8px;
            padding: 5px;
            margin-top: 5px;
            display: none; 
        }

        #emulator-container {
            width: 100%;
            height: 65vh; /* Чуть больше экран */
            background: #000;
            border: 2px solid var(--accent-neon);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
    </style>
</head>
<body>

<div id="app">
    <!-- МЕНЮ -->
    <div id="s-main" class="screen active" style="justify-content: center;">
        <h1 style="color:var(--accent-neon); text-align:center;">RETRO ARENA</h1>
        <button class="btn-pixel" onclick="launchSega('sonic.bin')">🎮 SONIC THE HEDGEHOG</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="s-game" class="screen" style="padding: 10px;">
        <div style="width: 100%; display: flex; justify-content: space-between;">
            <button class="btn-pixel" style="width:auto; padding:8px; font-size:10px; border-color:var(--accent-pink);" onclick="location.reload()">❌ ВЫЙТИ</button>
            <div style="color:gold; font-size:10px; padding-top:10px;">SEGA GENESIS</div>
        </div>

        <!-- Сюда встраивается эмулятор -->
        <div id="emulator-container"></div>
        
        <div id="debug-log"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; 
    tg.ready(); 
    tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    function navScreen(id) { 
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function logError(msg) {
        const box = document.getElementById('debug-log');
        box.style.display = 'block';
        box.innerText += `> ${msg}\n`;
        console.log(msg);
    }

    async function launchSega(romName) {
        navScreen('s-game');
        document.getElementById('emulator-container').innerHTML = ''; // Очистка перед запуском
        logError("Загрузка...");

        const romUrl = window.location.origin + '/' + romName;

        // === ГЛАВНЫЕ ИСПРАВЛЕНИЯ ЗДЕСЬ ===
        window.EJS_player = '#emulator-container'; 
        
        // 1. Меняем ядро на segaMD (специально для Mega Drive/Genesis)
        window.EJS_core = 'segaMD'; 
        
        // 2. Указываем путь к файлу
        window.EJS_gameUrl = romUrl; 
        
        // 3. Откуда качать движок
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        // 4. АВТОСТАРТ (Очень важно! Иначе будет черный экран паузы)
        window.EJS_startOnLoaded = true;
        
        // 5. Настройки интерфейса
        window.EJS_Buttons = {
            playPause: false,
            restart: true,
            mute: true,
            settings: true,
            fullscreen: true,
            saveState: true,
            loadState: true
        };

        logError("Конфигурация создана. Подключение ядра...");

        // Небольшая задержка, чтобы экран успел отрисоваться перед стартом тяжелого скрипта
        setTimeout(() => {
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            script.onload = () => logError("Ядро загружено! Жди заставку SEGA.");
            script.onerror = () => logError("Ошибка CDN EmulatorJS");
            document.body.appendChild(script);
        }, 100);
    }
</script>
</body>
</html>
