<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat Arena</title>
    
    <!-- Скрипты -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase 8 (Самая стабильная версия для простых файлов) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #09090b; color: white; font-family: 'Space Mono', monospace; touch-action: none; overflow: hidden; }
        .arcade-btn { background-color: #00f0ff; color: #000; font-weight: bold; text-transform: uppercase; border-radius: 4px; transition: 0.1s; }
        .arcade-btn:active { transform: scale(0.95); }
        .pixel-border { border: 2px solid rgba(0, 240, 255, 0.3); }
        /* Геймпад */
        .dpad-btn { width: 55px; height: 55px; background: #27272a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="screen-menu" class="flex flex-col h-full">
        <div class="p-4 border-b border-primary/20 bg-zinc-900 flex justify-between items-center">
            <div>
                <h1 class="text-[#00f0ff] font-bold text-lg tracking-tighter">PIXEL KOMBAT</h1>
                <p class="text-[8px] text-gray-500 uppercase">Multiplayer Edition</p>
            </div>
            <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded border border-white/10">
                <i data-lucide="star" class="w-3 h-3 text-[#00f0ff]"></i>
                <span id="ui-balance" class="text-xs font-bold text-[#00f0ff]">1000</span>
            </div>
        </div>

        <div class="p-4 space-y-4 overflow-y-auto">
            <div class="bg-zinc-900 rounded-lg overflow-hidden pixel-border">
                <div class="h-32 bg-gradient-to-r from-blue-900 to-black flex items-center justify-center">
                    <span class="text-4xl">🦔</span>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-[#00f0ff] mb-4">SONIC GENERATION</h3>
                    <div class="flex gap-2">
                        <button id="btn-host" class="flex-1 arcade-btn py-3 text-[10px]">CREATE LOBBY</button>
                        <button id="btn-join" class="flex-1 border border-[#00f0ff] text-[#00f0ff] py-3 text-[10px] rounded font-bold uppercase">JOIN P2</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ (HOST) -->
    <div id="screen-host" class="hidden fixed inset-0 bg-black flex flex-col">
        <div class="p-3 bg-zinc-900 border-b border-[#00f0ff]/30 flex justify-between items-center">
            <span class="text-[10px] text-[#00f0ff] font-bold">LOBBY ID: <span id="lobby-id-display" class="bg-white/10 px-2 rounded">...</span></span>
            <button onclick="location.reload()" class="text-[#ff003c]"><i data-lucide="x-circle"></i></button>
        </div>
        <div id="game-container" class="flex-1 w-full"></div>
    </div>

    <!-- ЭКРАН ДЖОЙСТИКА (P2) -->
    <div id="screen-controller" class="hidden fixed inset-0 bg-[#09090b] flex flex-col p-6">
        <div class="text-center mb-10">
            <div class="inline-block bg-pink-600/20 text-pink-500 border border-pink-500/50 px-4 py-1 rounded text-[10px] font-bold animate-pulse">P2 CONNECTED</div>
        </div>

        <div class="flex justify-between items-center w-full max-w-md mx-auto h-full">
            <!-- Крестовина -->
            <div class="grid grid-cols-3 gap-1">
                <div></div>
                <button id="p-up" class="dpad-btn text-white">▲</button>
                <div></div>
                <button id="p-left" class="dpad-btn text-white">◀</button>
                <div class="w-[55px] h-[55px] bg-black rounded-full border-4 border-zinc-800"></div>
                <button id="p-right" class="dpad-btn text-white">▶</button>
                <div></div>
                <button id="p-down" class="dpad-btn text-white">▼</button>
                <div></div>
            </div>

            <!-- Кнопки -->
            <div class="flex flex-col gap-6">
                <button id="p-b" class="action-btn bg-yellow-500 text-white shadow-lg">B</button>
                <div class="flex gap-4">
                    <button id="p-a" class="action-btn bg-red-600 text-white shadow-lg">A</button>
                    <button id="p-c" class="action-btn bg-blue-600 text-white shadow-lg">C</button>
                </div>
            </div>
        </div>
        <div class="text-center pb-10">
            <button id="p-start" class="px-8 py-2 bg-zinc-800 text-zinc-500 rounded-full text-xs font-bold border border-zinc-700">START</button>
        </div>
    </div>

    <!-- ЛОГИКА -->
    <script>
        (function() {
            var db;
            var currentLobby = null;
            var isHost = false;
            var p2map = { UP: "KeyI", DOWN: "KeyK", LEFT: "KeyJ", RIGHT: "KeyL", A: "KeyF", B: "KeyG", C: "KeyH", START: "KeyV" };

            // 1. Firebase Config
            var firebaseConfig = {
                apiKey: "ВСТАВЬ_СЮДА_API_KEY",
                authDomain: "ВСТАВЬ_СЮДА_PROJECT_ID.firebaseapp.com",
                projectId: "ВСТАВЬ_СЮДА_PROJECT_ID",
                storageBucket: "ВСТАВЬ_СЮДА_PROJECT_ID.appspot.com",
                messagingSenderId: "ВСТАВЬ_СЮДА_SENDER_ID",
                appId: "ВСТАВЬ_СЮДА_APP_ID"
            };

            document.addEventListener('DOMContentLoaded', function() {
                lucide.createIcons();
                
                // Инициализация Firebase
                try {
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    console.log("Firebase OK");
                } catch(e) { alert("Firebase Config Error!"); }

                // Подгрузка баланса из твоего MongoDB сервера
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand();
                    fetch('/api/user-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) document.getElementById('ui-balance').innerText = data.user.balance;
                    });
                }

                // Кнопка HOST
                document.getElementById('btn-host').addEventListener('click', function() {
                    isHost = true;
                    currentLobby = Math.random().toString(36).substring(2, 8).toUpperCase();
                    document.getElementById('screen-menu').style.display = 'none';
                    document.getElementById('screen-host').style.display = 'flex';
                    document.getElementById('lobby-id-display').innerText = currentLobby;

                    db.collection("lobbies").doc(currentLobby).set({ status: "open", controller2: null });

                    // Слушаем нажатия P2
                    db.collection("lobbies").doc(currentLobby).onSnapshot(function(doc) {
                        var data = doc.data();
                        if (data && data.controller2) {
                            var code = p2map[data.controller2.btn];
                            if (code) {
                                var eventType = data.controller2.state ? 'keydown' : 'keyup';
                                window.dispatchEvent(new KeyboardEvent(eventType, { code: code }));
                            }
                        }
                    });

                    // Запуск эмулятора
                    window.EJS_player = '#game-container';
                    window.EJS_core = 'sega';
                    window.EJS_gameUrl = 'sonic.bin';
                    window.EJS_pathtodata = 'data/cores/';
                    var s = document.createElement('script'); s.src = 'loader.js'; document.body.appendChild(s);
                });

                // Кнопка JOIN
                document.getElementById('btn-join').addEventListener('click', function() {
                    var code = prompt("ENTER LOBBY ID:");
                    if (code) {
                        currentLobby = code.toUpperCase();
                        isHost = false;
                        document.getElementById('screen-menu').style.display = 'none';
                        document.getElementById('screen-controller').style.display = 'flex';
                    }
                });

                // Обработка джойстика P2
                function bindP2(id, btnName) {
                    var el = document.getElementById(id);
                    function send(st) {
                        if (!isHost && currentLobby) {
                            db.collection("lobbies").doc(currentLobby).update({
                                controller2: { btn: btnName, state: st, ts: Date.now() }
                            });
                        }
                    }
                    el.addEventListener('pointerdown', function(e) { e.preventDefault(); send(true); });
                    el.addEventListener('pointerup', function(e) { e.preventDefault(); send(false); });
                    el.addEventListener('pointerleave', function(e) { e.preventDefault(); send(false); });
                }

                bindP2('p-up', 'UP'); bindP2('p-down', 'DOWN'); bindP2('p-left', 'LEFT'); bindP2('p-right', 'RIGHT');
                bindP2('p-a', 'A'); bindP2('p-b', 'B'); bindP2('p-c', 'C'); bindP2('p-start', 'START');
            });
        })();
    </script>
</body>
</html>
