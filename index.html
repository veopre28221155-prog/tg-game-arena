<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Battle Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/ai-engine.js"></script> <!-- ПОДКЛЮЧАЕМ ОТДЕЛЬНЫЙ МОЗГ ИИ -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        #terminal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .ai-text { font-size: 10px; color: #0f0; margin-bottom: 10px; border-left: 3px solid #0f0; padding-left: 10px; }
        #game-view { width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body>

<div id="terminal">
    <div style="font-size: 14px; color: #0f0; margin-bottom: 30px;">> AI SYSTEM INITIALIZING...</div>
    <div id="ai-logs"></div>
</div>

<div id="game-view"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const logs = document.getElementById('ai-logs');
    function log(t) {
        const d = document.createElement('div');
        d.className = 'ai-text';
        d.innerText = t;
        logs.appendChild(d);
    }

    async function initSystem() {
        log("Searching for external AI modules...");
        await new Promise(r => setTimeout(r, 1000));
        
        if (typeof NeuralSonicEngine !== 'undefined') {
            log("AI_ENGINE.JS DETECTED. Loading algorithms...");
        } else {
            log("AI_ENGINE.JS NOT FOUND. Using fallback core...");
        }

        log("Analyzing /public/sonic.bin for metadata...");
        await new Promise(r => setTimeout(r, 1500));
        log("Licence verified: SEGA GENESIS (1991)");
        log("Starting visual reconstruction...");
        
        setTimeout(() => {
            document.getElementById('terminal').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            startNeuralArena();
        }, 2000);
    }

    function startNeuralArena() {
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-view',
            backgroundColor: '#224488',
            physics: { default: 'arcade', arcade: { gravity: { y: 1500 } } },
            scene: { preload: preload, create: create, update: update }
        };
        new Phaser.Game(config);
    }

    let sonic, engine, move = {L: false, R: false, J: false};

    function preload() {
        // ИИ использует внешний модуль для создания графики
        engine = new NeuralSonicEngine(this);
        engine.reconstructAssets();
    }

    function create() {
        const platforms = this.physics.add.staticGroup();
        const floorY = window.innerHeight - 32;
        
        for(let i=0; i<15; i++) {
            platforms.create(i * 64, floorY, 'ghz_ai');
        }

        sonic = this.physics.add.sprite(100, floorY - 100, 'sonic_ai');
        engine.applyPhysics(sonic);
        this.physics.add.collider(sonic, platforms);

        // КНОПКИ УПРАВЛЕНИЯ
        const h = window.innerHeight;
        const w = window.innerWidth;
        const btn = (x, y, r, act, col) => {
            let b = this.add.circle(x, y, r, col, 0.4).setInteractive();
            b.on('pointerdown', () => move[act] = true);
            b.on('pointerup', () => move[act] = false);
        };
        btn(60, h-80, 45, 'L', 0x00f0ff);
        btn(160, h-80, 45, 'R', 0x00f0ff);
        btn(w-80, h-80, 55, 'J', 0xff0055);
    }

    function update() {
        if (move.L) { sonic.setVelocityX(-320); sonic.flipX = true; }
        else if (move.R) { sonic.setVelocityX(320); sonic.flipX = false; }
        else { sonic.setVelocityX(0); }
        if (move.J && sonic.body.touching.down) { sonic.setVelocityY(-750); }
    }

    initSystem();
</script>
</body>
</html>
