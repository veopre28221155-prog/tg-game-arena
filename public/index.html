<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat Arena</title>
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#00f0ff', secondary: '#ff003c', accent: '#00ff66', background: '#09090b', card: '#18181b' }
                }
            }
        }
    </script>

    <!-- Иконки Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #09090b; color: white; font-family: 'Space Mono', monospace; touch-action: none; user-select: none; }
        .pixel-border { box-shadow: 0 0 0 2px #00f0ff, 0 0 10px rgba(0, 240, 255, 0.2); }
        .arcade-button { background-color: #00f0ff; color: #000; font-weight: bold; text-transform: uppercase; transition: all 0.1s; border: none; }
        .arcade-button:active { transform: scale(0.95); background-color: #00c0cc; }
        
        /* Стили крутого геймпада */
        .dpad-btn { width: 50px; height: 50px; background: #27272a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #a1a1aa; }
        .dpad-btn:active { background: #00f0ff; color: black; }
        .action-btn { width: 60px; height: 60px; border-radius: 50%; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-a { background: #dc2626; } .btn-b { background: #eab308; } .btn-c { background: #2563eb; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- ГЛАВНЫЙ ЭКРАН ПРИЛОЖЕНИЯ -->
    <div id="main-app" class="flex flex-col h-full overflow-y-auto pb-24">
        
        <!-- HEADER (Профиль и баланс MongoDB) -->
        <div class="flex justify-between items-center p-4 border-b border-primary/20 bg-card">
            <div>
                <h1 class="text-primary font-bold text-lg tracking-wider">PIXEL KOMBAT</h1>
                <p class="text-[8px] text-gray-400 uppercase">Arena v1.1.0</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1 bg-primary/10 px-2 py-1 rounded border border-primary/30 text-primary text-xs">
                    <i data-lucide="star" class="w-3 h-3"></i> <span id="user-balance">...</span>
                </div>
                <div class="w-8 h-8 rounded bg-primary/20 flex items-center justify-center border border-primary text-primary">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="grid grid-cols-4 gap-1 p-4">
            <button class="py-2 text-[10px] uppercase font-bold text-primary border-b-2 border-primary">Arcade</button>
            <button class="py-2 text-[10px] uppercase text-gray-500">Lobbies</button>
            <button class="py-2 text-[10px] uppercase text-gray-500">Wallet</button>
            <button class="py-2 text-[10px] uppercase text-gray-500">Admin</button>
        </div>

        <!-- КАРТОЧКИ ИГР -->
        <div class="px-4 space-y-6">
            <!-- SONIC CARD -->
            <div class="bg-card border-2 border-primary/20 rounded-lg overflow-hidden">
                <div class="h-32 bg-[url('https://picsum.photos/seed/sonic/600/400')] bg-cover bg-center relative">
                    <div class="absolute inset-0 bg-black/50"></div>
                </div>
                <div class="p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-primary font-bold uppercase tracking-wider">Sonic SEGA</h2>
                            <p class="text-[10px] text-gray-400">1991</p>
                        </div>
                        <div class="text-[10px] bg-white/10 px-2 py-1 rounded flex items-center gap-1">
                            <i data-lucide="users" class="w-3 h-3"></i> 1-2
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startGame('sonic', true)" class="flex-1 arcade-button py-2 text-xs flex items-center justify-center gap-2 rounded">
                            <i data-lucide="play" class="w-4 h-4"></i> PLAY (HOST)
                        </button>
                        <button onclick="joinGamePrompt()" class="flex-1 bg-transparent border border-primary text-primary py-2 text-xs flex items-center justify-center gap-2 rounded">
                            <i data-lucide="gamepad-2" class="w-4 h-4"></i> JOIN P2
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ИГРОВОЙ ОВЕРЛЕЙ -->
    <div id="game-overlay" class="hidden fixed inset-0 z-50 bg-background flex-col animate-in fade-in zoom-in duration-200">
        <!-- Шапка оверлея -->
        <div class="p-4 border-b border-primary/30 flex justify-between items-center bg-card">
            <div class="flex items-center gap-2">
                <span class="text-xs text-primary uppercase font-bold">LIVE ARENA</span>
                <span id="lobby-badge" class="text-[8px] px-2 py-0.5 rounded uppercase bg-primary/20 text-primary border border-primary/50"></span>
            </div>
            <button onclick="closeGame()" class="text-primary hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Зона Эмулятора (Для HOST) -->
        <div id="emulator-zone" class="hidden flex-1 w-full bg-black relative flex items-center justify-center">
            <div class="absolute top-4 left-4 z-10 flex gap-2 text-[10px]">
                <span class="bg-black/80 text-primary border border-primary px-2 py-1 rounded">LOBBY ID: <b id="display-lobby-id" class="select-all">...</b></span>
            </div>
            <div id="game-container" class="w-full h-full max-w-3xl"></div>
        </div>

        <!-- Зона Контроллера (Для P2) -->
        <div id="controller-zone" class="hidden flex-1 flex-col items-center justify-center w-full px-4 pb-8">
            <div class="text-center space-y-2 mb-8">
                <span class="bg-secondary/20 text-secondary border border-secondary px-3 py-1 rounded text-[10px] uppercase animate-pulse">
                    P2 Controller Connected
                </span>
                <p class="text-[8px] text-gray-500 uppercase">Sending inputs to Host...</p>
            </div>

            <div class="p-6 bg-zinc-900 border-4 border-zinc-800 rounded-[2rem] shadow-2xl w-full max-w-sm aspect-[4/3] flex flex-col justify-between">
                <div class="flex justify-between items-center h-full">
                    <div class="grid grid-cols-3 gap-1">
                        <div></div>
                        <button onpointerdown="sendInput('UP', true)" onpointerup="sendInput('UP', false)" onpointerleave="sendInput('UP', false)" class="dpad-btn"><i data-lucide="chevron-up"></i></button>
                        <div></div>
                        <button onpointerdown="sendInput('LEFT', true)" onpointerup="sendInput('LEFT', false)" onpointerleave="sendInput('LEFT', false)" class="dpad-btn"><i data-lucide="chevron-left"></i></button>
                        <div class="w-[50px] h-[50px] bg-zinc-950 rounded-full border-[6px] border-zinc-800"></div>
                        <button onpointerdown="sendInput('RIGHT', true)" onpointerup="sendInput('RIGHT', false)" onpointerleave="sendInput('RIGHT', false)" class="dpad-btn"><i data-lucide="chevron-right"></i></button>
                        <div></div>
                        <button onpointerdown="sendInput('DOWN', true)" onpointerup="sendInput('DOWN', false)" onpointerleave="sendInput('DOWN', false)" class="dpad-btn"><i data-lucide="chevron-down"></i></button>
                        <div></div>
                    </div>
                    <div class="flex gap-3 items-end">
                        <button onpointerdown="sendInput('A', true)" onpointerup="sendInput('A', false)" onpointerleave="sendInput('A', false)" class="action-btn btn-a">A</button>
                        <button onpointerdown="sendInput('B', true)" onpointerup="sendInput('B', false)" onpointerleave="sendInput('B', false)" class="action-btn btn-b mb-6">B</button>
                        <button onpointerdown="sendInput('C', true)" onpointerup="sendInput('C', false)" onpointerleave="sendInput('C', false)" class="action-btn btn-c">C</button>
                    </div>
                </div>
                <div class="absolute left-1/2 -translate-x-1/2 bottom-12">
                     <button onpointerdown="sendInput('START', true)" onpointerup="sendInput('START', false)" onpointerleave="sendInput('START', false)" class="px-6 py-2 bg-zinc-800 text-zinc-400 rounded-full text-[10px] font-bold tracking-widest shadow-inner">START</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- СКРИПТЫ: MONGODB + FIREBASE + ЭМУЛЯТОР -->
    <!-- ============================================== -->
    <script type="module">
        lucide.createIcons(); // Иконки

        // --- 1. ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ ИЗ MONGODB (ТВОЙ SERVER.JS) ---
        let tgUser = "Player_" + Math.floor(Math.random() * 1000);
        
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            
            // Отправляем данные в твой server.js (как было в твоем старом проекте)
            fetch('/api/user-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success && data.user) {
                    tgUser = data.user.username;
                    document.getElementById('user-balance').innerText = data.user.balance;
                }
            })
            .catch(err => console.error("Ошибка MongoDB:", err));
        }

        // --- 2. ПОДКЛЮЧЕНИЕ К FIREBASE (ДЛЯ МУЛЬТИПЛЕЕРА) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ❌ ВСТАВЬ СЮДА СВОИ КЛЮЧИ FIREBASE ❌
        const firebaseConfig = {
            apiKey: "ВСТАВЬ_СЮДА_API_KEY",
            authDomain: "ВСТАВЬ_СЮДА_PROJECT_ID.firebaseapp.com",
            projectId: "ВСТАВЬ_СЮДА_PROJECT_ID",
            storageBucket: "ВСТАВЬ_СЮДА_PROJECT_ID.appspot.com",
            messagingSenderId: "ВСТАВЬ_СЮДА_SENDER_ID",
            appId: "ВСТАВЬ_СЮДА_APP_ID"
        };

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("FIREBASE ОШИБКА. ПРОПИШИ КЛЮЧИ!", e);
        }

        let currentLobbyId = null;
        let isHost = true;
        
        // Карта кнопок Sega
        const P2_KEYMAP = { UP: "KeyI", DOWN: "KeyK", LEFT: "KeyJ", RIGHT: "KeyL", A: "KeyF", B: "KeyG", C: "KeyH", START: "KeyV" };

        // --- 3. ИГРОВАЯ ЛОГИКА ---
        window.startGame = async function(gameId) {
            if (!db) return alert("ОШИБКА: Заполни ключи Firebase в index.html!");

            isHost = true;
            currentLobbyId = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            await setDoc(doc(db, "lobbies", currentLobbyId), {
                game: gameId, host: tgUser, status: "playing", controller2: null
            });

            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('game-overlay').classList.add('flex');
            document.getElementById('emulator-zone').classList.remove('hidden');
            document.getElementById('display-lobby-id').innerText = currentLobbyId;
            document.getElementById('lobby-badge').innerText = 'HOSTING P1';

            // Слушаем джойстик P2
            onSnapshot(doc(db, "lobbies", currentLobbyId), (docSnap) => {
                const data = docSnap.data();
                if (data && data.controller2) {
                    const input = data.controller2;
                    const keyCode = P2_KEYMAP[input.button];
                    if (keyCode) {
                        const eventType = input.state ? 'keydown' : 'keyup';
                        window.dispatchEvent(new KeyboardEvent(eventType, { code: keyCode }));
                    }
                }
            });

            // Запуск эмулятора
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = 'sonic.bin';
            window.EJS_pathtodata = 'data/cores/';

            const script = document.createElement('script');
            script.src = 'loader.js';
            document.body.appendChild(script);
        };

        window.joinGamePrompt = function() {
            if (!db) return alert("ОШИБКА: Заполни ключи Firebase в index.html!");
            const code = prompt("Enter Game LOBBY ID from Host:");
            if (code) joinGame(code.toUpperCase());
        };

        window.joinGame = async function(lobbyId) {
            isHost = false;
            currentLobbyId = lobbyId;

            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('game-overlay').classList.add('flex');
            document.getElementById('controller-zone').classList.remove('hidden');
            document.getElementById('controller-zone').classList.add('flex');
            document.getElementById('lobby-badge').innerText = 'CONTROLLER P2';
            document.getElementById('lobby-badge').className = 'text-[8px] px-2 py-0.5 rounded uppercase bg-secondary/20 text-secondary border border-secondary/50';
        };

        window.sendInput = function(button, isPressed) {
            if (!currentLobbyId || isHost || !db) return;
            updateDoc(doc(db, "lobbies", currentLobbyId), {
                controller2: { button: button, state: isPressed, timestamp: Date.now() }
            });
        };

        window.closeGame = function() {
            window.location.reload();
        };
    </script>
</body>
</html>
