<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic AI + Neural Stream</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: 'Press Start 2P', cursive; }
        
        /* Холст нативного JS движка (Fallback) */
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Контейнер для потока от Нейросети (ИИ) */
        #ai-engine-view {
            display: none; /* Скрыт по умолчанию */
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 2;
            align-items: center; justify-content: center;
        }
        #ai-engine-view img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }

        #stats { position: fixed; top: 15px; left: 15px; color: #ffff00; font-size: 10px; z-index: 10; text-shadow: 2px 2px #000; line-height: 1.5; pointer-events: none; }
        #ui { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; z-index: 10; pointer-events: none; }
        
        .btn { 
            width: 70px; height: 70px; background: rgba(0, 0, 0, 0.6); 
            border: 3px solid #00f0ff; border-radius: 50%; color: #fff; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 8px; pointer-events: auto; user-select: none;
            box-shadow: 0 0 10px #00f0ff;
        }
        .btn:active { background: #00f0ff; color: #000; }
        #btnJump { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        
        /* Индикатор подключения */
        #connection-status {
            position: fixed; top: 15px; right: 15px; font-size: 8px; color: #fff; z-index: 10;
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- UI Слои (поверх всего) -->
    <div id="stats">SCORE: 000000<br>RINGS: 0</div>
    <div id="connection-status">NATIVE MODE</div>
    
    <div id="ui">
        <div style="display:flex; gap: 15px;">
            <div class="btn" id="btnLeft">◀</div>
            <div class="btn" id="btnRight">▶</div>
        </div>
        <div class="btn" id="btnJump">JUMP</div>
    </div>

    <!-- Fallback: Нативный движок -->
    <canvas id="game"></canvas>

    <!-- AI Engine: Контейнер для стрима -->
    <div id="ai-engine-view">
        <img id="ai-frame" src="" alt="AI Stream" />
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // --- НАСТРОЙКИ СЕТИ И СОСТОЯНИЯ ---
    let ws = null;
    let isAiActive = false; // Флаг: работает ли сейчас ИИ сервер
    const aiView = document.getElementById('ai-engine-view');
    const aiFrame = document.getElementById('ai-frame');
    const canvas = document.getElementById('game');
    const statusLabel = document.getElementById('connection-status');

    // --- ФУНКЦИЯ ПОДКЛЮЧЕНИЯ К AI ENGINE ---
    function connectToAiEngine(endpoint) {
        statusLabel.innerText = "CONNECTING AI...";
        statusLabel.style.color = "yellow";

        try {
            ws = new WebSocket(endpoint);

            ws.onopen = () => {
                console.log("AI Engine Connected!");
                isAiActive = true;
                statusLabel.innerText = "AI ENGINE ACTIVE";
                statusLabel.style.color = "#00ff00";
