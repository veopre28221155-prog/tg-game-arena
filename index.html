<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Sonic Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        #ui { position: fixed; top: 10px; left: 10px; color: #fff; font-size: 8px; z-index: 10; pointer-events: none; text-shadow: 1px 1px #000; }
        .btn-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .joy-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="ui">
    SCORE: <span id="score">000000</span><br>
    TIME: <span id="time">0:00</span><br>
    RINGS: <span id="rings">0</span><br><br>
    <span style="color:#00f0ff">AI RECONSTRUCTION ACTIVE</span>
</div>

<div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        parent: 'game-container',
        pixelArt: true, // Включаем ретро-пикселизацию
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1500 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let sonic, platforms, cursors;
    let moveData = { left: false, right: false, jump: false };

    function preload() {
        // ЗАГРУЗКА ОРИГИНАЛЬНЫХ АССЕТОВ СОНИКА
        this.load.image('ghz_bg', 'https://info.sonicretro.org/images/2/2d/GHZ1_Background.png');
        this.load.image('platform', 'https://vignette.wikia.nocookie.net/sonic/images/6/60/Ghz_tile.png');
        
        // Спрайт-лист Соника (оригинальные кадры)
        this.load.spritesheet('sonic', 'https://raw.githubusercontent.com/ajm13/Sonic-Phaser/master/assets/sonic_sheet.png', { 
            frameWidth: 48, 
            frameHeight: 48 
        });
    }

    function create() {
        // 1. Создаем бесконечный фон
        let bg = this.add.tileSprite(0, 0, window.innerWidth, window.innerHeight, 'ghz_bg');
        bg.setOrigin(0, 0);
        bg.setScrollFactor(0);
        bg.setScale(2);

        // 2. Генерируем оригинальный уровень
        platforms = this.physics.add.staticGroup();
        const floorY = window.innerHeight - 40;
        
        for (let i = 0; i < 20; i++) {
            let p = platforms.create(i * 128, floorY, 'platform').setScale(1).refreshBody();
        }

        // 3. Создаем Соника
        sonic = this.physics.add.sprite(100, floorY - 100, 'sonic');
        sonic.setScale(1.5);
        sonic.setCollideWorldBounds(true);
        sonic.setBodySize(30, 40);

        // 4. ОРИГИНАЛЬНЫЕ АНИМАЦИИ
        this.anims.create({
            key: 'walk',
            frames: this.anims.generateFrameNumbers('sonic', { start: 1, end: 6 }),
            frameRate: 12, repeat: -1
        });
        this.anims.create({
            key: 'jump',
            frames: this.anims.generateFrameNumbers('sonic', { start: 15, end: 19 }),
            frameRate: 15, repeat: -1
        });
        this.anims.create({
            key: 'idle',
            frames: this.anims.generateFrameNumbers('sonic', { start: 0, end: 0 }),
            frameRate: 1
        });

        // 5. Управление
        this.physics.add.collider(sonic, platforms);
        
        // Создаем сенсорные кнопки (прозрачные зоны для управления)
        const h = window.innerHeight;
        const w = window.innerWidth;
        
        const createBtn = (x, y, radius, action) => {
            let zone = this.add.circle(x, y, radius, 0xffffff, 0.1).setInteractive();
            zone.on('pointerdown', () => moveData[action] = true);
            zone.on('pointerup', () => moveData[action] = false);
            zone.setScrollFactor(0);
        };

        createBtn(60, h-80, 50, 'left');
        createBtn(170, h-80, 50, 'right');
        createBtn(w-80, h-80, 60, 'jump');
    }

    function update() {
        const acceleration = 400;
        const maxSpeed = 400;

        if (moveData.left) {
            sonic.setVelocityX(-maxSpeed);
            sonic.flipX = true;
            if (sonic.body.touching.down) sonic.anims.play('walk', true);
        } else if (moveData.right) {
            sonic.setVelocityX(maxSpeed);
            sonic.flipX = false;
            if (sonic.body.touching.down) sonic.anims.play('walk', true);
        } else {
            sonic.setVelocityX(0);
            if (sonic.body.touching.down) sonic.anims.play('idle');
        }

        if (moveData.jump && sonic.body.touching.down) {
            sonic.setVelocityY(-850);
        }

        if (!sonic.body.touching.down) {
            sonic.anims.play('jump', true);
        }

        // Двигаем камеру за Соником
        this.cameras.main.scrollX = sonic.x - window.innerWidth/2;
    }
</script>
</body>
</html>
