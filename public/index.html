<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn { background: #111; color: var(--neon); border: 3px solid #333; padding: 12px; width: 260px; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
        .card { border: 1px dashed #444; padding: 10px; width: 260px; margin-bottom: 15px; text-align: center; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="emulator-layer"><div id="ejs-container"></div></div>
<div id="app">
    <div id="s-main" class="screen active">
        <h1 style="color:var(--neon)">DEBUG ARENA</h1>
        <div id="p-status" class="card">CHECKING AUTH...</div>
        <button class="btn" onclick="nav('s-create')">CREATE GAME</button>
        <button class="btn" onclick="listRooms()">JOIN GAME</button>
    </div>
    <div id="s-create" class="screen">
        <h2>SETUP</h2>
        <select id="g-sel" class="btn"><option value="umk3.md">MK3</option><option value="sonic.bin">SONIC</option></select>
        <button class="btn" onclick="createLobby()">CREATE</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>
    <div id="s-room" class="screen">
        <h2 id="r-lid">LOBBY</h2>
        <div id="slot-render" class="card"></div>
        <button class="btn" onclick="ready()">READY</button>
        <button class="btn" onclick="shareInv()">INVITE</button>
        <button class="btn" onclick="location.reload()">EXIT</button>
    </div>
    <div id="s-list" class="screen">
        <h2>ROOMS</h2>
        <div id="l-render"></div>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
    const socket = io({ transports: ['polling', 'websocket'] });
    let user, lobby;

    // Таймер на подключение сокета
    const socketTimeout = setTimeout(() => {
        if (!socket.connected) tg.showAlert("SOCKET_TIMEOUT: Checking alternative transports...");
    }, 5000);

    async function init() {
        if(!tg.initData) return tg.showAlert("ERR: NO_INIT_DATA. USE MOBILE.");
        console.info("Init: Sending fetch to /api/user-data");
        
        try {
            const res = await fetch('/api/user-data', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({initData: tg.initData}) 
            });
            if(!res.ok) throw new Error("HTTP_" + res.status);
            
            const r = await res.json();
            if(!r.success) throw new Error(r.error);
            
            user = r.user;
            document.getElementById('p-status').innerText = `ID: ${user.telegramId} | BAL: ${user.balance}`;
            
            const saved = sessionStorage.getItem('currentLid');
            if (saved) socket.emit('reconnect-to-slot', { rid: saved, uid: user.telegramId });

            const sp = tg.initDataUnsafe.start_param;
            if (sp && sp.startsWith('lobby_')) joinLobby(sp.replace('lobby_',''));
        } catch(e) {
            tg.showAlert("INIT_FAILED: " + e.message);
        }
    }
    init();

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    async function createLobby() {
        tg.showAlert("INFO: START_CREATE");
        const d = { uid: user.telegramId, name: user.username, game: document.getElementById('g-sel').value };
        try {
            const res = await fetch('/api/lobby/create', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(d) 
            });
            const r = await res.json();
            if(!r.success) throw new Error(r.error);
            
            lobby = r.lobby;
            sessionStorage.setItem('currentLid', lobby.lobbyId);
            socket.emit('reconnect-to-slot', { rid: lobby.lobbyId, uid: user.telegramId });
            nav('s-room');
            tg.showAlert("SUCCESS: LOBBY_CREATED_" + lobby.lobbyId);
        } catch(e) {
            tg.showAlert("CREATE_FAILED: " + e.message);
        }
    }

    async function joinLobby(lid) {
        tg.showAlert("INFO: JOINING_" + lid);
        try {
            const res = await fetch('/api/lobby/join', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({uid: user.telegramId, name: user.username, lid: lid}) 
            });
            const r = await res.json();
            if(!r.success) throw new Error(r.error);
            
            lobby = r.lobby;
            sessionStorage.setItem('currentLid', lid);
            socket.emit('reconnect-to-slot', { rid: lid, uid: user.telegramId });
            nav('s-room');
        } catch(e) {
            tg.showAlert("JOIN_FAILED: " + e.message);
        }
    }

    async function listRooms() {
        nav('s-list');
        const res = await fetch('/api/lobby/list');
        const r = await res.json();
        document.getElementById('l-render').innerHTML = r.list.map(l => `<div class="card">${l.game} <button onclick="joinLobby('${l.lobbyId}')">JOIN</button></div>`).join('') || "EMPTY";
    }

    function ready() { socket.emit('player-ready', { rid: lobby.lobbyId, uid: user.telegramId }); }

    function renderSlots(l) {
        lobby = l;
        document.getElementById('slot-render').innerHTML = l.slots.map(s => `<div>${s.name || 'EMPTY'} : ${s.ready?'OK':'..'}</div>`).join('');
    }

    socket.on('connect', () => { clearTimeout(socketTimeout); console.log("Socket Connected!"); });
    socket.on('lobby-update', renderSlots);
    socket.on('slot-confirmed', (l) => { lobby = l; nav('s-room'); renderSlots(l); });
    socket.on('launch-match', (d) => startEmu(d.game, d.game.endsWith('.nes')?'nes':'segaMD', d.lid));

    function startEmu(file, core, rid) {
        document.getElementById('app').style.display='none'; 
        document.getElementById('emulator-layer').style.display='block';
        window.EJS_player = '#ejs-container'; window.EJS_core = core; 
        window.EJS_gameUrl = window.location.origin+'/'+file;
        window.EJS_pathtodata = window.location.origin+'/data/'; 
        window.EJS_startOnLoaded = true; window.EJS_virtualGamepad = true;
        
        const pNum = lobby.slots.findIndex(s => s.uid == user.telegramId);
        window.onkeydown = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keydown', p: pNum });
        window.onkeyup = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keyup', p: pNum });
        socket.on('partner-input', (d) => { if(typeof EJS_emulator!=='undefined') EJS_emulator.gameManager.simulateInput(d.key, d.type, d.p==0?1:0); });
        const s = document.createElement('script'); s.src = window.location.ori
