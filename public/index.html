// Добавь это внутрь блока <script> в index.html
    
    socket.on('new-lobby-created', () => {
        // Если игрок сейчас на экране списка, обновляем его автоматически
        if (document.getElementById('s-list').classList.contains('active')) {
            listRooms();
        }
    });

    async function listRooms() {
        nav('s-list');
        const container = document.getElementById('l-render');
        container.innerHTML = "SEARCHING..."; // Обратная связь
        
        try {
            const r = await fetch('/api/lobby/list');
            const list = await r.json();
            
            if (!list || list.length === 0) {
                container.innerHTML = "NO ACTIVE GAMES FOUND.<br>CREATE ONE!";
                return;
            }

            container.innerHTML = list.map(l => `
                <div class="card">
                    <span style="color:var(--gold)">${l.lobbyName}</span><br>
                    GAME: ${l.game.split('.')[0]}<br>
                    STAKE: ${l.bet} 🪙
                    <button class="btn" style="width:100px; padding:5px; margin-top:5px; font-size:6px;" 
                        onclick="joinLobby('${l.lobbyId}')">JOIN</button>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "CONNECTION ERROR";
        }
    }
