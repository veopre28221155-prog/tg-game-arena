<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        h1 { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; font-size: 14px; }
        .btn { background: #1a1a1a; color: #00f0ff; border: 4px solid #000; padding: 15px; width: 260px; margin: 10px; font-family: inherit; font-size: 10px; cursor: pointer; }
        iframe { border: 4px solid #222; background: #000; width: 100% !important; max-width: 320px; height: 400px; }
        #loader { font-size: 8px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="s-menu" class="screen active">
        <h1>RETRO ARENA</h1>
        <button class="btn" onclick="nav('s-play')">🕹 ЗАПУСТИТЬ СОНИКА</button>
        <div id="u-bal">★ 0</div>
    </div>

    <div id="s-play" class="screen">
        <div id="emu-container" style="width:100%; display:flex; justify-content:center;"></div>
        <div id="loader">Загрузка данных...</div>
        <button class="btn" onclick="location.reload()" style="background:red; color:white; width:100px; padding:5px; margin-top:10px;">ВЫХОД</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 's-play') startSonic();
    }

    async function init() {
        tg.ready(); tg.expand();
        try {
            const r = await fetch('/api/user-data', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({initData:tg.initData})
            });
            const user = await r.json();
            document.getElementById('u-bal').innerText = '★ ' + user.balance;
        } catch(e) {}
    }

    function startSonic() {
        const container = document.getElementById('emu-container');
        const loader = document.getElementById('loader');
        
        // ЧИСТАЯ ССЫЛКА БЕЗ ПАРАМЕТРОВ (чтобы эмулятор видел .bin)
        const romUrl = window.location.origin + '/roms/sonic.bin';
        
        const ifr = document.createElement('iframe');
        ifr.allow = "autoplay; fullscreen";
        
        // Используем стабильный адрес эмулятора
        ifr.src = `https://emulatorjs.org/emu/index.html?game=${encodeURIComponent(romUrl)}&core=genesis`;
        
        container.innerHTML = '';
        container.appendChild(ifr);

        setTimeout(() => { loader.innerText = "Если экран черный, подождите 10 сек или очистите кэш Telegram"; }, 5000);
    }

    init();
</script>
</body>
</html>
