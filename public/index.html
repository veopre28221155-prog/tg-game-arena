<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat Arena</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#00f0ff', secondary: '#ff003c', accent: '#00ff66', background: '#09090b', card: '#18181b' } } }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ИЗМЕНЕНИЕ: Загружаем совместимую (старую) версию Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #09090b; color: white; font-family: 'Space Mono', monospace; touch-action: none; user-select: none; }
        .arcade-button { background-color: #00f0ff; color: #000; font-weight: bold; text-transform: uppercase; transition: all 0.1s; border: none; }
        .arcade-button:active { transform: scale(0.95); }
        .dpad-btn { width: 50px; height: 50px; background: #27272a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #a1a1aa; }
        .dpad-btn:active { background: #00f0ff; color: black; }
        .action-btn { width: 60px; height: 60px; border-radius: 50%; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-a { background: #dc2626; } .btn-b { background: #eab308; } .btn-c { background: #2563eb; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="main-app" class="flex flex-col h-full overflow-y-auto pb-24">
        <div class="flex justify-between items-center p-4 border-b border-primary/20 bg-card">
            <div>
                <h1 class="text-primary font-bold text-lg tracking-wider">PIXEL KOMBAT</h1>
                <p class="text-[8px] text-gray-400 uppercase">Arena v2.0</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1 bg-primary/10 px-2 py-1 rounded border border-primary/30 text-primary text-xs">
                    <i data-lucide="star" class="w-3 h-3"></i> <span id="user-balance">...</span>
                </div>
                <div class="w-8 h-8 rounded bg-primary/20 flex items-center justify-center border border-primary text-primary">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
            </div>
        </div>
        <div class="px-4 pt-6 space-y-6">
            <div class="bg-card border-2 border-primary/20 rounded-lg overflow-hidden">
                <div class="h-32 bg-[url('https://picsum.photos/seed/sonic/600/400')] bg-cover bg-center"></div>
                <div class="p-4 space-y-4">
                    <h2 class="text-primary font-bold uppercase tracking-wider">Sonic SEGA</h2>
                    <div class="flex gap-2">
                        <button onclick="window.gameAPI.startGame('sonic')" class="flex-1 arcade-button py-2 text-xs flex items-center justify-center gap-2 rounded">
                            <i data-lucide="play" class="w-4 h-4"></i> PLAY (HOST)
                        </button>
                        <button onclick="window.gameAPI.joinGamePrompt()" class="flex-1 bg-transparent border border-primary text-primary py-2 text-xs flex items-center justify-center gap-2 rounded">
                            <i data-lucide="gamepad-2" class="w-4 h-4"></i> JOIN P2
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ИГРОВОЙ ОВЕРЛЕЙ -->
    <div id="game-overlay" class="hidden fixed inset-0 z-50 bg-background flex-col">
        <div class="p-4 border-b border-primary/30 flex justify-between items-center bg-card">
            <span class="text-xs text-primary uppercase font-bold">LIVE ARENA</span>
            <button onclick="window.gameAPI.closeGame()" class="text-primary hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="emulator-zone" class="hidden flex-1 w-full bg-black relative flex items-center justify-center">
            <div class="absolute top-4 left-4 z-10 text-[10px] bg-black/80 text-primary border border-primary px-2 py-1 rounded">LOBBY ID: <b id="display-lobby-id" class="select-all">...</b></div>
            <div id="game-container" class="w-full h-full max-w-3xl"></div>
        </div>
        <div id="controller-zone" class="hidden flex-1 flex-col items-center justify-center w-full px-4 pb-8">
            <div class="p-6 bg-zinc-900 border-4 border-zinc-800 rounded-[2rem] shadow-2xl w-full max-w-sm aspect-[4/3] flex flex-col justify-between">
                <div class="flex justify-between items-center h-full">
                    <div class="grid grid-cols-3 gap-1">
                        <div></div>
                        <button onpointerdown="window.gameAPI.sendInput('UP', true)" onpointerup="window.gameAPI.sendInput('UP', false)" class="dpad-btn"><i data-lucide="chevron-up"></i></button>
                        <div></div>
                        <button onpointerdown="window.gameAPI.sendInput('LEFT', true)" onpointerup="window.gameAPI.sendInput('LEFT', false)" class="dpad-btn"><i data-lucide="chevron-left"></i></button>
                        <div class="w-[50px] h-[50px] bg-zinc-950 rounded-full border-[6px] border-zinc-800"></div>
                        <button onpointerdown="window.gameAPI.sendInput('RIGHT', true)" onpointerup="window.gameAPI.sendInput('RIGHT', false)" class="dpad-btn"><i data-lucide="chevron-right"></i></button>
                        <div></div>
                        <button onpointerdown="window.gameAPI.sendInput('DOWN', true)" onpointerup="window.gameAPI.sendInput('DOWN', false)" class="dpad-btn"><i data-lucide="chevron-down"></i></button>
                        <div></div>
                    </div>
                    <div class="flex gap-3 items-end">
                        <button onpointerdown="window.gameAPI.sendInput('A', true)" onpointerup="window.gameAPI.sendInput('A', false)" class="action-btn btn-a">A</button>
                        <button onpointerdown="window.gameAPI.sendInput('B', true)" onpointerup="window.gameAPI.sendInput('B', false)" class="action-btn btn-b mb-6">B</button>
                        <button onpointerdown="window.gameAPI.sendInput('C', true)" onpointerup="window.gameAPI.sendInput('C', false)" class="action-btn btn-c">C</button>
                    </div>
                </div>
                <div class="absolute left-1/2 -translate-x-1/2 bottom-12">
                     <button onpointerdown="window.gameAPI.sendInput('START', true)" onpointerup="window.gameAPI.sendInput('START', false)" class="px-6 py-2 bg-zinc-800 text-zinc-400 rounded-full text-[10px] font-bold">START</button>
                </div>
            </div>
        </div>
    </div>

    <!-- КНОПКА ДИАГНОСТИКИ -->
    <button onclick="window.debug.show()" style="position: fixed; bottom: 10px; right: 10px; z-index: 1000;" class="bg-yellow-500 text-black w-12 h-12 rounded-full flex items-center justify-center shadow-lg">
        <i data-lucide="bug" class="w-6 h-6"></i>
    </button>
    <div id="debug-overlay" class="hidden" style="position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.8); padding: 20px; display: flex; flex-direction: column;">
        <h2 class="text-yellow-400 text-lg font-bold mb-4">ЖУРНАЛ ОШИБОК</h2>
        <textarea id="debug-output" readonly class="w-full flex-1 bg-gray-900 text-white p-4 rounded text-xs font-mono"></textarea>
        <button onclick="document.getElementById('debug-overlay').classList.add('hidden')" class="mt-4 bg-yellow-500 text-black py-2 rounded font-bold">ЗАКРЫТЬ</button>
    </div>

    <!-- ============================================== -->
    <!-- СКРИПТЫ СОВМЕСТИМОЙ ВЕРСИИ -->
    <!-- ============================================== -->
    <script>
        // --- 0. СИСТЕМА ДИАГНОСТИКИ ---
        (function() {
            const errorLogs = [];
            window.debug = { logs: errorLogs };
            const originalConsoleLog = console.log;
            
            window.onerror = function(message, source, lineno, colno, error) {
                const formattedError = `[ОШИБКА]: ${message}`;
                errorLogs.push(formattedError);
                return true;
            };
            console.log = function(...args) {
                const formattedLog = `[ЛОГ]: ${args.map(a => JSON.stringify(a)).join(' ')}`;
                errorLogs.push(formattedLog);
                originalConsoleLog.apply(console, args);
            };

            window.debug.show = function() {
                const output = document.getElementById('debug-output');
                output.value = errorLogs.length > 0 ? errorLogs.join('\n\n') : "Ошибок не найдено.";
                document.getElementById('debug-overlay').classList.remove('hidden');
            };

            console.log("Диагностика запущена.");
        })();
        
        // --- 1. ИГРОВАЯ ЛОГИКА ---
        (function() {
            console.log("Инициализация игрового API...");
            lucide.createIcons();
            
            let db;
            let currentLobbyId = null;
            let isHost = true;
            const P2_KEYMAP = { UP: "KeyI", DOWN: "KeyK", LEFT: "KeyJ", RIGHT: "KeyL", A: "KeyF", B: "KeyG", C: "KeyH", START: "KeyV" };
            
            // ❌❌❌ ВСТАВЬ СЮДА СВОИ КЛЮЧИ, ИНАЧЕ НИЧЕГО НЕ ЗАРАБОТАЕТ ❌❌❌
            const firebaseConfig = {
                apiKey: "ВСТАВЬ_СЮДА_API_KEY",
                authDomain: "ВСТАВЬ_СЮДА_PROJECT_ID.firebaseapp.com",
                projectId: "ВСТАВЬ_СЮДА_PROJECT_ID",
                storageBucket: "ВСТАВЬ_СЮДА_PROJECT_ID.appspot.com",
                messagingSenderId: "ВСТАВЬ_СЮДА_SENDER_ID",
                appId: "ВСТАВЬ_СЮДА_APP_ID"
            };

            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("Firebase успешно инициализирован.");
            } catch (e) {
                console.log("КРИТИЧЕСКАЯ ОШИБКА FIREBASE:", e.message);
            }

            // Загрузка данных из MongoDB
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
                fetch('/api/user-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.user) {
                        console.log("Данные из MongoDB:", data.user.balance);
                        document.getElementById('user-balance').innerText = data.user.balance;
                    } else { throw new Error("Ответ от /api/user-data не успешен"); }
                })
                .catch(err => console.log("Ошибка MongoDB:", err.message));
            }

            // Экспортируем функции в глобальный объект, чтобы кнопки их видели
            window.gameAPI = {
                startGame: async function(gameId) {
                    if (!db) return window.debug.show();
                    console.log("Создание игры...");
                    isHost = true;
                    currentLobbyId = Math.random().toString(36).substring(2, 8).toUpperCase();
                    
                    await db.collection("lobbies").doc(currentLobbyId).set({
                        game: gameId, status: "playing", controller2: null
                    });
                    
                    document.getElementById('main-app').classList.add('hidden');
                    document.getElementById('game-overlay').classList.remove('hidden');
                    document.getElementById('game-overlay').classList.add('flex');
                    document.getElementById('emulator-zone').classList.remove('hidden');
                    document.getElementById('display-lobby-id').innerText = currentLobbyId;

                    db.collection("lobbies").doc(currentLobbyId).onSnapshot((doc) => {
                        const data = doc.data();
                        if (data && data.controller2) {
                            const input = data.controller2;
                            const keyCode = P2_KEYMAP[input.button];
                            if (keyCode) window.dispatchEvent(new KeyboardEvent(input.state ? 'keydown' : 'keyup', { code: keyCode }));
                        }
                    });

                    console.log("Загрузка эмулятора...");
                    window.EJS_player = '#game-container'; window.EJS_core = 'sega'; window.EJS_gameUrl = 'sonic.bin'; window.EJS_pathtodata = 'data/cores/';
                    const script = document.createElement('script'); script.src = 'loader.js'; document.body.appendChild(script);
                },

                joinGamePrompt: function() {
                    if (!db) return window.debug.show();
                    const code = prompt("Enter Game LOBBY ID from Host:");
                    if (code) this.joinGame(code.toUpperCase());
                },

                joinGame: function(lobbyId) {
                    console.log(`Подключение к ${lobbyId}...`);
                    isHost = false; currentLobbyId = lobbyId;
                    document.getElementById('main-app').classList.add('hidden');
                    document.getElementById('game-overlay').classList.add('hidden');
                    document.getElementById('game-overlay').classList.add('flex');
                    document.getElementById('controller-zone').classList.remove('hidden');
                    document.getElementById('controller-zone').classList.add('flex');
                },

                sendInput: function(button, isPressed) {
                    if (!currentLobbyId || isHost || !db) return;
                    db.collection("lobbies").doc(currentLobbyId).update({
                        controller2: { button: button, state: isPressed }
                    });
                },

                closeGame: () => window.location.reload()
            };
            console.log("Игровое API готово.");
        })();
    </script>
</body>
</html>
