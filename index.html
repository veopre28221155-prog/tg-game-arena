<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --tg-text: #ffffff; --accent-neon: #00f0ff; --accent-pink: #ff0055; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font-retro); height: 100vh; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .screen.active { display: flex; }
        
        .btn-pixel { background: #222; color: #fff; border: 4px solid #000; padding: 15px; width: 100%; max-width: 300px; font-family: var(--font-retro); margin-bottom: 15px; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .btn-pixel:active { transform: translateY(2px); background: #333; }
        
        #emulator-container {
            width: 100%;
            height: 65vh; 
            background: #000;
            border: 2px solid var(--accent-neon);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            position: relative; /* Для кнопки СТАРТ */
        }
        
        /* НАША НОВАЯ КНОПКА СТАРТ */
        #start-emu-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            color: #00ff00;
            border: 4px solid #00ff00;
            padding: 20px 30px;
            font-size: 1.5rem;
            font-family: var(--font-retro);
            cursor: pointer;
            z-index: 100;
            display: none; /* Скрыта пока игра не загрузится */
            box-shadow: 0 0 20px rgba(0,255,0,0.5);
            text-shadow: 2px 2px 0 #000;
        }
        #start-emu-button:active { background: #222; }

    </style>
</head>
<body>

<div id="app">
    <!-- МЕНЮ -->
    <div id="s-main" class="screen active" style="justify-content: center;">
        <h1 style="color:var(--accent-neon); text-align:center;">RETRO ARENA</h1>
        <button class="btn-pixel" onclick="launchSega('sonic.bin')">🎮 SONIC THE HEDGEHOG</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="s-game" class="screen" style="padding: 10px;">
        <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px;">
            <button class="btn-pixel" style="width:auto; padding:8px; font-size:10px; border-color:var(--accent-pink);" onclick="location.reload()">❌ ВЫЙТИ</button>
            <div style="color:gold; font-size:10px; padding-top:10px;">SEGA GENESIS</div>
        </div>

        <!-- Контейнер для эмулятора и кнопки СТАРТ -->
        <div style="position: relative; width: 100%; height: 65vh;">
            <div id="emulator-container"></div>
            <button id="start-emu-button" onclick="runEmulator()">▶ СТАРТ</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; 
    tg.ready(); 
    tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    function navScreen(id) { 
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function runEmulator() {
        // Эта функция будет вызвана кнопкой СТАРТ
        if (window.EJS_emulator) {
            window.EJS_emulator.start();
            document.getElementById('start-emu-button').style.display = 'none'; // Прячем кнопку после старта
        }
    }

    function launchSega(romName) {
        navScreen('s-game');
        
        const romUrl = window.location.origin + '/' + romName;

        window.EJS_player = '#emulator-container'; 
        window.EJS_core = 'segaMD'; 
        window.EJS_gameUrl = romUrl; 
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        // --- ГЛАВНОЕ ИЗМЕНЕНИЕ ---
        // Отключаем автостарт. Мы запустим игру сами.
        window.EJS_startOnLoaded = false;
        
        // Отключаем кнопки Сохранения, чтобы не мешали
        window.EJS_Buttons = {
            playPause: false, restart: true, mute: true, settings: true,
            fullscreen: true, saveState: false, loadState: false 
        };

        // Эта функция сработает, когда эмулятор скачает игру и будет готов
        window.EJS_onGameLoaded = function() {
            console.log("Игра загружена в память. Показываем кнопку СТАРТ.");
            document.getElementById('start-emu-button').style.display = 'block';
        };

        // Загружаем скрипт эмулятора
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    }
</script>
</body>
</html>
