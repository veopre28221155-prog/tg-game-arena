<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena Solo-Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --gold: #ffd700; --pink: #ff0055; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; justify-content: center; }
        .screen.active { display: flex; }
        .btn { background: #111; color: var(--neon); border: 3px solid #333; padding: 12px; width: 260px; margin-bottom: 8px; cursor: pointer; font-family: inherit; text-transform: uppercase; }
        .btn-gold { color: var(--gold); border-color: var(--gold); }
        .card { border: 1px dashed #444; padding: 10px; width: 260px; margin-bottom: 15px; text-align: center; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
        .scroll-list { width: 100%; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
<div id="emulator-layer"><div id="ejs-container"></div><button onclick="location.reload()" style="position:absolute;top:10px;right:10px;z-index:100;background:red;color:#fff;border:none;padding:8px;font-family:inherit;">EXIT</button></div>
<div id="app">
    <div id="s-main" class="screen active">
        <h1 style="color:var(--neon)">RETRO ARENA</h1>
        <div class="card">BALANCE: <span id="p-bal">0</span></div>
        <button class="btn" onclick="nav('s-solo')">🕹️ ОДИНОЧНАЯ ИГРА</button>
        <button class="btn btn-gold" onclick="nav('s-create')">🤝 СОЗДАТЬ ЛОББИ</button>
        <button class="btn" onclick="listRooms()">📋 НАЙТИ ИГРУ</button>
        <button class="btn" style="color:var(--pink)" onclick="nav('s-profile')">👤 ПРОФИЛЬ</button>
    </div>

    <div id="s-solo" class="screen">
        <h2>LIBRARY</h2>
        <div class="scroll-list" id="solo-render"></div>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-create" class="screen">
        <h2>SETUP</h2>
        <select id="g-sel" class="btn"></select>
        <button class="btn btn-gold" onclick="createLobby()">CREATE</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-room" class="screen">
        <div id="slot-render" class="card"></div>
        <button class="btn btn-gold" onclick="ready()">READY</button>
        <button class="btn" onclick="shareInv()">INVITE</button>
        <button class="btn" onclick="location.reload()">EXIT</button>
    </div>

    <div id="s-list" class="screen"><div id="l-render" class="scroll-list"></div><button class="btn" onclick="nav('s-main')">BACK</button></div>
</div>

<script>
    const tg = window.Telegram.WebApp; const socket = io();
    let user, lobby, score = 0;
    const GAMES = ['umk3.md', 'battletoads.md', 'comix.md', 'sonic2.md', 'tanks.nes', 'tmnt.md', 'sunset.md', 'roadrash.md', 'simpsons.md', 'lionking.md', 'jurassic.md'];

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    async function init() {
        tg.expand();
        const r = await (await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) })).json();
        user = r.user; document.getElementById('p-bal').innerText = user.balance;
        
        // Render Solo List
        document.getElementById('solo-render').innerHTML = GAMES.map(g => `<button class="btn" style="font-size:6px" onclick="startEmu('${g}', '', '', true)">${g.replace('.md','').replace('.nes','')}</button>`).join('');
        document.getElementById('g-sel').innerHTML = GAMES.map(g => `<option value="${g}">${g}</option>`).join('');

        const sp = tg.initDataUnsafe.start_param;
        if (sp && sp.startsWith('lobby_')) joinLobby(sp.replace('lobby_',''));
    }
    init();

    async function createLobby() {
        const d = { uid: user.telegramId, name: user.username, game: document.getElementById('g-sel').value };
        const res = await (await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) })).json();
        if(res.success) { lobby = res.lobby; socket.emit('sync-me', lobby.lobbyId); nav('s-room'); renderSlots(lobby); }
    }

    async function joinLobby(lid) {
        const res = await (await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({uid:user.telegramId, name:user.username, lid}) })).json();
        if(res.success) { lobby = res.lobby; socket.emit('sync-me', lid); nav('s-room'); renderSlots(lobby); }
    }

    async function listRooms() {
        nav('s-list');
        const r = await (await fetch('/api/lobby/list')).json();
        document.getElementById('l-render').innerHTML = r.list.map(l => `<div class="card">${l.game} <button class="btn" style="width:70px;padding:5px" onclick="joinLobby('${l.lobbyId}')">JOIN</button></div>`).join('') || "EMPTY";
    }

    function ready() { socket.emit('player-ready', { rid: lobby.lobbyId, uid: user.telegramId }); }
    function renderSlots(l) { lobby = l; document.getElementById('slot-render').innerHTML = `P1: ${l.name1} ${l.r1?'✅':'⏳'}<br>P2: ${l.name2||'WAIT'} ${l.r2?'✅':'⏳'}`; }

    socket.on('lobby-update', renderSlots);
    socket.on('launch-match', (d) => startEmu(d.game, '', d.lid, false));

    function startEmu(file, dummy, rid, isSolo) {
        let core = 'segaMD';
        if(file.endsWith('.nes')) core = 'nes';
        if(file.endsWith('.sfc')) core = 'snes';

        document.getElementById('app').style.display='none'; 
        document.getElementById('emulator-layer').style.display='block';
        document.getElementById('ejs-container').innerHTML = "";

        window.EJS_player = '#ejs-container'; window.EJS_core = core; 
        window.EJS_gameUrl = window.location.origin+'/'+file;
        window.EJS_pathtodata = window.location.origin+'/data/'; 
        window.EJS_startOnLoaded = true; window.EJS_virtualGamepad = true;
        
        if(!isSolo) {
            const pNum = user.telegramId == lobby.creatorId ? 0 : 1;
            window.onkeydown = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keydown', p: pNum });
            window.onkeyup = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keyup', p: pNum });
            socket.on('partner-input', (d) => { if(typeof EJS_emulator!=='undefined') EJS_emulator.gameManager.simulateInput(d.key, d.type, d.p==0?1:0); });
        }
        const s = document.createElement('script'); s.src = window.location.origin+'/data/loader.js'; document.body.appendChild(s);
    }
    function shareInv() { tg.openTelegramLink(`https://t.me/RetroBattleArena_bot/app?startapp=lobby_${lobby.lobbyId}`); }
</script>
</body>
</html>
