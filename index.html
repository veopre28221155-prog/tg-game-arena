<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --accent: #00f0ff; --font: 'Press Start 2P', cursive; }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        h1 { color: var(--accent); font-size: 16px; margin-top: 40px; text-shadow: 0 0 10px var(--accent); }
        .btn { background: #111; color: #0f0; border: 4px solid #444; padding: 15px; font-family: var(--font); font-size: 12px; cursor: pointer; margin-top: 20px; width: 80%; }
        #emulator-container { width: 100%; height: 50vh; background: #111; border: 2px solid #333; position: relative; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f0; color: #000; border: none; padding: 15px; font-family: var(--font); z-index: 100; display: none; }
        #debug { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 9px; overflow-y: auto; padding: 5px; }
    </style>
</head>
<body>

<div id="debug">Инициализация...</div>

<div id="s-main" class="screen active">
    <h1>RETRO ARENA</h1>
    <button class="btn" onclick="start('sonic.bin')">ИГРАТЬ В SONIC</button>
</div>

<div id="s-game" class="screen">
    <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#555; font-size:10px; padding:5px; margin-bottom:5px;">НАЗАД</button>
    <div id="emulator-container">
        <button id="start-btn" onclick="runEmu()">СТАРТ</button>
    </div>
    <p id="st" style="font-size:9px; color:gold; margin-top:10px;">Загрузка движка...</p>
</div>

<script>
    const dbg = document.getElementById('debug');
    function log(m) { dbg.innerHTML += `> ${m}<br>`; dbg.scrollTop = dbg.scrollHeight; }

    function start(rom) {
        document.getElementById('s-main').classList.remove('active');
        document.getElementById('s-game').classList.add('active');

        log('Запуск мобильной версии...');

        // Настройки для обхода блокировок Telegram WebView
        window.EJS_player = '#emulator-container';
        window.EJS_gameUrl = window.location.origin + '/' + rom + '?v=' + Date.now();
        window.EJS_core = 'genesis'; // Пробуем это ядро
        window.EJS_pathtodata = 'https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/'; // Альтернативный CDN
        window.EJS_startOnLoaded = false;
        window.EJS_threads = false; 
        window.EJS_WS = false; // Отключаем веб-сокеты движка
        
        window.EJS_onGameLoaded = () => {
            log('СИСТЕМА ГОТОВА!');
            document.getElementById('st').innerText = 'Загружено!';
            document.getElementById('start-btn').style.display = 'block';
        };

        const s = document.createElement('script');
        s.src = 'https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js';
        s.onerror = () => log('Ошибка загрузки скрипта');
        document.body.appendChild(s);
    }

    function runEmu() {
        if (window.EJS_emulator) {
            window.EJS_emulator.start();
            document.getElementById('start-btn').style.display = 'none';
        }
    }
</script>
</body>
</html>
