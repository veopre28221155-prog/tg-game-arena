<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-text: #fff; --accent-neon: #00f0ff; --accent-gold: #ffd700; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #050505; color: #fff; font-family: var(--font-retro); overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn-pixel { background: #1a1a1a; color: var(--accent-neon); border: 4px solid #000; padding: 15px; width: 100%; max-width: 320px; font-family: inherit; font-size: 9px; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; }
        .btn-gold { color: var(--accent-gold); }
        .card { background: #111; border: 2px dashed #444; padding: 15px; width: 100%; max-width: 320px; margin-bottom: 20px; font-size: 8px; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <div style="position:absolute; top:15px; left:15px; z-index:10001; color:gold;">SCORE: <span id="emu-score">0</span></div>
    <button onclick="sendResultAndExit()" style="position:absolute; top:15px; right:15px; z-index:10001; background:red; color:white; border:none; padding:10px; font-family:inherit; font-size:8px;">ФИНИШ</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="s-main" class="screen active" style="justify-content:center;">
        <h1 style="color:var(--accent-neon); font-size: 14px;">RETRO ARENA</h1>
        <div class="card">БАЛАНС: <span id="p-bal" style="color:gold">0</span> 🪙</div>
        <button class="btn-pixel" onclick="navScreen('s-emu-menu')">🕹️ ОДИНОЧНАЯ ИГРА</button>
        <button class="btn-pixel btn-gold" onclick="navScreen('s-lobby-create')">🤝 СОЗДАТЬ ЛОББИ</button>
        <button class="btn-pixel" onclick="openLobbyList()">📋 СПИСОК ИГР</button>
        <button class="btn-pixel" style="color:#f05" onclick="navScreen('s-profile')">👤 ПРОФИЛЬ</button>
    </div>

    <!-- СОЗДАНИЕ ЛОББИ -->
    <div id="s-lobby-create" class="screen">
        <h2>НОВАЯ ИГРА</h2>
        <select id="game-select" class="btn-pixel" style="background:#000; color:#fff;">
            <option value="umk3.md">MORTAL KOMBAT 3</option>
            <option value="tanks.nes">ТАНЧИКИ</option>
            <option value="sonic2.md">SONIC 2</option>
        </select>
        <input type="number" id="bet-input" class="btn-pixel" placeholder="Ставка (0 = FREE)" style="background:#000; color:#fff;">
        <label style="font-size:8px;"><input type="checkbox" id="private-check"> СКРЫТОЕ (ПО ССЫЛКЕ)</label>
        <button class="btn-pixel btn-gold" style="margin-top:20px;" onclick="requestLobbyCreate()">СОЗДАТЬ</button>
        <button class="btn-pixel" onclick="navScreen('s-main')">◀ НАЗАД</button>
    </div>

    <!-- ОЖИДАНИЕ ИГРОКА -->
    <div id="s-waiting" class="screen" style="justify-content:center;">
        <h2>ОЖИДАНИЕ...</h2>
        <div id="invite-box" class="card" style="display:none;">
            <p>Отправь инвайт другу:</p>
            <button class="btn-pixel btn-gold" onclick="shareInvite()">📤 ПРИГЛАСИТЬ</button>
        </div>
        <button class="btn-pixel" onclick="location.reload()">ОТМЕНА</button>
    </div>

    <!-- СПИСОК ЛОББИ -->
    <div id="s-lobby-list" class="screen">
        <h2>ОТКРЫТЫЕ ИГРЫ</h2>
        <div id="list-container" style="width:100%;"></div>
        <button class="btn-pixel" onclick="navScreen('s-main')">◀ НАЗАД</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const socket = io();
    let user = null, lobby = null, currentScore = 0;

    async function init() {
        tg.expand();
        const r = await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) });
        user = await r.json();
        document.getElementById('p-bal').innerText = user.balance;

        const sp = tg.initDataUnsafe.start_param;
        if(sp && sp.startsWith('lobby_')) joinLobby(sp.replace('lobby_',''));
    }
    init();

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function requestLobbyCreate() {
        const game = document.getElementById('game-select').value;
        const bet = parseInt(document.getElementById('bet-input').value) || 0;
        const isPrivate = document.getElementById('private-check').checked;

        const r = await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, gameType: game, betAmount: bet, isPrivate, isFree: bet===0}) });
        const res = await r.json();
        if(res.success) {
            lobby = res.lobby;
            navScreen('s-waiting');
            if(isPrivate || bet===0) {
                document.getElementById('invite-box').style.display = 'block';
            }
            socket.emit('join-room', lobby.lobbyId);
        }
    }

    function shareInvite() {
        const url = `https://t.me/RetroBattleArena_bot/app?startapp=lobby_${lobby.lobbyId}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Заходи в игру!`);
    }

    async function openLobbyList() {
        navScreen('s-lobby-list');
        const r = await fetch('/api/lobbies');
        const list = await r.json();
        document.getElementById('list-container').innerHTML = list.map(l => `
            <div class="card">${l.gameType.toUpperCase()} | ${l.betAmount} 🪙 <button class="btn-pixel" onclick="joinLobby('${l.lobbyId}')">JOIN</button></div>
        `).join('');
    }

    async function joinLobby(id) {
        const r = await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, lobbyId: id}) });
        const res = await r.json();
        if(!res.success) tg.showAlert("Ошибка входа!");
        else socket.emit('join-room', id);
    }

    socket.on('start-match', (data) => {
        startEmu(data.game, data.game.endsWith('.nes') ? 'nes' : 'sega', data.lobbyId);
    });

    function startEmu(file, core, lid) {
        document.getElementById('emulator-layer').style.display = 'block';
        window.EJS_player = '#ejs-container';
        window.EJS_core = core;
        window.EJS_gameUrl = '/' + file;
        window.EJS_pathtodata = 'data/';
        window.EJS_startOnLoaded = true;

        window.EJS_onGameStart = () => {
            setInterval(() => {
                if (typeof EJS_emulator !== 'undefined') {
                    const ram = EJS_emulator.gameManager.getWRam();
                    if (file.includes('sonic')) currentScore = ram[0xFE20] || 0;
                    else if (file.includes('umk3')) currentScore = ram[0xB110] || 0;
                    document.getElementById('emu-score').innerText = currentScore;
                }
            }, 1000);
        };

        window.addEventListener("keydown", (e) => {
            socket.emit('emu-input', { roomId: lid, key: e.keyCode, type: 'keydown', pNum: user.telegramId === lobby?.player1Id ? 0 : 1 });
        });
        socket.on('partner-input', (data) => {
            if (typeof EJS_emulator !== 'undefined') EJS_emulator.gameManager.simulateInput(data.key, data.type, data.pNum === 0 ? 1 : 0);
        });

        const s = document.createElement('script');
        s.src = 'data/loader.js';
        document.body.appendChild(s);
    }

    function sendResultAndExit() {
        socket.emit('match-finished', { roomId: lobby.lobbyId || sp.replace('lobby_',''), telegramId: user.telegramId, score: currentScore });
        tg.showAlert("Счет отправлен!");
        location.reload();
    }

    socket.on('results', (data) => {
        tg.showPopup({ title: 'МАТЧ ОКОНЧЕН', message: data.winnerId === user.telegramId ? `ПОБЕДА! Вы выиграли ${data.prize} 🪙` : 'Поражение...' });
        init();
    });
</script>
</body>
</html>
