<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Arena Slots</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --gold: #ffd700; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn { background: #111; color: var(--neon); border: 3px solid #000; padding: 12px; width: 260px; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
        .slot { background: #111; border: 1px dashed #444; padding: 8px; width: 240px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <button onclick="location.reload()" style="position:absolute; top:10px; right:10px; z-index:100; background:red; color:#fff; border:none; padding:8px;">EXIT</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <div id="s-main" class="screen active">
        <h1 style="color:var(--neon)">ARENA SLOTS</h1>
        <button class="btn" onclick="nav('s-create')">CREATE LOBBY</button>
        <button class="btn" onclick="listRooms()">JOIN GAME</button>
    </div>

    <div id="s-create" class="screen">
        <h2>ROOM SETUP</h2>
        <select id="g-sel" class="btn"><option value="umk3.md">MK3</option><option value="sonic2.md">SONIC 2</option></select>
        <select id="p-size" class="btn"><option value="2">2 PLAYERS</option></select>
        <button class="btn" onclick="createLobby()">CREATE</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-room" class="screen">
        <h2 id="r-lid">LOBBY</h2>
        <div id="slot-render"></div>
        <button class="btn" id="ready-btn" onclick="ready()">I'M READY</button>
        <button class="btn" onclick="shareInv()">INVITE</button>
    </div>

    <div id="s-list" class="screen">
        <h2>BROWSE</h2>
        <div id="l-render"></div>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; const socket = io();
    let user, lobby;

    async function init() {
        const r = await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) });
        user = await r.json();
        
        const savedLid = sessionStorage.getItem('currentLid');
        if (savedLid) socket.emit('reconnect-to-slot', { rid: savedLid, uid: user.telegramId });

        const sp = tg.initDataUnsafe.start_param;
        if (sp && sp.startsWith('lobby_')) joinLobby(sp.replace('lobby_',''));
    }
    init();

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    async function createLobby() {
        const d = { uid: user.telegramId, name: user.username, game: document.getElementById('g-sel').value, size: parseInt(document.getElementById('p-size').value) };
        const res = await (await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) })).json();
        if(res.success) { 
            lobby = res.lobby; 
            sessionStorage.setItem('currentLid', lobby.lobbyId);
            socket.emit('reconnect-to-slot', { rid: lobby.lobbyId, uid: user.telegramId });
            nav('s-room'); renderSlots(lobby);
        }
    }

    async function joinLobby(lid) {
        sessionStorage.setItem('currentLid', lid);
        socket.emit('occupy-slot', { rid: lid, uid: user.telegramId, name: user.username });
        nav('s-room');
    }

    async function listRooms() {
        nav('s-list');
        const list = await (await fetch('/api/lobby/list')).json();
        document.getElementById('l-render').innerHTML = list.map(l => `<div class="slot">${l.game} <button onclick="joinLobby('${l.lobbyId}')">JOIN</button></div>`).join('');
    }

    function ready() { socket.emit('toggle-ready', { rid: lobby.lobbyId, uid: user.telegramId }); }

    function renderSlots(l) {
        lobby = l;
        document.getElementById('slot-render').innerHTML = l.slots.map(s => `
            <div class="slot"><span>${s.name || 'EMPTY'}</span> <span>${s.ready ? '✅' : '⏳'}</span></div>
        `).join('');
    }

    socket.on('lobby-update', renderSlots);
    socket.on('slot-confirmed', (l) => { lobby = l; nav('s-room'); renderSlots(l); });

    socket.on('launch-match', (d) => {
        document.getElementById('app').style.display='none'; 
        document.getElementById('emulator-layer').style.display='block';
        window.EJS_player = '#ejs-container'; window.EJS_core = d.game.endsWith('.nes')?'nes':'segaMD'; 
        window.EJS_gameUrl = window.location.origin+'/'+d.game;
        window.EJS_pathtodata = window.location.origin+'/data/'; window.EJS_startOnLoaded = true;
        window.EJS_virtualGamepad = true;
        
        const pNum = lobby.slots.findIndex(s => s.uid == user.telegramId);
        window.onkeydown = (e) => socket.emit('emu-input', { rid: d.lid, key: e.keyCode, type: 'keydown', p: pNum });
        window.onkeyup = (e) => socket.emit('emu-input', { rid: d.lid, key: e.keyCode, type: 'keyup', p: pNum });
        socket.on('partner-input', (data) => {
            if(typeof EJS_emulator !== 'undefined') EJS_emulator.gameManager.simulateInput(data.key, data.type, data.p == 0 ? 1 : 0);
        });
        const s = document.createElement('script'); s.src = window.location.origin+'/data/loader.js'; document.body.appendChild(s);
    });

    function shareInv() { tg.openTelegramLink(`https://t.me/RetroBattleArena_bot/app?startapp=lobby_${lobby.lobbyId}`); }
</script>
</body>
</html>
