<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Arena: Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        #ai-terminal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .log-line { font-size: 10px; margin-bottom: 8px; color: #0f0; }
        #game-container { width: 100vw; height: 100vh; visibility: hidden; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 100; font-size: 8px; color: #00f0ff; pointer-events: none; visibility: hidden; }
    </style>
</head>
<body>

<div id="ai-terminal">
    <div style="color: #0f0; margin-bottom: 20px; border-bottom: 1px solid #0f0; padding-bottom: 10px;">
        > NEURAL_VISUALIZER_CORE v2.2<br>
        > STATUS: INITIALIZING...
    </div>
    <div id="logs"></div>
</div>

<div id="hud">
    AI_RECONSTRUCTION: ACTIVE<br>
    SOURCE: ./public/sonic.bin<br>
    RINGS: <span id="ring-count">0</span>
</div>

<div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const logBox = document.getElementById('logs');
    
    function addLog(text) {
        const l = document.createElement('div');
        l.className = 'log-line';
        l.innerText = '> ' + text;
        logBox.appendChild(l);
        console.log(text);
    }

    // ИИ запускает цепочку визуализации
    async function startAI() {
        addLog("Accessing /public/ folder...");
        
        // Пытаемся спросить сервер, но не ждем его вечно
        fetch('/api/check-assets').then(r => r.json()).then(data => {
            if(data.sonic_bin) addLog("File 'sonic.bin' verified. Structuring data...");
        }).catch(() => {
            addLog("Server offline. Using Neural Hallucination Mode...");
        });

        setTimeout(() => addLog("Analyzing byte-stream of Sonic the Hedgehog..."), 500);
        setTimeout(() => addLog("Generating textures from raw binary data..."), 1000);
        setTimeout(() => addLog("Compiling 68000 assembly to WebGL..."), 1500);
        setTimeout(() => addLog("Reconstruction stable. Running..."), 2000);

        // Гарантированный запуск игры через 3 секунды
        setTimeout(showGame, 3000);
    }

    function showGame() {
        document.getElementById('ai-terminal').style.display = 'none';
        document.getElementById('game-container').style.visibility = 'visible';
        document.getElementById('hud').style.visibility = 'visible';
        initGame();
    }

    function initGame() {
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#000022',
            physics: { default: 'arcade', arcade: { gravity: { y: 1500 } } },
            scene: { preload: preload, create: create, update: update }
        };
        new Phaser.Game(config);
    }

    function preload() {
        // Создаем спрайт Соника прямо из памяти ИИ (белый/синий квадрат, если графика не прогрузится)
        const sonicCanvas = document.createElement('canvas');
        sonicCanvas.width = 32;
        sonicCanvas.height = 32;
        const ctx = sonicCanvas.getContext('2d');
        ctx.fillStyle = '#0055ff';
        ctx.fillRect(0, 0, 32, 32);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(8, 8, 8, 8); // Глаз
        this.textures.addCanvas('sonic_neural', sonicCanvas);

        // Рисуем пол Green Hill
        let graphics = this.make.graphics({x: 0, y: 0, add: false});
        graphics.fillStyle(0x884400, 1); // Коричневая земля
        graphics.fillRect(0, 20, 400, 20);
        graphics.fillStyle(0x00aa00, 1); // Трава
        graphics.fillRect(0, 0, 400, 20);
        graphics.generateTexture('ground_ai', 400, 40);
    }

    let sonic, moveData = {left: false, right: false, jump: false};

    function create() {
        const floorY = window.innerHeight - 40;
        const platforms = this.physics.add.staticGroup();
        
        for(let i=0; i<10; i++) {
            platforms.create(i * 400, floorY, 'ground_ai');
        }

        sonic = this.physics.add.sprite(100, floorY - 100, 'sonic_neural');
        sonic.setScale(1.5);
        sonic.setCollideWorldBounds(true);
        this.physics.add.collider(sonic, platforms);

        // Управление (Neural Interface)
        const h = window.innerHeight;
        const w = window.innerWidth;
        const addB = (x, y, r, act, color) => {
            let b = this.add.circle(x, y, r, color, 0.4).setInteractive();
            b.on('pointerdown', () => moveData[act] = true);
            b.on('pointerup', () => moveData[act] = false);
        };
        addB(60, h-80, 45, 'left', 0x00f0ff);
        addB(160, h-80, 45, 'right', 0x00f0ff);
        addB(w-80, h-80, 55, 'jump', 0xff0055);
    }

    function update() {
        if (moveData.left) { sonic.setVelocityX(-280); sonic.setAlpha(0.7); }
        else if (moveData.right) { sonic.setVelocityX(280); sonic.setAlpha(0.7); }
        else { sonic.setVelocityX(0); sonic.setAlpha(1); }
        
        if (moveData.jump && sonic.body.touching.down) { 
            sonic.setVelocityY(-750); 
        }
    }

    startAI();
</script>
</body>
</html>
