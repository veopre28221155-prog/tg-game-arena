<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #game-container { width: 100%; height: 100%; z-index: 1; }
        #overlay { position: fixed; z-index: 10; text-align: center; color: #00f0ff; font-family: sans-serif; }
        .btn { padding: 20px 40px; background: #00f0ff; color: #000; border: none; font-weight: bold; font-size: 20px; cursor: pointer; border-radius: 10px; box-shadow: 0 0 20px #00f0ff; }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn" onclick="start()">ИГРАТЬ (START)</button>
        <p id="msg">Нажмите для активации видео и звука</p>
    </div>

    <div id="game-container"></div>

    <script>
        function start() {
            document.getElementById('overlay').style.display = 'none';

            window.EmuJS = {
                // Прямой путь к данным эмулятора
                dataUrl: "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/",
                gameUrl: window.location.origin + "/assets/data.bin",
                core: "genesis",
                autoStart: true,
                container: "#game-container"
            };

            // Загружаем ядро
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js";
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
