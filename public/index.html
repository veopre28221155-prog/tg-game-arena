<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Arena Netplay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --gold: #ffd700; --pink: #ff0055; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn { background: #111; color: var(--neon); border: 3px solid #000; padding: 14px; width: 270px; margin-bottom: 10px; cursor: pointer; font-family: inherit; text-transform: uppercase; }
        .btn-gold { color: var(--gold); border-color: var(--gold); }
        .card { background: #111; border: 2px dashed #444; padding: 10px; width: 270px; margin-bottom: 15px; text-align: center; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
        .multi-tag { font-size: 6px; color: #0f0; margin-left: 5px; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <div style="position:absolute; top:10px; left:10px; color:gold; z-index:100;">SCORE: <span id="emu-score">0</span></div>
    <button onclick="location.reload()" style="position:absolute; top:10px; right:10px; z-index:100; background:red; color:#fff; border:none; padding:8px; font-family:inherit;">EXIT</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <div id="s-main" class="screen active">
        <h1 style="color:var(--neon); font-size:12px;">RETRO ARENA</h1>
        <div class="card">BALANCE: <span id="p-bal">0</span> 🪙</div>
        <button class="btn" onclick="nav('s-solo')">🕹️ ОДИНОЧНАЯ</button>
        <button class="btn btn-gold" onclick="nav('s-create')">🤝 СОЗДАТЬ ЛОББИ</button>
        <button class="btn" onclick="listRooms()">📋 НАЙТИ ИГРУ</button>
        <button class="btn" style="color:var(--pink)" onclick="tg.showAlert('ID: '+user.telegramId)">👤 ПРОФИЛЬ</button>
    </div>

    <div id="s-solo" class="screen">
        <h2>SOLO PLAY</h2>
        <button class="btn" onclick="startEmu('umk3.md','segaMD',true)">MK3</button>
        <button class="btn" onclick="startEmu('sonic.bin','segaMD',true)">SONIC</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-create" class="screen">
        <h2>2P CO-OP GAMES</h2>
        <select id="g-sel" class="btn">
            <option value="umk3.md">🐉 MK3 (Versus)</option>
            <option value="battletoads.md">🐸 Battletoads (Co-op)</option>
            <option value="tanks.nes">🚜 Tanks (Co-op)</option>
            <option value="tmnt.md">🐢 TMNT (Co-op)</option>
            <option value="sunset.md">🤠 Sunset Riders</option>
        </select>
        <button class="btn btn-gold" onclick="createLobby()">START SERVER</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-room" class="screen">
        <h2 id="r-game">GAME</h2>
        <div class="card" id="slot-render"></div>
        <button class="btn btn-gold" id="btn-ready" onclick="setReady()">READY</button>
        <button class="btn" onclick="shareInv()">INVITE</button>
        <button class="btn" onclick="location.reload()">EXIT</button>
    </div>

    <div id="s-list" class="screen">
        <h2>ONLINE</h2>
        <div id="l-render"></div>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; const socket = io();
    let user, lobby, score = 0;

    async function init() {
        const r = await (await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) })).json();
        user = r.user; document.getElementById('p-bal').innerText = user.balance;
        const sp = tg.initDataUnsafe.start_param;
        if(sp && sp.startsWith('lobby_')) joinLobby(sp.replace('lobby_',''));
    }
    init();

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    async function createLobby() {
        const d = { uid: user.telegramId, name: user.username, lname: "ARENA", game: document.getElementById('g-sel').value, bet: 0, priv: false };
        const res = await (await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) })).json();
        if(res.success) { lobby = res.lobby; socket.emit('join-room', lobby.lobbyId); nav('s-room'); updateUI(lobby); }
    }

    async function joinLobby(lid) {
        const res = await (await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({uid:user.telegramId, name:user.username, lid}) })).json();
        if(res.success) { lobby = res.lobby; socket.emit('join-room', lid); nav('s-room'); updateUI(lobby); }
    }

    async function listRooms() {
        nav('s-list');
        const list = await (await fetch('/api/lobby/list')).json();
        document.getElementById('l-render').innerHTML = list.map(l => `<div class="card">${l.game}<br><button class="btn" style="width:80px;padding:5px" onclick="joinLobby('${l.lobbyId}')">JOIN</button></div>`).join('') || "EMPTY";
    }

    function setReady() { socket.emit('player-ready', { rid: lobby.lobbyId, uid: user.telegramId }); document.getElementById('btn-ready').innerText="WAITING..."; }
    function updateUI(l) { lobby = l; document.getElementById('slot-render').innerHTML = `P1: ${l.name1} ${l.r1?'✅':'⏳'}<br>P2: ${l.name2||'WAIT'} ${l.r2?'✅':'⏳'}`; }

    socket.on('lobby-update', updateUI);
    socket.on('launch-match', (d) => startEmu(d.game, d.game.endsWith('.nes')?'nes':'segaMD', d.lid, false));

    function startEmu(file, core, rid, isSolo) {
        document.getElementById('app').style.display='none'; 
        document.getElementById('emulator-layer').style.display='block';
        document.getElementById('ejs-container').innerHTML = "";

        window.EJS_player = '#ejs-container'; window.EJS_core = core; 
        window.EJS_gameUrl = window.location.origin+'/'+file;
        window.EJS_pathtodata = window.location.origin+'/data/'; 
        window.EJS_startOnLoaded = true; window.EJS_virtualGamepad = true;

        window.EJS_onGameStart = () => {
            // ПРИНУДИТЕЛЬНЫЙ ПЕРЕЗАПУСК ДЛЯ СИНХРОНИЗАЦИИ
            if(EJS_emulator.gameManager) EJS_emulator.gameManager.restart();
            
            setInterval(() => {
                if (typeof EJS_emulator !== 'undefined') {
                    const ram = EJS_emulator.gameManager.getWRam();
                    score = file.includes('sonic') ? ram[0xFE20] : (file.includes('umk3') ? ram[0xB110] : 0);
                    document.getElementById('emu-score').innerText = score;
                }
            }, 1000);
        };

        if(!isSolo) {
            const isHost = user.telegramId == lobby.creatorId;
            const myPort = isHost ? 0 : 1; // Хост управляет Портом 0, Гость - Портом 1

            window.onkeydown = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keydown', pNum: myPort });
            window.onkeyup = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keyup', pNum: myPort });

            socket.on('partner-input', (d) => {
                if(typeof EJS_emulator !== 'undefined' && EJS_emulator.gameManager) {
                    // Инжектируем нажатие партнера в его родной порт
                    EJS_emulator.gameManager.simulateInput(d.key, d.type, d.pNum);
                }
            });
        }
        
        const s = document.createElement('script'); s.src = window.location.origin+'/data/loader.js?v='+Date.now(); document.body.appendChild(s);
    }

    function shareInv() { tg.openTelegramLink(`https://t.me/RetroBattleArena_bot/app?startapp=lobby_${lobby.lobbyId}`); }
</script>
</body>
</html>
