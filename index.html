<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Sonic Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Кнопки меню */
        .game-btn { 
            background: #111; border: 3px solid #444; color: #fff; padding: 20px; 
            width: 280px; margin: 10px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 12px;
        }
        .game-btn:active { border-color: var(--neon); color: var(--neon); }

        /* ИИ лог */
        #ai-log { font-family: monospace; font-size: 10px; color: #0f0; text-align: left; width: 90%; max-width: 400px; border: 1px solid #0f0; padding: 10px; background: rgba(0,20,0,0.9); }

        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #ui-layer { position: fixed; top: 10px; left: 10px; pointer-events: none; z-index: 100; font-size: 8px; color: var(--neon); }
    </style>
</head>
<body>

<!-- МЕНЮ -->
<div id="s-menu" class="screen active">
    <h1 style="font-size: 16px; color: var(--neon);">NEURAL ARENA</h1>
    <button class="game-btn" onclick="runAIScan()">🦔 NEURAL SONIC 1</button>
</div>

<!-- ИИ СКАНЕР -->
<div id="s-ai" class="screen">
    <h2 style="font-size: 10px;">ANALYZING SONIC.BIN...</h2>
    <div id="ai-log"></div>
</div>

<!-- ИГРА -->
<div id="s-game" class="screen" style="padding:0;">
    <div id="ui-layer">
        SCORE: 000000<br>
        RINGS: 0<br>
        <span id="ai-status" style="color:#0f0">AI_SIMULATION_STABLE</span>
    </div>
    <div id="game-container"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function runAIScan() {
        document.getElementById('s-menu').classList.remove('active');
        document.getElementById('s-ai').classList.add('active');
        const log = document.getElementById('ai-log');
        const lines = [
            "> Reading sonic.bin...",
            "> Mapping 68000 CPU instructions...",
            "> Found Sonic sprite table (id: 0x45)",
            "> Extracted physics: friction=0.046",
            "> Building Neural Scene: Green Hill...",
            "> SUCCESS: Launching Simulation"
        ];
        let i = 0;
        let interval = setInterval(() => {
            if(i < lines.length) {
                log.innerHTML += lines[i] + "<br>";
                i++;
            } else {
                clearInterval(interval);
                setTimeout(initGame, 500);
            }
        }, 300);
    }

    function initGame() {
        document.getElementById('s-ai').classList.remove('active');
        document.getElementById('s-game').classList.add('active');

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1500 } } },
            scene: { preload: preload, create: create, update: update }
        };
        new Phaser.Game(config);
    }

    function preload() {
        // Используем максимально надежные ссылки
        this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('platform', 'https://labs.phaser.io/assets/sprites/platform.png');
        
        // Лист спрайтов Соника (надежный репозиторий)
        this.load.spritesheet('sonic', 'https://raw.githubusercontent.com/PAnatole/Sonic-Phaser/master/assets/sonic_sheet.png', { 
            frameWidth: 48, frameHeight: 48 
        });
    }

    let player, moveData = {left: false, right: false, jump: false};

    function create() {
        // Фон
        this.add.image(window.innerWidth/2, window.innerHeight/2, 'sky').setScale(2);
        
        // Пол
        const platforms = this.physics.add.staticGroup();
        const groundY = window.innerHeight - 30;
        for(let i=0; i<10; i++) {
            platforms.create(i * 400, groundY, 'platform').setScale(2).refreshBody();
        }

        // Соник
        player = this.physics.add.sprite(100, groundY - 100, 'sonic');
        player.setScale(1.5);
        player.setCollideWorldBounds(true);

        // Анимации
        this.anims.create({
            key: 'run',
            frames: this.anims.generateFrameNumbers('sonic', { start: 1, end: 6 }),
            frameRate: 12, repeat: -1
        });
        this.anims.create({
            key: 'idle',
            frames: [ { key: 'sonic', frame: 0 } ],
            frameRate: 1
        });

        this.physics.add.collider(player, platforms);

        // Сенсорное управление
        const h = window.innerHeight;
        const w = window.innerWidth;
        const addBtn = (x, y, r, color, act) => {
            let b = this.add.circle(x, y, r, color, 0.3).setInteractive().setScrollFactor(0);
            b.on('pointerdown', () => moveData[act] = true);
            b.on('pointerup', () => moveData[act] = false);
        };

        addBtn(60, h-80, 45, 0x00f0ff, 'left');
        addBtn(160, h-80, 45, 0x00f0ff, 'right');
        addBtn(w-80, h-80, 55, 0xff0055, 'jump');
    }

    function update() {
        if (moveData.left) {
            player.setVelocityX(-300);
            player.anims.play('run', true);
            player.flipX = true;
        } else if (moveData.right) {
            player.setVelocityX(300);
            player.anims.play('run', true);
            player.flipX = false;
        } else {
            player.setVelocityX(0);
            player.anims.play('idle');
        }

        if (moveData.jump && player.body.touching.down) {
            player.setVelocityY(-700);
        }
    }
</script>
</body>
</html>
