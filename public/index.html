<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat Arena</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/data/emulator.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #09090b; color: white; font-family: 'Space Mono', monospace; overflow: hidden; margin: 0; }
        .arcade-btn { background-color: #00f0ff; color: #000; font-weight: bold; text-transform: uppercase; border-radius: 4px; border: none; cursor: pointer; font-size: 9px; }
        .arcade-btn:active { transform: scale(0.95); }
        .pixel-border { border: 2px solid rgba(0, 240, 255, 0.2); }
        .tab-btn { font-size: 9px; font-weight: bold; color: #71717a; text-transform: uppercase; padding: 12px 0; border-bottom: 2px solid transparent; width: 100%; background: transparent; border: none; }
        .tab-btn.active { color: #00f0ff; border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); }
        
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; }
        #game-container { width: 100%; height: 100%; flex: 1; }

        .dpad-btn { width: 55px; height: 55px; background: #27272a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        
        /* Эффект CRT монитора */
        .scanlines { position: relative; overflow: hidden; }
        .scanlines::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col h-screen scanlines">

    <!-- HEADER -->
    <div class="p-4 border-b border-white/5 bg-zinc-900 flex justify-between items-center z-10">
        <h1 class="text-[#00f0ff] font-bold text-lg tracking-tighter italic uppercase">Pixel Arena</h1>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded border border-white/10 text-[#00f0ff]">
            <i data-lucide="coins" class="w-3 h-3 text-yellow-500"></i>
            <span id="ui-balance" class="text-xs font-bold">1000</span>
        </div>
    </div>

    <!-- TABS NAVIGATION -->
    <div class="flex bg-zinc-900 border-b border-white/5 z-10">
        <button id="tab-arcade" class="tab-btn active">Arcade</button>
        <button id="tab-wallet" class="tab-btn">Wallet</button>
        <button id="tab-profile" class="tab-btn">Profile</button>
        <button id="tab-admin" class="tab-btn hidden">Admin</button>
    </div>

    <!-- CONTENT AREA -->
    <div id="content-screen" class="flex-1 overflow-y-auto p-4 space-y-4 bg-zinc-950 pb-20">
        
        <!-- ARCADE SECTION -->
        <div id="sect-arcade" class="space-y-4">
            <!-- SONIC -->
            <div class="bg-zinc-900 rounded-lg overflow-hidden pixel-border p-4 flex gap-4 items-center">
                <div class="w-20 h-20 bg-blue-900 rounded flex items-center justify-center text-4xl">🦔</div>
                <div class="flex-1">
                    <h3 class="font-bold text-white text-xs uppercase italic">Sonic The Hedgehog</h3>
                    <div class="flex gap-2 mt-3">
                        <button onclick="window.gameAPI.play('sonic.bin', true)" class="arcade-btn flex-1 py-2">Solo</button>
                        <button onclick="window.gameAPI.host('sonic.bin')" class="arcade-btn flex-1 py-2 bg-pink-600 text-white">Lobby</button>
                    </div>
                </div>
            </div>

            <!-- MORTAL KOMBAT -->
            <div class="bg-zinc-900 rounded-lg overflow-hidden pixel-border p-4 flex gap-4 items-center">
                <div class="w-20 h-20 bg-red-900 rounded flex items-center justify-center text-4xl">🐉</div>
                <div class="flex-1">
                    <h3 class="font-bold text-white text-xs uppercase italic">UMK 3</h3>
                    <div class="flex gap-2 mt-3">
                        <button onclick="window.gameAPI.play('umk3.md', true)" class="arcade-btn flex-1 py-2">Solo</button>
                        <button onclick="window.gameAPI.host('umk3.md')" class="arcade-btn flex-1 py-2 bg-pink-600 text-white">Lobby</button>
                    </div>
                </div>
            </div>

            <!-- COMIX ZONE -->
            <div class="bg-zinc-900 rounded-lg overflow-hidden pixel-border p-4 flex gap-4 items-center">
                <div class="w-20 h-20 bg-yellow-900 rounded flex items-center justify-center text-4xl">👊</div>
                <div class="flex-1">
                    <h3 class="font-bold text-white text-xs uppercase italic">Comix Zone</h3>
                    <div class="flex gap-2 mt-3">
                        <button onclick="window.gameAPI.play('comix.md', true)" class="arcade-btn flex-1 py-2">Solo</button>
                        <button onclick="window.gameAPI.host('comix.md')" class="arcade-btn flex-1 py-2 bg-pink-600 text-white">Lobby</button>
                    </div>
                </div>
            </div>

            <button onclick="window.gameAPI.joinPrompt()" class="w-full bg-zinc-800 text-gray-400 py-3 rounded text-[9px] font-bold uppercase border border-white/5">Connect to Lobby ID</button>
        </div>

        <!-- WALLET SECTION -->
        <div id="sect-wallet" class="hidden space-y-6">
            <div class="bg-zinc-900 p-6 rounded-lg pixel-border">
                <h3 class="text-[#00f0ff] font-bold text-xs uppercase mb-4 italic">Deposit Stars</h3>
                <p class="text-[8px] text-gray-400 mb-4">1 STAR = 1 COIN. Manual transfer to Admin card.</p>
                <div class="space-y-4 text-[10px]">
                    <div class="bg-black p-3 rounded font-mono text-primary border border-primary/20">5559 4941 3152 2061</div>
                    <input id="dep-amount" type="number" placeholder="Amount Stars" class="w-full bg-black p-3 rounded border border-white/10 outline-none">
                    <button onclick="window.gameAPI.requestDeposit()" class="w-full arcade-btn py-3">Submit Request</button>
                </div>
            </div>
        </div>

        <!-- PROFILE SECTION -->
        <div id="sect-profile" class="hidden space-y-4">
            <div class="bg-zinc-900 p-8 rounded-lg pixel-border text-center">
                <div class="w-16 h-16 rounded-full bg-cyan-500/10 mx-auto mb-4 border border-cyan-500/30 flex items-center justify-center">
                    <i data-lucide="user" class="text-cyan-400 w-8 h-8"></i>
                </div>
                <h2 id="prof-name" class="text-lg font-bold uppercase italic tracking-tighter">---</h2>
                <p id="prof-id" class="text-[8px] text-gray-600 mt-2 uppercase">Warrior ID: ---</p>
            </div>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-overlay">
        <div class="h-[50px] bg-zinc-900 border-b border-white/10 flex justify-between items-center px-4">
            <span id="lobby-id-display" class="text-[10px] text-white font-bold bg-white/10 px-2 rounded tracking-widest uppercase">SOLO</span>
            <button onclick="location.reload()" class="text-white/40"><i data-lucide="x-circle"></i></button>
        </div>
        <div id="game-container"></div>
    </div>

    <!-- P2 CONTROLLER -->
    <div id="screen-controller" class="hidden fixed inset-0 bg-black z-[200] flex flex-col p-6">
        <div class="flex justify-between items-center w-full max-w-md mx-auto h-full">
            <div class="grid grid-cols-3 gap-2">
                <div></div><button id="p-up" class="dpad-btn">▲</button><div></div>
                <button id="p-left" class="dpad-btn">◀</button>
                <div class="w-[55px] h-[55px] bg-zinc-900 rounded-full border-4 border-black"></div>
                <button id="p-right" class="dpad-btn">▶</button>
                <div></div><button id="p-down" class="dpad-btn">▼</button><div></div>
            </div>
            <div class="flex flex-col gap-6">
                <button id="p-b" class="action-btn bg-yellow-500">B</button>
                <div class="flex gap-4">
                    <button id="p-a" class="action-btn bg-red-600">A</button>
                    <button id="p-c" class="action-btn bg-blue-600">C</button>
                </div>
            </div>
        </div>
        <div class="text-center pb-12"><button id="p-start" class="px-10 py-3 bg-zinc-800 text-zinc-400 rounded-full text-xs font-bold uppercase tracking-widest border border-zinc-700">Start</button></div>
    </div>

    <script>
        (function() {
            var db, currentLobby = null, isHost = false, myUser = null;
            var p2map = { UP: "KeyI", DOWN: "KeyK", LEFT: "KeyJ", RIGHT: "KeyL", A: "KeyF", B: "KeyG", C: "KeyH", START: "KeyV" };

            var firebaseConfig = {
                projectId: "studio-8235565247-f8a50",
                appId: "1:924081428998:web:8c62d7a8df8676cb7e8187",
                apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo",
                authDomain: "studio-8235565247-f8a50.firebaseapp.com",
                messagingSenderId: "924081428998"
            };

            document.addEventListener('DOMContentLoaded', function() {
                lucide.createIcons();
                try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } catch(e) {}

                // NAVIGATION
                const tabs = ['arcade', 'wallet', 'profile', 'admin'];
                tabs.forEach(tab => {
                    const btn = document.getElementById('tab-' + tab);
                    if(btn) btn.onclick = function() {
                        tabs.forEach(t => {
                            const b = document.getElementById('tab-' + t);
                            const s = document.getElementById('sect-' + t);
                            if(b) b.classList.remove('active');
                            if(s) s.classList.add('hidden');
                        });
                        this.classList.add('active');
                        document.getElementById('sect-' + tab).classList.remove('hidden');
                    };
                });

                // FETCH USER FROM MONGO
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand();
                    fetch('/api/user-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            myUser = data.user;
                            document.getElementById('ui-balance').innerText = myUser.balance;
                            document.getElementById('prof-balance').innerText = myUser.balance;
                            document.getElementById('prof-name').innerText = myUser.username;
                            document.getElementById('prof-id').innerText = "TG-ID: " + myUser.telegramId;
                            if(myUser.telegramId === 698298064) document.getElementById('tab-admin').classList.remove('hidden'); // Пример админ ID
                        }
                    });
                }

                window.gameAPI = {
                    play: function(rom, solo) {
                        document.getElementById('game-overlay').style.display = 'flex';
                        window.EJS_player = '#game-container';
                        window.EJS_core = 'sega';
                        window.EJS_gameUrl = '/' + rom;
                        window.EJS_pathtodata = '/data/';
                        var s = document.createElement('script');
                        s.src = '/data/loader.js';
                        document.body.appendChild(s);
                    },
                    host: function(rom) {
                        const bet = prompt("Enter Bet Amount (Coins):", "100");
                        if(!bet || parseInt(bet) > parseInt(document.getElementById('ui-balance').innerText)) return alert("Low Balance!");
                        
                        isHost = true;
                        currentLobby = Math.random().toString(36).substring(2, 8).toUpperCase();
                        document.getElementById('lobby-id-display').innerText = "ID: " + currentLobby;
                        
                        db.collection("lobbies").doc(currentLobby).set({ 
                            rom: rom, bet: bet, host: myUser.username, status: "open", controller2: null 
                        });
                        
                        db.collection("lobbies").doc(currentLobby).onSnapshot(doc => {
                            var d = doc.data();
                            if(d && d.controller2) {
                                var code = p2map[d.controller2.btn];
                                if(code) window.dispatchEvent(new KeyboardEvent(d.controller2.state ? 'keydown' : 'keyup', { code: code }));
                            }
                        });
                        this.play(rom, false);
                    },
                    joinPrompt: function() {
                        var code = prompt("ENTER LOBBY ID:");
                        if(code) {
                            currentLobby = code.toUpperCase();
                            isHost = false;
                            document.getElementById('screen-controller').classList.remove('hidden');
                            document.getElementById('screen-controller').style.display = 'flex';
                        }
                    },
                    requestDeposit: function() {
                        const amt = document.getElementById('dep-amount').value;
                        if(!amt) return;
                        db.collection("transactions").add({
                            user: myUser.username,
                            type: "deposit",
                            amount: amt,
                            status: "pending",
                            ts: Date.now()
                        });
                        alert("Request Sent! Wait for Admin.");
                    }
                };

                function bind(id, btn) {
                    var el = document.getElementById(id);
                    function send(s) {
                        if(currentLobby && db && !isHost) {
                            db.collection("lobbies").doc(currentLobby).update({
                                controller2: { btn: btn, state: s }
                            });
                        }
                    }
                    el.onpointerdown = e => { e.preventDefault(); send(true); };
                    el.onpointerup = el.onpointerleave = e => { e.preventDefault(); send(false); };
                }
                bind('p-up', 'UP'); bind('p-down', 'DOWN'); bind('p-left', 'LEFT'); bind('p-right', 'RIGHT');
                bind('p-a', 'A'); bind('p-b', 'B'); bind('p-c', 'C'); bind('p-start', 'START');
            });
        })();
    </script>
</body>
</html>
