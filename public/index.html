<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Kombat Arena</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/data/emulator.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
        
        :root { --p: #00f0ff; --s: #ff003c; --a: #05ff00; --bg: #030303; }
        
        body { background: var(--bg); color: white; font-family: 'Space Mono', monospace; overflow: hidden; margin: 0; }
        .font-retro { font-family: 'Orbitron', sans-serif; }

        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border: 1px solid var(--p); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        
        /* Кнопки */
        .btn-core { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
        .btn-core:active { transform: scale(0.95); opacity: 0.8; }
        .btn-p { background: var(--p); color: black; font-weight: 900; }
        .btn-s { border: 1px solid var(--p); color: var(--p); font-weight: 800; }

        /* Эмулятор и джойстик */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .dpad-btn { width: 60px; height: 60px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 0 #000; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; font-weight: bold; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 rgba(0,0,0,0.4); }
        
        .tab-btn { flex: 1; padding: 15px 0; font-size: 9px; font-weight: 900; text-transform: uppercase; color: #555; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--p); border-bottom-color: var(--p); background: linear-gradient(to top, rgba(0,240,255,0.05), transparent); }

        /* Анимации */
        @keyframes pulse-neon { 0% { box-shadow: 0 0 5px var(--p); } 50% { box-shadow: 0 0 20px var(--p); } 100% { box-shadow: 0 0 5px var(--p); } }
        .live-tag { animation: pulse-neon 2s infinite; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- TOP BAR -->
    <header class="p-4 bg-zinc-950 flex justify-between items-center border-b border-white/5 relative z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500/10 rounded-xl border border-cyan-500/30 flex items-center justify-center">
                <i data-lucide="gamepad-2" class="text-cyan-400 w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-white font-retro font-bold text-sm tracking-tighter italic">ARENA<span class="text-primary">X</span></h1>
                <p class="text-[7px] text-zinc-500 uppercase font-bold tracking-[0.2em]">Sega Engine v2.5</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-2xl border border-white/5 shadow-inner">
            <i data-lucide="zap" class="w-3 h-3 text-yellow-400 fill-yellow-400"></i>
            <span id="ui-balance" class="text-xs font-black text-white">---</span>
        </div>
    </header>

    <!-- CONTENT -->
    <main id="main-scroll" class="flex-1 overflow-y-auto pb-24">
        
        <!-- ARCADE SCREEN -->
        <section id="scr-arcade" class="p-5 space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Available Titles</h2>
                <div class="flex gap-1">
                    <div class="w-1 h-1 bg-primary rounded-full animate-ping"></div>
                    <span class="text-[7px] text-primary uppercase font-bold">Servers: Online</span>
                </div>
            </div>

            <!-- Sonic -->
            <div class="arcade-card glass rounded-2xl p-4 space-y-4 border border-white/5">
                <div class="h-44 bg-[url('https://picsum.photos/seed/sonic/800/400')] bg-cover bg-center rounded-xl relative group">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                    <span class="absolute top-3 left-3 bg-black/80 text-[7px] font-bold px-2 py-1 rounded-md text-cyan-400 border border-cyan-400/20 uppercase tracking-widest">Genesis Classic</span>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="font-retro text-sm text-white italic">Sonic The Hedgehog</h3>
                        <p class="text-[8px] text-zinc-500 mt-1 uppercase font-bold">High Stakes • 2 Players</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.app.play('sonic.bin')" class="btn-core btn-p px-6 py-3 rounded-lg text-[9px]">PLAY</button>
                        <button onclick="window.app.host('sonic.bin', 'Sonic')" class="btn-core btn-s px-4 py-3 rounded-lg text-[9px]"><i data-lucide="plus" class="w-3 h-3"></i></button>
                    </div>
                </div>
            </div>

            <!-- UMK3 -->
            <div class="arcade-card glass rounded-2xl p-4 space-y-4 border border-white/5">
                <div class="h-44 bg-[url('https://picsum.photos/seed/mk/800/400')] bg-cover bg-center rounded-xl grayscale hover:grayscale-0 transition-all duration-500">
                    <div class="absolute inset-0 bg-black/40"></div>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="font-retro text-sm text-white italic">Mortal Kombat 3</h3>
                        <p class="text-[8px] text-zinc-500 mt-1 uppercase font-bold">PvP Tournament • 2 Players</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.app.play('umk3.md')" class="btn-core btn-p px-6 py-3 rounded-lg text-[9px] !bg-red-600 !text-white">PLAY</button>
                        <button onclick="window.app.host('umk3.md', 'MK3')" class="btn-core btn-s px-4 py-3 rounded-lg text-[9px] !border-red-600 !text-red-600"><i data-lucide="plus" class="w-3 h-3"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- LOBBIES SCREEN -->
        <section id="scr-lobbies" class="hidden p-5 space-y-4">
            <h2 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Global Battle List</h2>
            <div id="lobbies-list" class="space-y-3">
                <!-- Живые лобби -->
            </div>
        </section>

        <!-- WALLET SCREEN -->
        <section id="scr-wallet" class="hidden p-5 space-y-6 text-center">
            <div class="glass p-8 rounded-3xl border-primary/20 space-y-4">
                <i data-lucide="wallet" class="w-12 h-12 text-primary mx-auto"></i>
                <h3 class="text-xs font-bold uppercase tracking-widest">Balance Refill</h3>
                <div class="p-4 bg-black/50 rounded-xl border border-white/5 font-mono text-xs text-primary tracking-wider">
                    <p class="text-[7px] text-zinc-500 mb-2 uppercase">ALFA Card</p>
                    5559 4941 3152 2061
                </div>
                <input id="dep-amt" type="number" placeholder="Enter Amount" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl text-center font-bold text-white text-sm focus:border-primary outline-none">
                <button onclick="window.app.deposit()" class="w-full btn-core btn-p py-4 rounded-xl text-[10px] uppercase tracking-widest">Request Deposit</button>
            </div>
        </section>
    </main>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-0 inset-x-0 h-20 glass border-t border-white/5 grid grid-cols-4 px-2 pb-4 z-[100]">
        <button onclick="window.app.tab('arcade')" id="nav-arcade" class="nav-item tab-btn active">
            <i data-lucide="layout-grid" class="w-5 h-5 mx-auto"></i> Arcade
        </button>
        <button onclick="window.app.tab('lobbies')" id="nav-lobbies" class="nav-item tab-btn">
            <i data-lucide="swords" class="w-5 h-5 mx-auto"></i> Lobbies
        </button>
        <button onclick="window.app.tab('wallet')" id="nav-wallet" class="nav-item tab-btn">
            <i data-lucide="credit-card" class="w-5 h-5 mx-auto"></i> Wallet
        </button>
        <button onclick="window.app.tab('profile')" id="nav-profile" class="nav-item tab-btn">
            <i data-lucide="fingerprint" class="w-5 h-5 mx-auto"></i> Info
        </button>
    </nav>

    <!-- OVERLAYS -->
    <div id="game-overlay">
        <div class="h-16 bg-zinc-950 flex justify-between items-center px-5 border-b border-primary/20">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
                <span id="game-tag" class="text-[9px] font-bold text-white uppercase tracking-widest">Solo Session</span>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full text-zinc-500"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="game-container" class="flex-1"></div>
    </div>

    <!-- P2 CONTROLLER -->
    <div id="screen-controller" class="hidden fixed inset-0 bg-black z-[2000] flex flex-col p-8">
        <div class="flex-1 flex flex-col justify-around items-center max-w-lg mx-auto w-full">
            <div class="grid grid-cols-3 gap-3">
                <div></div><button id="p-up" class="dpad-btn text-zinc-400"><i data-lucide="chevron-up"></i></button><div></div>
                <button id="p-left" class="dpad-btn text-zinc-400"><i data-lucide="chevron-left"></i></button>
                <div class="w-[60px] h-[60px] bg-zinc-900 rounded-full border-4 border-black flex items-center justify-center shadow-inner">
                    <div class="w-2 h-2 bg-primary rounded-full blur-[2px]"></div>
                </div>
                <button id="p-right" class="dpad-btn text-zinc-400"><i data-lucide="chevron-right"></i></button>
                <div></div><button id="p-down" class="dpad-btn text-zinc-400"><i data-lucide="chevron-down"></i></button><div></div>
            </div>
            <div class="flex flex-col gap-10 items-center">
                <button id="p-b" class="action-btn bg-yellow-500 t
