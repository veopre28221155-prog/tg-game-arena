<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena Snapshot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --gold: #ffd700; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn { background: #111; color: var(--neon); border: 3px solid #333; padding: 12px; width: 260px; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
        .card { border: 1px dashed #444; padding: 10px; width: 260px; margin-bottom: 15px; text-align: center; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
        #sync-indicator { position: absolute; bottom: 10px; left: 10px; z-index: 10000; font-size: 6px; color: #555; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <div id="sync-indicator">[SYNC: WAIT]</div>
    <div style="position:absolute; top:10px; left:10px; color:gold; z-index:100;">SCORE: <span id="emu-score">0</span></div>
    <button onclick="location.reload()" style="position:absolute; top:10px; right:10px; background:red; color:#fff; border:none; padding:8px; z-index:100;">EXIT</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <div id="s-main" class="screen active">
        <h1 style="color:var(--neon)">RETRO ARENA</h1>
        <div id="p-status" class="card">AUTH...</div>
        <button class="btn" onclick="nav('s-solo')">🕹️ ОДИНОЧНАЯ</button>
        <button class="btn" onclick="nav('s-create')">🤝 СОЗДАТЬ ЛОББИ</button>
        <button class="btn" onclick="listRooms()">📋 НАЙТИ ИГРУ</button>
    </div>

    <div id="s-solo" class="screen">
        <button class="btn" onclick="startEmu('umk3.md','segaMD','',true)">MK3</button>
        <button class="btn" onclick="startEmu('tanks.nes','nes','',true)">TANKS</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-create" class="screen">
        <select id="g-sel" class="btn"><option value="umk3.md">MK3</option><option value="tanks.nes">TANKS</option></select>
        <button class="btn" onclick="createLobby()">CREATE</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>

    <div id="s-room" class="screen">
        <div id="slot-render" class="card"></div>
        <button class="btn" onclick="ready()">READY</button>
        <button class="btn" onclick="location.reload()">EXIT</button>
    </div>

    <div id="s-list" class="screen"><div id="l-render"></div><button class="btn" onclick="nav('s-main')">BACK</button></div>
</div>

<script>
    const tg = window.Telegram.WebApp; 
    const socket = io({ transports: ['polling', 'websocket'] });
    let user, lobby, score = 0, scoreInterval, syncInterval;

    async function init() {
        tg.ready(); tg.expand();
        console.log("Socket connection attempt...");
        socket.on('connect', () => console.log("Socket connected:", socket.id));

        const res = await (await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) })).json();
        user = res.user;
        document.getElementById('p-status').innerText = `READY: ${user.username}`;
    }
    init();

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    async function createLobby() {
        const d = { uid: user.telegramId, name: user.username, game: document.getElementById('g-sel').value };
        const r = await (await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) })).json();
        if(r.success) { lobby = r.lobby; socket.emit('sync-me', lobby.lobbyId); nav('s-room'); renderSlots(lobby); }
    }

    async function joinLobby(lid) {
        const r = await (await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({uid:user.telegramId, name:user.username, lid}) })).json();
        if(r.success) { lobby = r.lobby; socket.emit('sync-me', lid); nav('s-room'); renderSlots(lobby); }
    }

    async function listRooms() {
        nav('s-list');
        const r = await (await fetch('/api/lobby/list')).json();
        document.getElementById('l-render').innerHTML = r.list.map(l => `<div class="card">${l.game} <button onclick="joinLobby('${l.lobbyId}')">JOIN</button></div>`).join('') || "EMPTY";
    }

    function ready() { socket.emit('player-ready', { rid: lobby.lobbyId, uid: user.telegramId }); }
    function renderSlots(l) { lobby = l; document.getElementById('slot-render').innerHTML = `P1: ${l.name1} ${l.r1?'✅':'⏳'}<br>P2: ${l.name2||'WAIT'} ${l.r2?'✅':'⏳'}`; }

    socket.on('lobby-update', renderSlots);
    socket.on('launch-match', (d) => startEmu(d.game, d.game.endsWith('.nes')?'nes':'segaMD', d.lid, false));

    function startEmu(file, core, rid, isSolo) {
        document.getElementById('app').style.display='none'; 
        document.getElementById('emulator-layer').style.display='block';
        
        window.EJS_player = '#ejs-container'; window.EJS_core = core; 
        window.EJS_gameUrl = window.location.origin+'/'+file;
        window.EJS_pathtodata = window.location.origin+'/data/'; 
        window.EJS_startOnLoaded = true; window.EJS_virtualGamepad = true;

        window.EJS_onGameStart = () => {
            if(!isSolo) {
                const isHost = user.telegramId == lobby.creatorId;
                const myPort = isHost ? 0 : 1;

                // Задержка Snapshot на 10 сек для стабильности
                if (isHost) {
                    setTimeout(() => {
                        syncInterval = setInterval(async () => {
                            const state = await EJS_emulator.gameManager.getState();
                            socket.emit('sync-state', { rid, state });
                            document.getElementById('sync-indicator').innerText = "[SYNC: SENT]";
                        }, 5000);
                    }, 10000);
                } else {
                    socket.on('apply-state', (state) => {
                        EJS_emulator.gameManager.loadState(state);
                        document.getElementById('sync-indicator').style.color = "#0f0";
                        document.getElementById('sync-indicator').innerText = "[SYNC: OK]";
                        setTimeout(() => document.getElementById('sync-indicator').style.color = "#555", 500);
                    });
                }

                window.onkeydown = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keydown', pNum: myPort });
                window.onkeyup = (e) => socket.emit('emu-input', { rid, key: e.keyCode, type: 'keyup', pNum: myPort });
                socket.on('partner-input', (d) => EJS_emulator.gameManager.simulateInput(d.key, d.type, d.pNum));
            }
        };
        const s = document.createElement('script'); s.src = window.location.origin+'/data/loader.js'; document.body.appendChild(s);
    }
</script>
</body>
</html>
