<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena Solo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --gold: #ffd700; --pink: #ff0055; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow-x: hidden; }
        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        h1 { color: var(--neon); font-size: 14px; text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }
        
        .game-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%; 
            max-width: 340px; 
            padding-bottom: 100px;
        }
        
        .game-card { 
            background: #111; 
            border: 3px solid #222; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80px;
        }
        .game-card:active { border-color: var(--neon); transform: scale(0.95); }
        .game-card span { font-size: 6px; line-height: 1.4; pointer-events: none; }

        .btn-dev { 
            background: #111; color: #555; border: 3px solid #222; 
            padding: 12px; width: 280px; margin-top: 10px; cursor: not-allowed; 
            font-family: inherit; font-size: 7px;
        }

        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
        #exit-btn { position: absolute; top: 10px; right: 10px; z-index: 10000; background: red; color: #fff; border: none; padding: 10px; font-family: inherit; font-size: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <button id="exit-btn" onclick="location.reload()">EXIT GAME</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <div id="s-main" class="screen active">
        <h1>RETRO ARENA</h1>
        
        <div class="game-grid" id="lib-render">
            <!-- Игры вставляются сюда -->
        </div>

        <button class="btn-dev" onclick="tg.showAlert('Hacking Sega in progress... Multiplayer coming soon!')">
            🤝 MULTIPLAYER (IN DEV)
        </button>
        
        <div style="height: 50px;"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const GAMES = [
        { n: "1200 in 1", f: "1200in1.nes" },
        { n: "Battletoads", f: "battletoads.md" },
        { n: "Battletoads DD", f: "btdd.md" },
        { n: "Comix Zone", f: "comix.md" },
        { n: "Jurassic Park", f: "jurassic.md" },
        { n: "Lion King", f: "lionking.md" },
        { n: "Real Monsters", f: "realmonsters.sfc" },
        { n: "Road Rash", f: "roadrash.md" },
        { n: "The Simpsons", f: "simpsons.md" },
        { n: "Sonic 1", f: "sonic.bin" },
        { n: "Sonic 2", f: "sonic2.md" },
        { n: "Sunset Riders", f: "sunset.md" },
        { n: "Tanks", f: "tanks.nes" },
        { n: "Tiny Toon 1", f: "tinytoon1.nes" },
        { n: "Tiny Toon 2", f: "tinytoon2.nes" },
        { n: "Tiny Toon Sega", f: "tinytoon_sega.md" },
        { n: "TMNT", f: "tmnt.md" },
        { n: "UMK 3", f: "umk3.md" },
        { n: "X-Men 2", f: "xmen2.md" }
    ];

    function init() {
        const render = document.getElementById('lib-render');
        render.innerHTML = GAMES.map(g => `
            <div class="game-card" onclick="launchGame('${g.f}')">
                <span>${g.n}</span>
            </div>
        `).join('');
    }
    init();

    function launchGame(file) {
        // Определение ядра
        let core = 'segaMD';
        if (file.endsWith('.nes')) core = 'nes';
        if (file.endsWith('.sfc')) core = 'snes';

        // Показ слоя эмулятора
        document.getElementById('app').style.display = 'none';
        document.getElementById('emulator-layer').style.display = 'block';

        window.EJS_player = '#ejs-container';
        window.EJS_core = core;
        window.EJS_gameUrl = window.location.origin + '/' + file;
        window.EJS_pathtodata = window.location.origin + '/data/';
        window.EJS_startOnLoaded = true;
        window.EJS_virtualGamepad = true;
        
        // Отключение лишних кнопок для чистого Solo
        window.EJS_Buttons = {
            saveState: true,
            loadState: true,
            fullscreen: false,
            restart: true,
            settings: true
        };

        const script = document.createElement('script');
        script.src = window.location.origin + '/data/loader.js';
        document.body.appendChild(script);
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
