<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #070913; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #game-container { width: 100vw; height: 100vh; display: none; }
        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background-image: linear-gradient(rgba(0, 240, 255, 0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.07) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 10; text-align: center;
        }
        #overlay::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, #000000 100%); z-index: -1; }
        
        .btn-massive { 
            width: 80vw; max-width: 300px; padding: 30px 20px; 
            background: linear-gradient(180deg, #161b2e 0%, #0b0e1a 100%); 
            color: #00f0ff; border: 2px solid #00f0ff; 
            font-family: 'Press Start 2P', cursive; font-size: 16px; line-height: 1.5;
            cursor: pointer; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 2px 15px rgba(0, 240, 255, 0.2); 
            text-transform: uppercase; transition: transform 0.1s;
        }
        .btn-massive:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        .hint { margin-top: 30px; font-size: 12px; color: #8892b0; font-family: sans-serif; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="btn-massive" onclick="start()">▶ ЗАПУСК ИГРЫ</button>
        <p class="hint">Нажми для активации звука</p>
    </div>
    <div id="game-container"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const core = urlParams.get('core') || 'genesis';
        const game = urlParams.get('game');

        function start() {
            if (!game) return;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            // Генерируем 100% абсолютный путь к ROM-файлу (Web Workers эмулятора требуют именно его)
            const currentUrl = window.location.href.split('?')[0];
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            const romAbsoluteUrl = baseUrl + '/' + game;

            window.EmuJS = {
                dataUrl: "https://cdn.emulatorjs.org/stable/data/",
                gameUrl: romAbsoluteUrl,
                core: core,
                autoStart: true,
                container: "#game-container"
            };

            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
