<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat [Error Test]</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #09090b; color: white; font-family: monospace; }
        .test-button { background-color: #ff003c; color: white; font-weight: bold; padding: 20px; border-radius: 10px; width: 100%; margin-top: 20px; border: 2px solid white; }
        .test-button:active { background-color: #990024; }
    </style>
</head>
<body class="flex flex-col h-screen p-4">

    <h1 class="text-xl text-center font-bold text-red-500 mb-4">ТЕСТ НАЖАТИЯ КНОПОК</h1>
    <p class="text-xs text-gray-400 text-center mb-10 tracking-widest uppercase font-bold">Нажми на красную кнопку ниже, чтобы вызвать ошибку.</p>

    <!-- ГЛАВНАЯ КНОПКА ТЕСТА -->
    <button id="error-btn" class="test-button">ВЫЗВАТЬ ОШИБКУ КНОПКИ</button>

    <button id="simple-log-btn" class="test-button" style="background-color: #00f0ff; color: black; margin-top: 10px;">ПРОСТОЙ ЛОГ</button>

    <!-- ОКНО ЖУРНАЛА (Оно всегда на виду для этого теста) -->
    <div class="mt-10 flex-1 flex flex-col border-t-2 border-gray-700 pt-4">
        <h2 class="text-yellow-500 text-sm font-bold mb-2 uppercase">Журнал (Logs):</h2>
        <textarea id="log-output" readonly class="w-full flex-1 bg-gray-900 text-white p-4 rounded text-[10px] font-mono border border-gray-700"></textarea>
    </div>

    <!-- СКРИПТ ОБРАБОТКИ -->
    <script>
        (function() {
            var logOutput = document.getElementById('log-output');
            
            function addToLog(msg) {
                var currentText = logOutput.value;
                logOutput.value = "[" + new Date().toLocaleTimeString() + "] " + msg + "\n\n" + currentText;
            }

            // Перехватываем все ошибки на странице
            window.onerror = function(message, source, lineno) {
                addToLog("КРИТИЧЕСКАЯ ОШИБКА: " + message);
                return true;
            };

            // Когда страница загрузится
            document.addEventListener('DOMContentLoaded', function() {
                addToLog("Страница загружена. Готов к тесту.");
                lucide.createIcons();

                var errorBtn = document.getElementById('error-btn');
                var logBtn = document.getElementById('simple-log-btn');

                // ПРОВЕРКА КНОПКИ №1 (Вызывает ошибку)
                if (errorBtn) {
                    addToLog("Кнопка 'ВЫЗВАТЬ ОШИБКУ' найдена.");
                    errorBtn.addEventListener('click', function() {
                        addToLog("Нажатие зарегистрировано! Сейчас вызову ошибку...");
                        // Специально вызываем ошибку (обращаемся к несуществующей функции)
                        this_function_does_not_exist(); 
                    });
                }

                // ПРОВЕРКА КНОПКИ №2 (Простой лог)
                if (logBtn) {
                    addToLog("Кнопка 'ПРОСТОЙ ЛОГ' найдена.");
                    logBtn.addEventListener('click', function() {
                        addToLog("!!! КНОПКА 'ПРОСТОЙ ЛОГ' НАЖАТА УСПЕШНО !!!");
                        alert("Кнопка нажата!");
                    });
                }
            });
        })();
    </script>
</body>
</html>
