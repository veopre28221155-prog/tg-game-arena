<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Cloud</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #00f0ff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .btn { background: #1a1a1a; color: #00f0ff; border: 4px solid #00f0ff; padding: 20px; font-family: inherit; cursor: pointer; box-shadow: 0 0 15px #00f0ff; }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
        #loading-text { font-size: 10px; margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <div id="menu" class="screen">
        <h1 style="font-size: 16px;">RETRO ARENA</h1>
        <button class="btn" onclick="startCloud()">ПОДКЛЮЧИТЬСЯ</button>
        <div id="loading-text">CLOUD ENGINE: READY</div>
    </div>

    <iframe id="game-frame" allow="autoplay; fullscreen; gamepad"></iframe>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function startCloud() {
            document.getElementById('menu').style.display = 'none';
            const frame = document.getElementById('game-frame');
            frame.style.display = 'block';
            // Загружаем игру с нашего сервера
            frame.src = window.location.origin + "/engine";
        }
    </script>
</body>
</html>
