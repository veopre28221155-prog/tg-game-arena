<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --tg-text: #ffffff; --accent-neon: #00f0ff; --accent-pink: #ff0055; --accent-gold: #ffd700; --font-retro: 'Press Start 2P', cursive; --btn-base: #1a1a1a; --btn-border: #000000; }
        body { margin: 0; background: #000; color: var(--tg-text); font-family: var(--font-retro); height: 100vh; overflow: hidden; touch-action: none; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .screen.active { display: flex; }
        
        h1 { color: var(--accent-neon); text-shadow: 0 0 10px var(--accent-neon); margin-top: 20px; text-align: center; line-height: 1.5; }
        
        .btn-pixel { background: #222; color: #fff; border: 4px solid #000; padding: 15px; width: 100%; max-width: 300px; font-family: var(--font-retro); margin-bottom: 15px; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .btn-pixel:active { transform: translateY(2px); background: #333; }
        .btn-pink { border-color: var(--accent-pink); color: var(--accent-pink); }
        
        /* Контейнер эмулятора */
        #emulator-container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 60vh;
            background: #000;
            border: 2px solid var(--accent-neon);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="s-main" class="screen active" style="justify-content: center;">
        <h1>RETRO ARENA</h1>
        <button class="btn-pixel" onclick="navScreen('s-single')">🎮 ИГРАТЬ (SEGA)</button>
        <button class="btn-pixel" onclick="alert('Скоро!')">👤 ПРОФИЛЬ</button>
    </div>

    <!-- МЕНЮ ВЫБОРА -->
    <div id="s-single" class="screen">
        <h1>ВЫБЕРИ ИГРУ</h1>
        <button class="btn-pixel" onclick="launchSega('sonic.bin')">🦔 SONIC 1</button>
        <button class="btn-pixel btn-pink" onclick="navScreen('s-main')">НАЗАД</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="s-game" class="screen" style="padding: 10px;">
        <div style="width: 100%; display: flex; justify-content: space-between;">
            <button class="btn-pixel btn-pink" style="width: auto; padding: 10px; font-size: 10px;" onclick="location.reload()">❌ ВЫЙТИ</button>
            <div style="color: gold; font-size: 10px; padding-top: 10px;">SEGA GENESIS</div>
        </div>
        
        <!-- Сюда встраивается игра -->
        <div id="emulator-container"></div>
        
        <div id="loading-text" style="color: gray; font-size: 10px; margin-top: 10px;">Загрузка ядра эмулятора...</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; 
    tg.ready(); 
    tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    function navScreen(id) { 
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function launchSega(romFile) {
        navScreen('s-game');
        document.getElementById('loading-text').innerText = "Скачивание " + romFile + "...";

        // === ГЛАВНОЕ ИСПРАВЛЕНИЕ: ПОЛНЫЙ ПУТЬ ===
        // Мы берем текущий адрес сайта (https://tg-game-arena.onrender.com) и добавляем имя файла
        const fullRomUrl = window.location.origin + '/' + romFile;
        console.log("Запуск игры по ссылке:", fullRomUrl);

        // Настройки EmulatorJS
        window.EJS_player = '#emulator-container'; 
        window.EJS_core = 'sega'; 
        window.EJS_gameUrl = fullRomUrl; // Используем полный путь!
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        window.EJS_onGameStart = function() {
            document.getElementById('loading-text').innerText = "Игра запущена! Жми START";
        };

        // Подгружаем скрипт
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    }
</script>
</body>
</html>
