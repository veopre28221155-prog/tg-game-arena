<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --accent-neon: #00f0ff; --accent-pink: #ff0055; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font-retro); height: 100vh; overflow: hidden; touch-action: none; text-align: center; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; }
        .screen.active { display: flex; }
        
        h1 { color: var(--accent-neon); font-size: 20px; text-shadow: 0 0 10px var(--accent-neon); margin-bottom: 30px; line-height: 1.5; }
        
        .games-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; overflow-y: auto; padding-bottom: 20px; }
        
        .btn-pixel { background: #111; color: #fff; border: 3px solid #444; padding: 15px; font-family: var(--font-retro); font-size: 12px; cursor: pointer; }
        .btn-sega { border-color: #0055ff; color: #00aaff; }
        .btn-danger { border-color: var(--accent-pink); color: var(--accent-pink); }
        
        #emulator-container { width: 100%; height: 50vh; background: #000; border: 2px solid var(--accent-neon); position: relative; }
        
        #start-emu-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; color: #0f0; border: 4px solid #0f0; padding: 20px;
            font-size: 16px; font-family: var(--font-retro); z-index: 100; display: none;
        }
        
        #loading-status { font-size: 10px; color: #aaa; margin-top: 10px; line-height: 1.5; }
        
        /* КОНСОЛЬ ДЛЯ ОТЛОВА ОШИБОК НА ТЕЛЕФОНЕ */
        #mobile-debug {
            width: 100%; max-width: 400px; height: 100px; background: rgba(50,0,0,0.8);
            border: 1px solid red; color: #ffaaaa; font-family: monospace; font-size: 8px;
            text-align: left; overflow-y: auto; padding: 5px; margin-top: 10px; display: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="s-main" class="screen active">
        <h1>RETRO ARENA<br><span style="font-size: 10px; color: gold;">SEGA</span></h1>
        <div class="games-grid">
            <button class="btn-pixel btn-sega" onclick="launchGame('sonic.bin', 'segaMD')">🦔 SONIC 1</button>
        </div>
    </div>

    <div id="s-game" class="screen">
        <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
            <button class="btn-pixel btn-danger" style="padding: 10px; font-size: 10px;" onclick="location.reload()">НАЗАД</button>
            <div id="game-title-display" style="color: gold; font-size: 10px;">SEGA</div>
        </div>

        <div style="position: relative; width: 100%;">
            <div id="emulator-container"></div>
            <button id="start-emu-button" onclick="runEmulator()">▶ СТАРТ</button>
        </div>
        
        <p id="loading-status">Загрузка...</p>
        
        <!-- Сюда будут падать скрытые ошибки телефона -->
        <div id="mobile-debug"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    // Функция перехвата ошибок
    function logDebug(msg) {
        const dbg = document.getElementById('mobile-debug');
        dbg.style.display = 'block';
        dbg.innerHTML += msg + '<br>';
        console.log(msg);
    }

    window.onerror = function(msg, url, line) {
        logDebug(`❌ Ошибка: ${msg} (стр: ${line})`);
        return false;
    };

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function runEmulator() {
        if (window.EJS_emulator) {
            window.EJS_emulator.start();
            document.getElementById('start-emu-button').style.display = 'none';
        }
    }

    function launchGame(romFileName, coreName) {
        navScreen('s-game');
        
        // === ИСПОЛЬЗУЕМ АБСОЛЮТНЫЕ ПУТИ ===
        // Это решит проблему, если Telegram Web App искажает ссылки
        const baseUrl = window.location.origin;
        
        logDebug(`🔗 Базовый URL: ${baseUrl}`);

        window.EJS_pathtodata = baseUrl + '/data/'; 
        window.EJS_gameUrl = baseUrl + '/' + romFileName;
        
        window.EJS_player = '#emulator-container';
        window.EJS_core = coreName;
        window.EJS_startOnLoaded = false;
        
        window.EJS_Buttons = {
            playPause: false, restart: true, mute: true, settings: true,
            fullscreen: true, saveState: true, loadState: true 
        };

        window.EJS_onGameLoaded = function() {
            logDebug('✅ Игра загружена успешно!');
            document.getElementById('loading-status').innerText = 'Готово!';
            document.getElementById('start-emu-butto
