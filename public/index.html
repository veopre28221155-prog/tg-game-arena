<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Retro Arena FailSafe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 8px; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        .btn { background: #111; color: var(--neon); border: 2px solid #333; padding: 15px; width: 260px; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
        .card { border: 1px dashed #444; padding: 10px; width: 260px; margin-bottom: 15px; text-align: center; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #ejs-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="emulator-layer"><div id="ejs-container"></div></div>
<div id="app">
    <div id="s-main" class="screen active">
        <h1>ARENA v2</h1>
        <div id="status-bar" class="card">WAITING FOR INIT...</div>
        <button class="btn" onclick="tryCreate()">CREATE LOBBY</button>
        <button class="btn" onclick="tryList()">JOIN LOBBY</button>
    </div>
    <div id="s-create" class="screen">
        <h2>SETUP</h2>
        <select id="g-sel" class="btn"><option value="umk3.md">MK3</option><option value="sonic.bin">SONIC</option></select>
        <button class="btn" onclick="doCreate()">GO</button>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>
    <div id="s-room" class="screen">
        <h2 id="r-lid">ROOM</h2>
        <div id="slot-render" class="card"></div>
        <button class="btn" onclick="ready()">I AM READY</button>
        <button class="btn" onclick="shareInv()">INVITE FRIEND</button>
        <button class="btn" onclick="location.reload()">EXIT</button>
    </div>
    <div id="s-list" class="screen">
        <h2>BROWSE</h2>
        <div id="l-render"></div>
        <button class="btn" onclick="nav('s-main')">BACK</button>
    </div>
</div>

<script>
    // ГЛОБАЛЬНЫЙ ПЕРЕХВАТ ОШИБОК
    window.onerror = function(m, u, l) { tg.showAlert(`JS_ERROR: ${m}\nAt: ${l}`); return false; };
    
    const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
    const socket = io({ transports: ['polling', 'websocket'] });
    let user = null, lobby = null;

    function nav(id) { 
        try {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        } catch(e) { tg.showAlert("NAV_ERROR: " + e.message); }
    }

    async function init() {
        if(!tg.initData) return tg.showAlert("OPEN IN TELEGRAM MOBILE!");
        try {
            const res = await fetch('/api/user-data', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({initData: tg.initData}) 
            });
            const r = await res.json();
            if(!r.success) throw new Error(r.error);
            user = r.user;
            document.getElementById('status-bar').innerText = `READY: ${user.username}`;
            
            const sp = tg.initDataUnsafe.start_param;
            if (sp && sp.startsWith('lobby_')) doJoin(sp.replace('lobby_',''));
        } catch(e) { tg.showAlert("INIT_FAIL: " + e.message); }
    }
    init();

    function tryCreate() { if(!user) return tg.showAlert("AUTH_NOT_FINISHED"); nav('s-create'); }
    function tryList() { if(!user) return tg.showAlert("AUTH_NOT_FINISHED"); listRooms(); }

    async function doCreate() {
        try {
            const d = { uid: user.telegramId, name: user.username, game: document.getElementById('g-sel').value };
            const res = await (await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) })).json();
            if(!res.success) throw new Error(res.error);
            lobby = res.lobby;
            socket.emit('sync-me', lobby.lobbyId);
            nav('s-room'); renderSlots(lobby);
        } catch(e) { tg.showAlert("CREATE_FAIL: " + e.message); }
    }

    async function doJoin(lid) {
        try {
            const res = await (await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({uid: user.telegramId, name: user.username, lid: lid}) })).json();
            if(!res.success) throw new Error(res.error);
            lobby = res.lobby;
            socket.emit('sync-me', lid);
            nav('s-room'); renderSlots(lobby);
        } catch(e) { tg.showAlert("JOIN_FAIL: " + e.message); }
    }

    async function listRooms() {
        try {
            nav('s-list');
            const r = await (await fetch('/api/lobby/list')).json();
            document.getElementById('l-render').innerHTML = r.list.map(l => `<div class="card">${l.game} <button class="btn" style="width:80px; padding:5px" onclick="doJoin('${l.lobbyId}')">JOIN</button></div>`).join('') || "NO ROOMS";
        } catch(e) { tg.showAlert("LIST_FAIL: " + e.message); }
    }

    function ready() { if(lobby) socket.emit('player-ready', { rid: lobby.lobbyId, uid: user.telegramId }); }

    function renderSlots(l) {
        lobby = l;
        document.getElementById('slot-render').innerHTML = l.slots.map(s => `<div>${s.name || 'EMPTY'} : ${s.ready?'READY':'WAIT'}</div>`).join('');
    }

    socket.on('lobby-update', renderSlots);
    socket.on('launch-match', (d) => {
        document.getElementById('app').style.display='none'; 
        document.getElementById('emulator-layer').style.display='block';
        window.EJS_player = '#ejs-container'; window.EJS_core = d.game.endsWith('.nes')?'nes':'segaMD'; 
        window.EJS_gameUrl = window.location.origin+'/'+d.game;
        window.EJS_pathtodata = window.location.origin+'/data/'; 
        window.EJS_startOnLoaded = true; window.EJS_virtualGamepad = true;
        
        const pNum = lobby.slots.findIndex(s => s.uid == user.telegramId);
        window.onkeydown = (e) => socket.emit('emu-input', { rid: d.lid, key: e.keyCode, type: 'keydown', p: pNum });
        socket.on('partner-input', (data) => { if(typeof EJS_emulator !== 'undefined') EJS_emulator.gameManager.simulateInput(data.key, data.type, data.p == 0 ? 1 : 0); });
        const s = document.createElement('script'); s.src = window.location.origin+'/data/loader.js?v='+Date.now(); document.body.appendChild(s);
    });

    function shareInv() { tg.openTelegramLink(`https://t.me/RetroBattleArena_bot/app?startapp=lobby_${lobby.lobbyId}`); }
</script>
</body>
</html>
