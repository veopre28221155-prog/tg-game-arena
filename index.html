<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#000; color:#fff; font-family:'Press Start 2P', cursive; overflow:hidden; }
        .screen { display:none; position:absolute; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center; }
        .active { display:flex; }
        .btn { background:#1a1a1a; color:#00f0ff; border:4px solid #000; padding:15px; width:280px; margin:10px; font-family:inherit; cursor:pointer; }
        iframe { width:100%; max-width:320px; height:400px; border:4px solid #222; }
        #status { font-size:8px; color:red; margin-top:10px; text-align:center; }
    </style>
</head>
<body>
<div id="app">
    <div id="s-menu" class="screen active">
        <h1>RETRO ARENA</h1>
        <button class="btn" onclick="nav('s-play')">ИГРАТЬ В СОНИКА</button>
        <div id="u-bal">★ 0</div>
    </div>
    <div id="s-play" class="screen">
        <div id="g-score" style="margin-bottom:10px;">0.0s</div>
        <div id="container"></div>
        <div id="status"></div>
        <button class="btn" onclick="location.reload()" style="width:120px; font-size:8px; background:red; color:white;">ВЫХОД</button>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    function nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='s-play') startSonic(); }

    async function init() {
        tg.ready(); tg.expand();
        try {
            const r = await fetch('/api/user-data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({initData:tg.initData}) });
            const user = await r.json();
            document.getElementById('u-bal').innerText = '★ ' + user.balance;
        } catch(e) {}
    }

    async function startSonic() {
        const status = document.getElementById('status');
        const container = document.getElementById('container');
        const romUrl = window.location.origin + '/roms/sonic.bin';
        
        status.innerText = "ПРОВЕРКА СВЯЗИ С СЕРВЕРОМ...";
        try {
            const check = await fetch(romUrl, { method: 'HEAD' });
            if (!check.ok) throw new Error("Файл sonic.bin не найден на сервере (404)");

            status.innerText = "ЗАГРУЗКА ЭМУЛЯТОРА...";
            const ifr = document.createElement('iframe');
            ifr.allow = 'autoplay; fullscreen';
            ifr.src = `https://emulatorjs.org/emu/index.html?game=${encodeURIComponent(romUrl)}&core=genesis`;
            container.appendChild(ifr);
            status.innerText = "";
            
            let start = Date.now();
            setInterval(() => {
                document.getElementById('g-score').innerText = ((Date.now() - start)/1000).toFixed(1) + "s";
            }, 100);
        } catch (e) { status.innerText = "ОШИБКА: " + e.message; }
    }
    init();
</script>
</body>
</html>
