<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .btn { background: #111; color: #00f0ff; border: 4px solid #333; padding: 15px; width: 280px; margin: 10px; font-family: inherit; cursor: pointer; }
        #sonic-frame { width: 100%; max-width: 320px; height: 400px; border: 4px solid #222; }
        .status { font-size: 8px; color: #ff0055; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="app">
    <div id="s-menu" class="screen active">
        <h1 style="color:#00f0ff">RETRO ARENA</h1>
        <button class="btn" onclick="nav('s-games')">ИГРАТЬ</button>
        <div id="u-bal">★ 0</div>
    </div>

    <div id="s-games" class="screen">
        <button class="btn" onclick="startSonic()">🦔 SONIC 16-BIT</button>
        <button class="btn" onclick="nav('s-menu')">НАЗАД</button>
    </div>

    <div id="s-play" class="screen">
        <div id="g-score" style="margin-bottom:10px;">0.0s</div>
        <div id="container" style="width:100%; display:flex; justify-content:center;"></div>
        <div id="err" class="status"></div>
        <button class="btn" onclick="location.reload()" style="width:120px; font-size:8px;">ВЫХОД</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let score = 0, timer;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function init() {
        tg.ready(); tg.expand();
        const r = await fetch('/api/user-data', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({initData:tg.initData})
        });
        const user = await r.json();
        document.getElementById('u-bal').innerText = '★ ' + user.balance;
    }

    async function startSonic() {
        nav('s-play');
        const err = document.getElementById('err');
        const container = document.getElementById('container');
        container.innerHTML = '';
        err.innerText = "ПРОВЕРКА ФАЙЛА...";

        const romUrl = window.location.origin + '/roms/sonic.bin';

        try {
            // Проверка доступности файла перед запуском
            const check = await fetch(romUrl, { method: 'HEAD' });
            if (!check.ok) throw new Error("Файл sonic.bin не найден на сервере (404)");

            err.innerText = "ЗАГРУЗКА ЭМУЛЯТОРА...";
            const ifr = document.createElement('iframe');
            ifr.id = 'sonic-frame';
            ifr.allow = 'autoplay; fullscreen';
            // Чистая ссылка на EmulatorJS
            ifr.src = `https://emulatorjs.org/emu/index.html?game=${encodeURIComponent(romUrl)}&core=genesis`;
            
            container.appendChild(ifr);
            err.innerText = "";

            let start = Date.now();
            timer = setInterval(() => {
                score = Date.now() - start;
                document.getElementById('g-score').innerText = (score/1000).toFixed(1) + "s";
            }, 100);

        } catch (e) {
            err.innerText = "ОШИБКА: " + e.message;
        }
    }

    init();
</script>
</body>
</html>
