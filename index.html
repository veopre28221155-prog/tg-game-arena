<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; text-align: center; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        #emu-container { width: 100vw; height: 60vh; background: #111; border: 2px solid #00f0ff; position: relative; }
        .btn { background: #111; color: #00f0ff; border: 3px solid #444; padding: 15px; font-family: 'Press Start 2P'; cursor: pointer; }
        #start-game-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f0; color: #000; padding: 20px; z-index: 1000; border: none; display: none; }
    </style>
</head>
<body>

<div id="s-menu" class="screen active">
    <h1>RETRO ARENA</h1>
    <button class="btn" onclick="launchGame('sonic.bin')">ИГРАТЬ В SONIC</button>
</div>

<div id="s-game" class="screen">
    <div id="emu-container">
        <button id="start-game-btn" onclick="runEmu()">СТАРТ</button>
    </div>
    <p id="status" style="font-size: 10px; margin-top: 10px;">Загрузка...</p>
    <button onclick="location.reload()" style="font-size: 8px; color: #555; background: none; border: none;">В МЕНЮ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function launchGame(rom) {
        document.getElementById('s-menu').classList.remove('active');
        document.getElementById('s-game').classList.add('active');

        // Ссылка на игру
        const romUrl = window.location.origin + '/' + rom;

        window.EJS_player = '#emu-container';
        window.EJS_gameUrl = romUrl;
        window.EJS_core = 'segaMD';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = false;
        window.EJS_threads = false; // Важно для мобилок

        window.EJS_onGameLoaded = () => {
            document.getElementById('status').innerText = 'Загружено!';
            document.getElementById('start-game-btn').style.display = 'block';
        };

        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    }

    function runEmu() {
        if (window.EJS_emulator) {
            window.EJS_emulator.start();
            document.getElementById('start-game-btn').style.display = 'none';
        }
    }
</script>
</body>
</html>
