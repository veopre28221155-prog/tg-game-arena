<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #boot-btn { 
            padding: 20px; background: #00f0ff; color: #000; border: none; 
            font-family: sans-serif; font-weight: bold; cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 20px #00f0ff; z-index: 10;
        }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <!-- Кнопка принудительной активации (решает проблему зависания) -->
    <button id="boot-btn" onclick="boot()">НАЖМИ ДЛЯ ЗАПУСКА SEGA</button>
    
    <iframe id="emu-frame" allow="autoplay; fullscreen; gamepad"></iframe>

    <script>
        function boot() {
            const btn = document.getElementById('boot-btn');
            const ifr = document.getElementById('emu-frame');
            
            btn.style.display = 'none';
            ifr.style.display = 'block';

            // Используем прямой URL эмулятора (это работает стабильнее всего)
            const romUrl = window.location.origin + "/roms/sonic.bin";
            const emuUrl = `https://emulatorjs.org/emu/index.html?game=${encodeURIComponent(romUrl)}&core=genesis`;
            
            ifr.src = emuUrl;
        }
    </script>
</body>
</html>
