<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic AI Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        #ui { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 10; pointer-events: none; }
        .btn { 
            width: 80px; height: 80px; background: rgba(0, 240, 255, 0.2); 
            border: 4px solid #00f0ff; border-radius: 50%; color: #fff; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; pointer-events: auto; user-select: none;
            box-shadow: 0 0 15px #00f0ff;
        }
        .btn:active { background: #00f0ff; color: #000; transform: scale(0.9); }
        #stats { position: fixed; top: 20px; left: 20px; color: #fff; font-size: 12px; text-shadow: 3px 3px #000; z-index: 5; }
    </style>
</head>
<body>

    <div id="stats">SCORE: 000000<br>RINGS: 0</div>
    <canvas id="game"></canvas>

    <div id="ui">
        <div id="controls-left" style="display:flex; gap: 20px;">
            <div class="btn" id="btnLeft">◀</div>
            <div class="btn" id="btnRight">▶</div>
        </div>
        <div class="btn" id="btnJump" style="background: rgba(255, 0, 0, 0.2); border-color: #ff0000; box-shadow: 0 0 15px #ff0000;">JUMP</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Настройка размеров под любой экран
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let rings = 0;
    let worldX = 0;

    let player = {
        x: 100, y: 0,
        vx: 0, vy: 0,
        w: 40, h: 40,
        speed: 6,
        jump: -14,
        onGround: false,
        animFrame: 0,
        rotation: 0
    };

    let keys = { left: false, right: false };

    // Управление
    const setupBtn = (id, key) => {
        const el = document.getElementById(id);
        el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); if(key === 'jump') { if(player.onGround) player.vy = player.jump; } else { keys[key] = true; } };
        el.onmouseup = el.ontouchend = () => { if(key !== 'jump') keys[key] = false; };
    };
    setupBtn('btnLeft', 'left');
    setupBtn('btnRight', 'right');
    setupBtn('btnJump', 'jump');

    function update() {
        if (keys.left) player.vx = -player.speed;
        else if (keys.right) player.vx = player.speed;
        else player.vx *= 0.8;

        player.vy += 0.8; // Гравитация
        player.x += player.vx;
        player.y += player.vy;

        // Пол
        const groundY = canvas.height - 100;
        if (player.y > groundY - player.h) {
            player.y = groundY - player.h;
            player.vy = 0;
            player.onGround = true;
        } else {
            player.onGround = false;
        }

        worldX = player.x - 100;
        score = Math.floor(player.x);
        document.getElementById('stats').innerHTML = `SCORE: ${score.toString().padStart(6, '0')}<br>RINGS: ${rings}`;
    }

    function draw() {
        // 1. Небо
        ctx.fillStyle = '#0077ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Дальние горы (Параллакс)
        ctx.fillStyle = '#0055aa';
        for(let i=0; i<5; i++) {
            ctx.beginPath();
            ctx.moveTo(i*300 - (worldX*0.2 % 300), canvas.height);
            ctx.lineTo(i*300 + 150 - (worldX*0.2 % 300), canvas.height-200);
            ctx.lineTo(i*300 + 300 - (worldX*0.2 % 300), canvas.height);
            ctx.fill();
        }

        // 3. Трава и земля (Зигзаг Green Hill)
        const groundY = canvas.height - 100;
        ctx.fillStyle = '#8b4513'; // Земля
        ctx.fillRect(0, groundY, canvas.width, 100);
        
        ctx.fillStyle = '#228b22'; // Трава
        for(let i=-2; i<canvas.width/40 + 2; i++) {
            ctx.fillRect(i*40 - (worldX % 40), groundY, 41, 15);
        }

        // 4. Рисуем Соника
        ctx.save();
        ctx.translate(player.x - worldX + player.w/2, player.y + player.h/2);
        
        if (!player.onGround) {
            player.rotation += player.vx * 0.1;
            ctx.rotate(player.rotation);
        } else if (Math.abs(player.vx) > 1) {
            ctx.rotate(Math.sin(Date.now()*0.02) * 0.1); // Покачивание при беге
        }

        // Тело (Синий ёж)
        ctx.fillStyle = '#0000ff';
        // Иголки
        ctx.beginPath();
        ctx.moveTo(-20, 0); ctx.lineTo(-35, -10); ctx.lineTo(-20, 10); ctx.fill();
        // Шар
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI*2);
        ctx.fill();
        // Лицо
        ctx.fillStyle = '#ffdbac';
        ctx.beginPath(); ctx.arc(10, 5, 12, 0, Math.PI*2); ctx.fill();
        // Глаза
        ctx.fillStyle = '#000';
        ctx.fillRect(12, -5, 4, 8);

        ctx.fillSty
