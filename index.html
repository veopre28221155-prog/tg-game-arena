<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --pink: #ff0055; }
        body { margin: 0; background: #050505; color: white; font-family: 'Press Start 2P', cursive; overflow: hidden; touch-action: none; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 1.2rem; }
        .btn { background: #1a1a1a; color: var(--neon); border: 4px solid #000; padding: 15px; width: 280px; margin: 10px; font-family: inherit; font-size: 10px; cursor: pointer; box-shadow: 4px 4px 0 #000; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        canvas, #sonic-frame { border: 4px solid #222; background: #000; width: 100% !important; max-width: 300px; height: 380px; }
        #debug-info { font-size: 8px; color: #555; margin-top: 10px; text-align: center; }
        .score-bar { position: absolute; top: 10px; right: 10px; font-size: 10px; color: gold; }
    </style>
</head>
<body>

<div id="app">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="s-menu" class="screen active">
        <h1>RETRO ARENA</h1>
        <button class="btn" onclick="nav('s-list')">🕹 ОДИНОЧНАЯ ИГРА</button>
        <div id="u-bal" style="margin-top:20px;">★ 0</div>
    </div>

    <!-- ВЫБОР ИГР -->
    <div id="s-list" class="screen">
        <button class="btn" onclick="startSonic()">🦔 SONIC 16-BIT</button>
        <button class="btn" onclick="startSnake()">🐍 SNAKE CLASSIC</button>
        <button class="btn" onclick="nav('s-menu')">НАЗАД</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="s-play" class="screen">
        <div class="score-bar" id="g-score">0</div>
        <div id="game-container" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <canvas id="gameCanvas" width="240" height="380"></canvas>
        </div>
        <div id="debug-info"></div>
        <button class="btn" onclick="location.reload()" style="background:red; color:white; width:100px; padding:5px; margin-top:10px;">ВЫЙТИ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let score = 0, loop, sonicTimer;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function init() {
        tg.ready(); tg.expand();
        const r = await fetch('/api/user-data', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({initData:tg.initData})
        });
        const user = await r.json();
        document.getElementById('u-bal').innerText = '★ ' + user.balance;
    }

    // --- ЛОГИКА СОНИКА ---
    async function startSonic() {
        nav('s-play');
        const container = document.getElementById('game-container');
        const debug = document.getElementById('debug-info');
        document.getElementById('gameCanvas').style.display = 'none';
        debug.innerText = "ПРОВЕРКА ФАЙЛА ИГРЫ...";

        const romUrl = window.location.origin + '/roms/sonic.bin';

        try {
            // Проверка: видит ли браузер файл вообще?
            const res = await fetch(romUrl, { method: 'HEAD' });
            if(!res.ok) throw new Error("Файл sonic.bin не найден. Проверьте папку roms на GitHub!");

            debug.innerText = "ЗАГРУЗКА ЭМУЛЯТОРА...";
            const ifr = document.createElement('iframe');
            ifr.id = 'sonic-frame';
            ifr.allow = 'autoplay; fullscreen';
            // Используем официальную чистую версию EmulatorJS
            ifr.src = `https://emulatorjs.org/emu/index.html?game=${encodeURIComponent(romUrl)}&core=genesis`;
            
            container.appendChild(ifr);
            debug.innerText = "ИГРА ЗАПУЩЕНА";

            let start = Date.now();
            sonicTimer = setInterval(() => {
                score = Date.now() - start;
                document.getElementById('g-score').innerText = (score/1000).toFixed(1) + "s";
            }, 100);

        } catch(e) {
            debug.style.color = "red";
            debug.innerText = e.message;
        }
    }

    // --- ЛОГИКА ЗМЕЙКИ (ДЛЯ ТЕСТА) ---
    function startSnake() {
        nav('s-play');
        document.getElementById('gameCanvas').style.display = 'block';
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let s = [{x:10,y:10}], f = {x:5,y:5}, dx=0, dy=-1, fr=0;

        // Простое управление тапами
        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if(x < 100) { let tmp = dx; dx = dy; dy = -tmp; } // Поворот
            else { let tmp = dx; dx = -dy; dy = tmp; }
        };

        function draw() {
            if(++fr % 10 === 0) {
                let h = {x:s[0].x+dx, y:s[0].y+dy};
                if(h.x<0||h.x>11||h.y<0||h.y>18) return location.reload();
                s.unshift(h);
                if(h.x===f.x && h.y===f.y) { score+=10; f={x:Math.floor(Math.random()*12),y:Math.floor(Math.random()*19)}; }
                else s.pop();
            }
            ctx.fillStyle='black'; ctx.fillRect(0,0,240,380);
            ctx.fillStyle='red'; ctx.fillRect(f.x*20, f.y*20, 18, 18);
            ctx.fillStyle='cyan'; s.forEach(p => ctx.fillRect(p.x*20, p.y*20, 18, 18));
            document.getElementById('g-score').innerText = score;
            loop = requestAnimationFrame(draw);
        }
        draw();
    }

    init();
</script>
</body>
</html>
