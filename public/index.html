<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-text: #ffffff; --accent-neon: #00f0ff; --accent-pink: #ff0055; --accent-gold: #ffd700; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #050505; color: white; font-family: var(--font-retro); overflow: hidden; user-select: none; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        .btn-pixel { background: #1a1a1a; color: var(--accent-neon); border: 4px solid #000; padding: 15px; width: 100%; max-width: 320px; font-family: inherit; font-size: 10px; cursor: pointer; margin-bottom: 10px; box-shadow: inset 4px 4px 0 rgba(0, 240, 255, 0.3); }
        .btn-gold { color: var(--accent-gold); }
        .btn-pink { color: var(--accent-pink); }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        #ejs-container { width: 100%; height: 100%; }
        .profile-card { background: #111; border: 2px dashed #444; padding: 15px; width: 100%; max-width: 320px; margin-bottom: 20px; font-size: 10px; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <div style="position:absolute; top:15px; left:15px; z-index:1001; color:gold;">SCORE: <span id="emu-score">0</span></div>
    <button onclick="location.reload()" style="position:absolute; top:15px; right:15px; z-index:1001; background:red; color:white; border:none; padding:10px; font-family:inherit;">✖ ВЫХОД</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="s-main" class="screen active">
        <h1 style="color:var(--accent-neon); font-size: 16px;">RETRO ARENA</h1>
        <button class="btn-pixel" onclick="navScreen('s-emu-menu')">🕹️ БИБЛИОТЕКА ИГР</button>
        <button class="btn-pixel btn-gold" onclick="openTournaments()">⚔️ ТУРНИРЫ 1X1</button>
        <button class="btn-pixel btn-pink" onclick="navScreen('s-profile')">👤 ЛИЧНЫЙ КАБИНЕТ</button>
    </div>

    <!-- ЛИЧНЫЙ КАБИНЕТ -->
    <div id="s-profile" class="screen">
        <h2>ПРОФИЛЬ</h2>
        <div class="profile-card">
            <p>БАЛАНС: <span id="p-bal" style="color:var(--accent-gold)">0</span> ⭐</p>
            <p>РЕКОРД SONIC: <span id="p-sonic-score" style="color:var(--accent-neon)">0</span></p>
        </div>
        <button class="btn-pixel btn-gold" onclick="deposit('stars')">ПОПОЛНИТЬ STARS ⭐</button>
        <button class="btn-pixel btn-green" style="color:#0f0;" onclick="deposit('crypto')">CRYPTO BOT (USDT)</button>
        <button class="btn-pixel" onclick="navScreen('s-main')">◀ НАЗАД</button>
    </div>

    <!-- БИБЛИОТЕКА ИГР -->
    <div id="s-emu-menu" class="screen">
        <h2>ИГРЫ</h2>
        <button class="btn-pixel btn-gold" onclick="startEmu('sonic.bin', 'sega', 'sonic')">🦔 Sonic 2</button>
        <button class="btn-pixel btn-gold" onclick="startEmu('umk3.md', 'sega', 'mk')">🐉 Mortal Kombat 3</button>
        <button class="btn-pixel" onclick="navScreen('s-main')">◀ НАЗАД</button>
    </div>

    <!-- ТУРНИРЫ -->
    <div id="s-tournaments" class="screen">
        <h2>ТУРНИРЫ</h2>
        <button class="btn-pixel btn-gold" onclick="createTournament()">СОЗДАТЬ ТУРНИР (10 ⭐)</button>
        <div id="lobby-list" style="width:100%; margin-top:20px;"></div>
        <button class="btn-pixel" onclick="navScreen('s-main')">◀ НАЗАД</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const socket = io();
    let user = null, lobby = null, currentScore = 0;

    async function init() {
        tg.expand();
        const r = await fetch('/api/user-data', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: tg.initData}) });
        user = await r.json();
        updateProfileUI();
    }
    init();

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateProfileUI() {
        document.getElementById('p-bal').innerText = user.balance;
        document.getElementById('p-sonic-score').innerText = user.highScores.sonic;
    }

    async function deposit(type) {
        let url = type === 'stars' ? '/api/deposit-stars' : '/api/deposit-crypto';
        const r = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, amount: 1}) });
        const d = await r.json();
        if(d.url) type === 'stars' ? tg.openInvoice(d.url) : tg.openTelegramLink(d.url);
    }

    async function openTournaments() {
        navScreen('s-tournaments');
        const r = await fetch('/api/lobbies');
        const list = await r.json();
        document.getElementById('lobby-list').innerHTML = list.map(l => `
            <div style="border:1px solid gold; padding:10px; margin-bottom:10px;">
                <p style="font-size:8px;">ИГРА: ${l.gameType} | СТАВКА: ${l.betAmount}⭐</p>
                <button class="btn-pixel btn-gold" onclick="joinLobby('${l.lobbyId}')">ИГРАТЬ</button>
            </div>
        `).join('');
    }

    async function createTournament() {
        const r = await fetch('/api/lobby/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, gameType: 'sonic', betAmount: 10}) });
        const res = await r.json();
        if(res.success) { lobby = res.lobby; tg.showAlert("Ожидание соперника..."); navScreen('s-main'); }
    }

    async function joinLobby(id) {
        const r = await fetch('/api/lobby/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({telegramId: user.telegramId, lobbyId: id}) });
        const res = await r.json();
        if(res.success) { lobby = res.lobby; startEmu('sonic.bin', 'sega', 'sonic'); }
    }

    function startEmu(file, core, gameKey) {
        document.getElementById('emulator-layer').style.display = 'block';
        if(lobby) socket.emit('join-room', lobby.lobbyId);

        window.EJS_player = '#ejs-container';
        window.EJS_core = core;
        window.EJS_gameUrl = '/' + file;
        window.EJS_pathtodata = 'data/';
        window.EJS_startOnLoaded = true;

        window.EJS_onGameStart = () => {
            setInterval(() => {
                if (typeof EJS_emulator !== 'undefined') {
                    const ram = EJS_emulator.gameManager.getWRam();
                    if (gameKey === 'sonic') currentScore = ram[0xFE20] || 0;
                    document.getElementById('emu-score').innerText = currentScore;
                }
            }, 1000);
        };

        window.addEventListener("keydown", (e) => {
            if (lobby) socket.emit('emu-input', { roomId: lobby.lobbyId, key: e.keyCode, type: 'keydown' });
        });
        socket.on('partner-input', (data) => {
            if (typeof EJS_emulator !== 'undefined') EJS_emulator.gameManager.simulateInput(data.key, data.type, 1);
        });

        const s = document.createElement('script');
        s.src = 'data/loader.js';
        document.body.appendChild(s);
    }
</script>
</body>
</html>
