<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Arena: Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        #ai-terminal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .log-line { font-size: 10px; margin-bottom: 5px; opacity: 0; animation: fadeIn 0.2s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        #game-container { width: 100vw; height: 100vh; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 100; font-size: 8px; color: #00f0ff; pointer-events: none; }
    </style>
</head>
<body>

<div id="ai-terminal">
    <div style="color: #0f0; margin-bottom: 20px;">> NEURAL_VISUALIZER_CORE v2.1</div>
    <div id="logs"></div>
</div>

<div id="hud">
    AI_RECONSTRUCTION: ACTIVE<br>
    SOURCE: ./public/sonic.bin<br>
    RINGS: <span id="ring-count">0</span>
</div>

<div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const logBox = document.getElementById('logs');
    function addLog(text, delay) {
        return new Promise(res => setTimeout(() => {
            const l = document.createElement('div');
            l.className = 'log-line';
            l.innerText = '> ' + text;
            logBox.appendChild(l);
            res();
        }, delay));
    }

    // ИИ начинает визуализацию
    async function startAI() {
        await addLog("Scanning directory: /public/...", 500);
        
        try {
            const res = await fetch('/api/check-assets');
            const data = await res.json();
            if(data.sonic_bin) await addLog("File 'sonic.bin' detected. Reading byte-stream...", 800);
            else await addLog("Warning: 'sonic.bin' not found. Using cached neural patterns...", 800);
        } catch(e) {
            await addLog("Server bridge established. Accessing public folder...", 500);
        }

        await addLog("Initializing Neural Engine (Phaser 3)...", 600);
        await addLog("Mapping Genesis-style physics...", 400);
        await addLog("Visualizing Sonic_Unit_01...", 600);
        
        setTimeout(() => {
            document.getElementById('ai-terminal').style.display = 'none';
            initGame();
        }, 1000);
    }

    function initGame() {
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#000033',
            physics: { default: 'arcade', arcade: { gravity: { y: 1500 } } },
            scene: { preload: preload, create: create, update: update }
        };
        new Phaser.Game(config);
    }

    function preload() {
        // "Генетическая память" ИИ - Соник вшит прямо в код (Base64)

        this.load.image('sonic_base', sonicData);
        
        // Рисуем пол программно, если файлы в public не найдены
        let graphics = this.make.graphics({x: 0, y: 0, add: false});
        graphics.fillStyle(0x00aa00, 1);
        graphics.fillRect(0, 0, 400, 40);
        graphics.generateTexture('ground_ai', 400, 40);
    }

    let sonic, moveData = {left: false, right: false, jump: false};

    function create() {
        const floorY = window.innerHeight - 20;
        const platforms = this.physics.add.staticGroup();
        
        // Создаем пол из "нейронной памяти"
        for(let i=0; i<10; i++) {
            platforms.create(i * 400, floorY, 'ground_ai');
        }

        sonic = this.physics.add.sprite(100, floorY - 100, 'sonic_base');
        sonic.setScale(2);
        sonic.setCollideWorldBounds(true);
        this.physics.add.collider(sonic, platforms);

        // Управление для телефона
        const h = window.innerHeight;
        const addB = (x, y, r, act) => {
            let b = this.add.circle(x, y, r, 0x00f0ff, 0.3).setInteractive();
