<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Web Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #00f0ff; box-shadow: 0 0 20px #00f0ff; }
    </style>
</head>
<body>
    <div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Конфигурация игры (Нативный движок)
    const config = {
        type: Phaser.AUTO,
        width: 400,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1000 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player;
    let cursors;
    let score = 0;
    let scoreText;

    function preload() {
        // Загружаем графику (используем бесплатные спрайты для теста)
        this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
        this.load.image('ring', 'https://labs.phaser.io/assets/sprites/apple.png'); // Вместо кольца пока яблоко
        this.load.spritesheet('sonic', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
    }

    function create() {
        // Фон
        this.add.image(200, 300, 'sky');

        // Платформы
        platforms = this.physics.add.staticGroup();
        platforms.create(200, 585, 'ground').setScale(2).refreshBody();
        platforms.create(300, 450, 'ground');
        platforms.create(50, 300, 'ground');

        // Игрок (Соник)
        player = this.physics.add.sprite(100, 450, 'sonic');
        player.setBounce(0.2);
        player.setCollideWorldBounds(true);

        // Анимации
        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('sonic', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'sonic', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('sonic', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });

        // Управление
        cursors = this.input.keyboard.createCursorKeys();
        
        // Кнопки для ТЕЛЕФОНА (экранные)
        const leftBtn = this.add.circle(50, 500, 40, 0x00f0ff, 0.5).setInteractive();
        const rightBtn = this.add.circle(150, 500, 40, 0x00f0ff, 0.5).setInteractive();
        const jumpBtn = this.add.circle(350, 500, 50, 0xff0055, 0.8).setInteractive();

        leftBtn.on('pointerdown', () => { player.moveLeft = true; });
        leftBtn.on('pointerup', () => { player.moveLeft = false; });
        rightBtn.on('pointerdown', () => { player.moveRight = true; });
        rightBtn.on('pointerup', () => { player.moveRight = false; });
        jumpBtn.on('pointerdown', () => { if (player.body.touching.down) player.setVelocityY(-600); });

        // Кольца (сбор предметов)
        rings = this.physics.add.group({
            key: 'ring',
            repeat: 5,
            setXY: { x: 12, y: 0, stepX: 70 }
        });

        this.physics.add.collider(player, platforms);
        this.physics.add.collider(rings, platforms);
        this.physics.add.overlap(player, rings, collectRing, null, this);

        scoreText = this.add.text(16, 16, 'RINGS: 0', { fontSize: '20px', fill: '#00f0ff', fontFamily: 'Arial' });
    }

    function update() {
        if (cursors.left.isDown || player.moveLeft) {
            player.setVelocityX(-200);
            player.anims.play('left', true);
        } else if (cursors.right.isDown || player.moveRight) {
            player.setVelocityX(200);
            player.anims.play('right', true);
        } else {
            player.setVelocityX(0);
            player.anims.play('turn');
        }

        if (cursors.up.isDown && player.body.touching.down) {
            player.setVelocityY(-600);
        }
    }

    function collectRing(player, ring) {
        ring.disableBody(true, true);
        score += 1;
        scoreText.setText('RINGS: ' + score);
    }
</script>
</body>
</html>
