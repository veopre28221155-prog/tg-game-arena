<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #launch-btn { background: #000; color: #00f0ff; border: 2px solid #00f0ff; padding: 20px 40px; font-size: 16px; cursor: pointer; border-radius: 10px; font-family: sans-serif; font-weight: bold; }
        iframe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <button id="launch-btn" onclick="launch()">ВОЙТИ В АРЕНУ</button>
    <iframe id="game-view" allow="autoplay; fullscreen; gamepad"></iframe>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function launch() {
            document.getElementById('launch-btn').style.display = 'none';
            const frame = document.getElementById('game-view');
            frame.style.display = 'block';
            frame.src = window.location.origin + "/engine";
        }
    </script>
</body>
</html>
