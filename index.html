<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #00f0ff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        h1 { font-size: 18px; text-shadow: 0 0 15px #00f0ff; text-align: center; line-height: 1.5; }
        .btn { background: #1a1a1a; color: #00f0ff; border: 4px solid #00f0ff; padding: 20px; font-family: inherit; font-size: 12px; cursor: pointer; box-shadow: 0 0 10px #00f0ff; transition: 0.2s; }
        .btn:active { transform: scale(0.95); box-shadow: none; }
        #game-stream { width: 100vw; height: 100vh; border: none; display: none; }
        .footer { margin-top: 30px; font-size: 8px; color: #555; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen">
        <h1>RETRO ARENA<br>SYSTEM v1.4</h1>
        <button class="btn" onclick="launchGame()">🕹 ЗАПУСТИТЬ СОНИКА</button>
        <div class="footer">СЕРВЕР: RENDER.COM | ENGINE: SEGA</div>
    </div>

    <iframe id="game-stream" allow="autoplay; fullscreen; gamepad"></iframe>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function launchGame() {
            // Прячем меню
            document.getElementById('welcome-screen').style.display = 'none';
            
            // Запускаем игровой поток
            const stream = document.getElementById('game-stream');
            stream.style.display = 'block';
            // Добавляем случайный параметр, чтобы обойти кэш Telegram
            stream.src = window.location.origin + "/player?nocache=" + Date.now();
        }
    </script>
</body>
</html>
