<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #00f0ff; font-family: 'Press Start 2P', cursive; overflow: hidden; text-align: center; }
        .screen { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .btn { background: #1a1a1a; color: #00f0ff; border: 4px solid #00f0ff; padding: 20px; font-family: inherit; cursor: pointer; box-shadow: 0 0 15px #00f0ff; border-radius: 10px; }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
    </style>
</head>
<body>
    <div id="lobby" class="screen">
        <h1 style="font-size:16px;">ARENA CLOUD</h1>
        <button class="btn" onclick="start()">ПОДКЛЮЧИТЬСЯ</button>
    </div>
    <iframe id="game-frame" allow="autoplay; fullscreen; gamepad"></iframe>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        function start() {
            document.getElementById('lobby').style.display = 'none';
            const f = document.getElementById('game-frame');
            f.style.display = 'block';
            f.src = window.location.origin + "/engine";
        }
    </script>
</body>
</html>
