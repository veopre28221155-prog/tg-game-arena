<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sega Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: sans-serif; }
        #game { width: 100vw; height: 100vh; }
        #status { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

    <div id="status">Загрузка ядра Сега...<br><small>(может занять 10-15 сек)</small></div>
    <div id="game"></div>

    <script>
        // Настройки эмулятора
        window.EmuJS = {
            // Берем файлы движка из CDN, который разрешает встраивание
            dataUrl: "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/",
            gameUrl: window.location.origin + "/roms/sonic.bin",
            core: "genesis",
            autoStart: true,
            container: "#game",
            onStart: function() {
                document.getElementById('status').style.display = 'none';
            }
        };
    </script>
    
    <!-- Загружаем сам скрипт эмулятора напрямую в наш файл -->
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js"></script>

</body>
</html>
