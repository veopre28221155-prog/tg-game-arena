<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .btn { background: #1a1a1a; color: #00f0ff; border: 4px solid #000; padding: 15px; width: 260px; margin: 10px; font-family: inherit; font-size: 10px; cursor: pointer; box-shadow: 4px 4px 0 #000; }
        iframe { width: 100vw; height: 80vh; border: none; background: #000; }
        h1 { font-size: 14px; color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
    </style>
</head>
<body>
    <div id="s-menu" class="screen active">
        <h1>RETRO ARENA</h1>
        <button class="btn" onclick="startPlay()">▶ ЗАПУСТИТЬ ТРАНСЛЯЦИЮ</button>
    </div>

    <div id="s-play" class="screen">
        <iframe id="stream-frame"></iframe>
        <button class="btn" onclick="location.reload()" style="background:red; color:white; height:40px; padding:5px; margin-top:5px;">ВЫХОД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function startPlay() {
            document.getElementById('s-menu').classList.remove('active');
            document.getElementById('s-play').classList.add('active');
            // Загружаем "игровой узел" с нашего сервера
            document.getElementById('stream-frame').src = window.location.origin + "/engine";
        }
    </script>
</body>
</html>
