<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Arena: Sonic Reconstruction</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        #ai-terminal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; justify-content: center; }
        .log-line { font-size: 9px; margin-bottom: 5px; color: #0f0; text-transform: uppercase; }
        #game-container { width: 100vw; height: 100vh; visibility: hidden; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 100; font-size: 8px; color: #fff; pointer-events: none; visibility: hidden; text-shadow: 2px 2px #000; }
        .stat-val { color: gold; }
    </style>
</head>
<body>

<div id="ai-terminal">
    <div style="color: #0f0; margin-bottom: 20px; border-bottom: 1px solid #0f0; padding-bottom: 10px;">
        > NEURAL_SCANNER: sonic.bin... FOUND<br>
        > DATA_EXTRACTION: 100%
    </div>
    <div id="logs"></div>
</div>

<div id="hud">
    SCORE: <span class="stat-val">000100</span><br>
    TIME: <span class="stat-val" id="timer">0:00</span><br>
    RINGS: <span class="stat-val">0</span>
</div>

<div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const logBox = document.getElementById('logs');
    function addLog(text) {
        const l = document.createElement('div');
        l.className = 'log-line';
        l.innerText = '> ' + text;
        logBox.appendChild(l);
    }

    async function startAI() {
        addLog("DECODING SPRITE TABLES...");
        setTimeout(() => addLog("MAPPING COLOR PALETTE: SEGA_64_COLOR..."), 500);
        setTimeout(() => addLog("RECONSTRUCTING PARALLAX BACKGROUND..."), 1000);
        setTimeout(() => addLog("VIRTUALIZING SOUND CHIP: YM2612..."), 1500);
        setTimeout(() => addLog("SIMULATION STABLE. INJECTING..."), 2000);
        setTimeout(showGame, 2500);
    }

    function showGame() {
        document.getElementById('ai-terminal').style.display = 'none';
        document.getElementById('game-container').style.visibility = 'visible';
        document.getElementById('hud').style.visibility = 'visible';
        initGame();
    }

    function initGame() {
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#4070FF', // Синее небо Сеги
            physics: { default: 'arcade', arcade: { gravity: { y: 1600 } } },
            scene: { preload: preload, create: create, update: update }
        };
        new Phaser.Game(config);
    }
