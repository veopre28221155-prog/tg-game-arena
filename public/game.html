<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emu Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Press Start 2P', cursive;
        }
        #game-container { 
            width: 100vw; height: 100vh; z-index: 1; display: none; 
        }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #111424 0%, #000000 100%);
            z-index: 10; text-align: center;
        }
        .btn-massive { 
            width: 80vw; max-width: 350px; padding: 40px 20px; 
            background: #1a1a1a; color: #00f0ff; border: 4px solid #00f0ff; 
            font-family: 'Press Start 2P', cursive; font-size: 20px; line-height: 1.5;
            cursor: pointer; border-radius: 10px; 
            box-shadow: inset 4px 4px 0 rgba(0, 240, 255, 0.3), inset -4px -4px 0 rgba(0,0,0,0.8), 0 0 30px rgba(0, 240, 255, 0.5); 
            text-transform: uppercase; text-shadow: 2px 2px 0 #000;
            transition: transform 0.1s;
        }
        .btn-massive:active { 
            transform: scale(0.95); 
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.8), 0 0 10px rgba(0, 240, 255, 0.5); 
        }
        .hint {
            margin-top: 30px; font-size: 10px; color: #888; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="btn-massive" onclick="start()">▶ ИГРАТЬ</button>
        <p class="hint">Нажми для активации звука и видео</p>
    </div>

    <div id="game-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const core = urlParams.get('core') || 'genesis';
        const game = urlParams.get('game');

        function start() {
            if (!game) { alert("Ошибка: ROM файл не найден!"); return; }

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            // Используем относительный путь gameUrl: game (так как game.html и ромы лежат в одной папке)
            window.EmuJS = {
                dataUrl: "https://cdn.emulatorjs.org/stable/data/",
                gameUrl: game,
                core: core,
                autoStart: true,
                container: "#game-container"
            };

            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
