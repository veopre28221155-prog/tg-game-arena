<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // Конфигурация эмулятора
        window.EmuJS = {
            // Используем CDN, чтобы избежать ошибок 404
            dataUrl: "https://cdn.statically.io/gh/EmulatorJS/EmulatorJS/main/data/",
            gameUrl: window.location.origin + "/roms/sonic.bin",
            core: "genesis",
            autoStart: true,
            container: "#game-container"
        };
    </script>
    <!-- Загрузчик движка -->
    <script src="https://cdn.statically.io/gh/EmulatorJS/EmulatorJS/main/data/loader.js"></script>
</body>
</html>
