<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --tg-bg: #050505; --accent-neon: #00f0ff; --accent-pink: #ff0055; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font-retro); height: 100vh; overflow: hidden; text-align: center; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; z-index: 10; }
        .screen.active { display: flex; }
        
        h1 { color: var(--accent-neon); font-size: 20px; text-shadow: 0 0 10px var(--accent-neon); margin-top: 30px; margin-bottom: 40px; line-height: 1.5; }
        
        .btn-pixel { background: #111; color: #fff; border: 4px solid #444; padding: 20px; font-family: var(--font-retro); font-size: 14px; cursor: pointer; width: 100%; max-width: 320px; display: block; position: relative; z-index: 50; transition: 0.1s; }
        .btn-pixel:active { background: #333; transform: scale(0.95); }
        .btn-sega { border-color: #0055ff; color: #00aaff; box-shadow: 0 0 15px rgba(0,85,255,0.4); }
        .btn-danger { border-color: var(--accent-pink); color: var(--accent-pink); }
        
        #emulator-container { width: 100%; height: 55vh; background: #000; border: 2px solid var(--accent-neon); position: relative; margin-top: 10px; }
        
        #start-emu-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; color: #0f0; border: 4px solid #0f0; padding: 20px;
            font-size: 16px; font-family: var(--font-retro); z-index: 100; display: none; cursor: pointer;
        }
        
        #loading-status { font-size: 10px; color: #aaa; margin-top: 15px; line-height: 1.5; }
        
        #global-debug {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: rgba(50,0,0,0.9);
            border-top: 2px solid red; color: #ffaaaa; font-family: monospace; font-size: 9px;
            text-align: left; overflow-y: auto; padding: 10px; z-index: 9999; display: none;
        }
    </style>
</head>
<body>

<div id="global-debug"></div>

<div id="app">
    <div id="s-main" class="screen active">
        <h1>RETRO ARENA<br><span style="font-size: 12px; color: gold;">SEGA</span></h1>
        <button id="btn-sonic" class="btn-pixel btn-sega" onclick="launchGame('sonic.bin', 'segaMD')">🦔 SONIC 1</button>
    </div>

    <div id="s-game" class="screen">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <button class="btn-pixel btn-danger" style="padding: 10px; font-size: 10px; width: auto;" onclick="location.reload()">НАЗАД</button>
            <div id="game-title-display" style="color: gold; font-size: 10px;">SEGA</div>
        </div>

        <div style="position: relative; width: 100%;">
            <div id="emulator-container"></div>
            <button id="start-emu-button" onclick="runEmulator()">▶ СТАРТ</button>
        </div>
        
        <p id="loading-status">Инициализация...</p>
    </div>
</div>

<script>
    function logDebug(msg) {
        const dbg = document.getElementById('global-debug');
        dbg.style.display = 'block';
        dbg.innerHTML += '> ' + msg + '<br>';
        console.log(msg);
    }
    
    window.onerror = function(msg) { logDebug(`ERROR: ${msg}`); return false; };

    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function runEmulator() {
        if (window.EJS_emulator) {
            window.EJS_emulator.start();
            document.getElementById('start-emu-button').style.display = 'none';
        }
    }

    function launchGame(romFileName, coreName) {
        const btn = document.getElementById('btn-sonic');
        btn.innerText = 'ЗАГРУЗКА...';
        btn.style.color = 'gold';

        setTimeout(() => {
            navScreen('s-game');
            
            // 1. Формируем АБСОЛЮТНУЮ ссылку на игру (с твоего сервера)
            // Добавляем ?t=... чтобы телефон не брал старую версию из кэша
            const romUrl = window.location.origin + '/' + romFileName + '?t=' + Date.now();
            
            logDebug(`Игра: ${romUrl}`);

            // 2. Указываем путь к ОФИЦИАЛЬНОМУ CDN (там точно есть legacy файлы!)
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            
            window.EJS_gameUrl = romUrl;
            window.EJS_player = '#emulator-container';
            window.EJS_core = coreName;
            window.EJS_startOnLoaded = false;
            
            // Важная настройка для телефонов
            window.EJS_lightSync = true;

            window.EJS_Buttons = {
                playPause: false, restart: true, mute: true, settings: true,
                fullscreen: true, saveState: true, loadState: true 
            };

            window.EJS_onGameLoaded = function() {
                logDebug('Игра скачана!');
                document.getElementById('loading-status').innerText = 'Готово! Жми СТАРТ';
                document.getElementById('start-emu-button').style.display = 'block';
            };

            // 3. Грузим скрипт тоже с CDN
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            script.onerror = () => logDebug('Ошибка загрузки CDN loader.js');
            document.body.appendChild(script);

        }, 100);
    }
</script>
</body>
</html>
