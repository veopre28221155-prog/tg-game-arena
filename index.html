<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sega Genesis Emulator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: monospace; }
        
        /* Экран загрузки поверх всего */
        #ai-boot { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #0f0; z-index: 9999; 
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; 
        }
        .log { margin-bottom: 8px; font-size: 12px; }
        
        /* Контейнер эмулятора (теперь он всегда block, просто сзади) */
        #game-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; 
        }
    </style>
</head>
<body>

<!-- AI BOOT SEQUENCE -->
<div id="ai-boot">
    <div class="log">> INITIALIZING MOTOROLA 68000 CORE...</div>
    <div class="log" id="log2" style="display:none;">> CONNECTING TO EMULATORJS CDN...</div>
    <div class="log" id="log3" style="display:none;">> FETCHING ROM: sonic.bin...</div>
    <div class="log" id="log4" style="display:none; color: yellow;">> STARTING VIRTUAL MACHINE...</div>
</div>

<!-- КОНТЕЙНЕР ДЛЯ ИГРЫ -->
<div id="game-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Анимация текста
    setTimeout(() => document.getElementById('log2').style.display = 'block', 500);
    setTimeout(() => document.getElementById('log3').style.display = 'block', 1000);
    setTimeout(() => document.getElementById('log4').style.display = 'block', 1500);

    // НАСТРОЙКИ ЭМУЛЯТОРА
    window.EJS_player = '#game-container';
    window.EJS_core = 'sega';
    
    // Трюк с Date.now() обходит жесткий кэш Телеграма!
    window.EJS_gameUrl = 'sonic.bin?v=' + Date.now(); 
    
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_virtualGamepad = true; // Геймпад на экране
    window.EJS_startOnLoaded = true;  // Автоматический старт
    window.EJS_color = '#000000';     // Черный фон эмулятора

    // Загружаем ядро эмулятора
    const script = document.createElement('script');
    script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    
    // Как только скрипт эмулятора загрузится, убираем наш хакерский экран
    script.onload = () => {
        setTimeout(() => {
            document.getElementById('ai-boot').style.display = 'none';
        }, 2500); // Даем ему 2.5 секунды на распаковку игры
    };

    // Если CDN заблокирован провайдером
    script.onerror = () => {
        document.getElementById('ai-boot').innerHTML += `<div style="color:red; margin-top:20px;">ERROR: FAILED TO LOAD EMULATOR CORE. CHECK INTERNET CONNECTION.</div>`;
    };

    document.body.appendChild(script);

</script>

</body>
</html>
