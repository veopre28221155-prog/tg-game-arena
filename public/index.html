<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Battle Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Весь твой стиль CSS остается без изменений */
        :root { --tg-bg: #050505; --tg-text: #ffffff; --accent-neon: #00f0ff; --accent-pink: #ff0055; --accent-gold: #ffd700; --font-retro: 'Press Start 2P', cursive; }
        body { margin: 0; background: #000; color: #fff; font-family: var(--font-retro); overflow: hidden; }
        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .screen.active { display: flex; }
        .btn-pixel { background: #1a1a1a; color: var(--accent-neon); border: 4px solid #000; padding: 15px; width: 100%; max-width: 320px; margin-bottom: 10px; cursor: pointer; font-family: var(--font-retro); font-size: 10px; }
        #emulator-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; }
        #ejs-container { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div id="emulator-layer">
    <div id="emu-ui" style="position:absolute; top:10px; left:10px; z-index:101; color:gold; font-size:10px;">
        СЧЕТ: <span id="emu-score">0</span>
    </div>
    <button onclick="stopEmulator()" style="position:absolute; top:10px; right:10px; z-index:101; background:red; color:white; font-family:inherit; font-size:8px;">ЗАВЕРШИТЬ МАТЧ</button>
    <div id="ejs-container"></div>
</div>

<div id="app">
    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="s-main" class="screen active">
        <h1>RETRO ARENA</h1>
        <button class="btn-pixel" onclick="navScreen('s-single')">🎮 ОДИНОЧНАЯ ИГРА</button>
        <button class="btn-pixel" onclick="navScreen('s-friend')">🤝 ИГРА С ДРУГОМ</button>
        <button class="btn-pixel" style="color:gold" onclick="navScreen('s-tournaments')">⚔️ ТУРНИРЫ (Stars)</button>
    </div>

    <!-- Список турниров и кнопок... (остальные твои экраны s-single, s-friend и т.д.) -->
</div>

<script>
    const tg = window.Telegram.WebApp;
    const socket = io(); // Подключение к твоему серверу
    let user = null, lobby = null, score = 0;

    // Инициализация
    async function init() {
        const r = await fetch('/api/user-data', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({initData: tg.initData})
        });
        user = await r.json();
    }
    init();

    function navScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ЗАПУСК ЭМУЛЯТОРА
    function launchEmulator(fileName, coreType) {
        document.getElementById('emulator-layer').style.display = 'block';
        
        window.EJS_player = '#ejs-container';
        window.EJS_core = coreType;
        window.EJS_gameUrl = '/' + fileName;
        window.EJS_pathtodata = 'data/'; // ПУТЬ К ТВОЕЙ ПАПКЕ DATA
        window.EJS_startOnLoaded = true;

        // Слежка за памятью (Адреса Sega)
        window.EJS_onGameStart = () => {
            if (lobby) socket.emit('join-room', lobby.lobbyId);

            setInterval(() => {
                if (typeof EJS_emulator !== 'undefined') {
                    const ram = EJS_emulator.gameManager.getWRam();
                    // Sonic 1: Кольца по адресу 0xFE20
                    if (fileName.includes('sonic')) {
                        score = ram[0xFE20] || 0;
                    } 
                    // MK3: Здоровье или победы (пример)
                    else if (fileName.includes('umk3')) {
                        score = ram[0xB110] || 0; 
                    }
                    document.getElementById('emu-score').innerText = score;
                }
            }, 1000);
        };

        // МУЛЬТИПЛЕЕР: Передача кнопок
        window.addEventListener("keydown", (e) => {
            if (lobby) {
                socket.emit('emu-input', {
                    roomId: lobby.lobbyId,
                    key: e.keyCode,
                    type: 'keydown',
                    player: user.telegramId === lobby.player1Id ? 1 : 2
                });
            }
        });

        // ПРИЕМ КНОПОК ОТ ПАРТНЕРА
        socket.on('partner-input', (data) => {
            if (typeof EJS_emulator !== 'undefined') {
                // Если мы игрок 1, кнопки партнера идут во 2-й порт
                EJS_emulator.gameManager.simulateInput(data.key, data.type, 1);
            }
        });

        const script = document.createElement('script');
        script.src = 'data/loader.js';
        document.body.appendChild(script);
    }

    async function stopEmulator() {
        if (lobby) {
            socket.emit('emu-game-over', {
                roomId: lobby.lobbyId,
                telegramId: user.telegramId,
                score: score
            });
            alert("Результат отправлен! Ожидание соперника...");
        }
        location.reload();
    }

    // ТВОИ ФУНКЦИИ СОЗДАНИЯ ЛОББИ (createPublicLobby и т.д.)
    // Оставь их как в своем коде, но в конце вызывай launchEmulator()
</script>
</body>
</html>
